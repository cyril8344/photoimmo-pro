<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <title>Galerie Photos — PhotoImmo Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{accent:'#c9963c',gold:'#c9963c','gold-light':'#e8b96e'}}}}</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/api/init"></script>
  <style>
    :root {
      --gold: #c9963c;
      --gold-light: #e8b96e;
      --bg: #08080f;
      --surface: #0f0f1a;
      --surface2: #16162a;
      --border: #1e1e35;
      --text: #f0ede8;
      --muted: #7a7a9a;
    }
    * { box-sizing: border-box; margin: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    h1,h2,h3 { font-family: 'Playfair Display', Georgia, serif; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 3px; }

    /* Nav */
    .nav-blur { background: rgba(8,8,15,0.70); backdrop-filter: blur(20px) saturate(1.8); -webkit-backdrop-filter: blur(20px) saturate(1.8); border-bottom: 1px solid rgba(201,150,60,0.12); }

    /* Logo */
    .aperture { position: relative; background: linear-gradient(135deg,var(--gold),var(--gold-light)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 20px rgba(201,150,60,0.3); }

    /* Gradient text */
    .gradient-text { background: linear-gradient(135deg, #f0c070 0%, #c9963c 50%, #e8b96e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Gold divider */
    .gold-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(201,150,60,0.5), transparent); margin: 0 auto; }

    /* CTA button */
    .btn-gold { background: linear-gradient(135deg, #c9963c 0%, #e8b96e 50%, #c9963c 100%); background-size: 200% 100%; color: #08080f; font-weight: 700; border: none; cursor: pointer; transition: background-position .4s, box-shadow .3s, transform .15s; box-shadow: 0 0 40px rgba(201,150,60,0.25); }
    .btn-gold:hover:not(:disabled) { background-position: 100% 0; box-shadow: 0 0 60px rgba(201,150,60,0.4); transform: translateY(-1px); }
    .btn-gold:active:not(:disabled) { transform: translateY(0); }
    .btn-gold:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* Hero section */
    .hero-section { position: relative; padding: 56px 20px 40px; text-align: center; overflow: hidden; }
    .hero-section::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 70% 100% at 50% 0%, rgba(201,150,60,0.08) 0%, transparent 70%); pointer-events:none; }

    /* Photo grid */
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
    @media (max-width: 480px) { .photo-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; } }

    .photo-card {
      position: relative; overflow: hidden; border-radius: 12px; cursor: pointer;
      aspect-ratio: 4/3; background: var(--surface2);
      border: 2px solid transparent;
      transition: transform .25s cubic-bezier(.2,.8,.2,1), border-color .2s, box-shadow .25s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .photo-card:hover { transform: scale(1.025) translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.55), 0 0 20px rgba(201,150,60,0.08); }
    .photo-card.selected { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(201,150,60,0.4), 0 8px 30px rgba(201,150,60,0.15); }

    .photo-card img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      filter: brightness(1.28) contrast(1.05) saturate(1.28);
      transition: filter .2s;
    }
    .photo-card:hover img { filter: brightness(1.38) contrast(1.07) saturate(1.35); }

    .photo-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(201,150,60,0.15), rgba(232,185,110,0.05)); opacity: 0; transition: opacity .2s; pointer-events: none; }
    .photo-card.selected .photo-overlay { opacity: 1; }

    .photo-check { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg,var(--gold),var(--gold-light)); color: #08080f; font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.4); transition: opacity .2s, transform .25s cubic-bezier(.2,.8,.2,1); pointer-events: none; box-shadow: 0 2px 12px rgba(201,150,60,0.5); }
    .photo-card.selected .photo-check { opacity: 1; transform: scale(1); }

    .photo-actions { position: absolute; bottom: 10px; right: 10px; display: flex; gap: 6px; opacity: 0; transition: opacity .2s; }
    .photo-card:hover .photo-actions { opacity: 1; }
    @media (hover: none) { .photo-actions { opacity: 1; } }

    .photo-action-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(8,8,15,0.82); backdrop-filter: blur(6px); color: var(--text); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: background .15s, border-color .15s; }
    .photo-action-btn:hover { background: rgba(201,150,60,0.45); border-color: rgba(201,150,60,0.5); }

    .photo-num { position: absolute; top: 10px; left: 10px; background: rgba(8,8,15,0.7); backdrop-filter: blur(4px); color: var(--muted); font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 999px; opacity: 0; transition: opacity .2s; pointer-events: none; }
    .photo-card:hover .photo-num { opacity: 1; }

    /* Sticky bottom bar */
    .sticky-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(9,9,20,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(201,150,60,0.18); z-index: 40; }

    /* Lightbox */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 60; display: flex; align-items: center; justify-content: center; animation: fadeIn .2s ease; }
    .lightbox img { max-width: calc(100vw - 100px); max-height: 90vh; object-fit: contain; border-radius: 6px; filter: brightness(1.18) contrast(1.05) saturate(1.20); box-shadow: 0 20px 80px rgba(0,0,0,0.8); }
    .lightbox-close { position: absolute; top: 16px; right: 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: white; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .lightbox-close:hover { background: rgba(255,255,255,0.18); }
    .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: white; font-size: 20px; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s; }
    .lightbox-nav:hover { background: rgba(201,150,60,0.25); border-color: rgba(201,150,60,0.4); }

    /* Animations */
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:none } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:none } }
    .fade-in { animation: fadeIn .5s ease both; }
    .anim-1 { animation: fadeUp .7s .05s ease both; }
    .anim-2 { animation: fadeUp .7s .15s ease both; }
    .anim-3 { animation: fadeUp .7s .25s ease both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SB_URL = (typeof __SUPABASE_URL__ !== 'undefined' ? __SUPABASE_URL__ : '').replace(/\/+$/, '').split('/rest')[0].split('/auth')[0];
const SB_KEY = typeof __SUPABASE_KEY__ !== 'undefined' ? __SUPABASE_KEY__ : '';

function LoadingScreen() {
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div className="aperture" style={{width:'60px',height:'60px',borderRadius:'18px',margin:'0 auto 20px'}}>
          <span style={{position:'relative',zIndex:1,color:'#08080f',fontWeight:700,fontSize:'19px',fontFamily:'Playfair Display,serif'}}>PI</span>
        </div>
        <div style={{width:'40px',height:'2px',background:'linear-gradient(90deg,var(--gold),var(--gold-light))',margin:'0 auto 16px',borderRadius:'1px',animation:'fadeIn 1s ease infinite alternate'}}/>
        <p style={{color:'var(--muted)',fontSize:'14px',letterSpacing:'.04em'}}>Chargement de la galerie…</p>
      </div>
    </div>
  );
}

function ErrorScreen({ message }) {
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
      <div style={{textAlign:'center',maxWidth:'440px'}} className="fade-in">
        <div style={{fontSize:'52px',marginBottom:'20px'}}>📷</div>
        <h1 style={{fontSize:'28px',fontWeight:700,marginBottom:'12px'}}>Galerie introuvable</h1>
        <p style={{color:'var(--muted)',lineHeight:1.7,fontSize:'15px'}}>{message || "Cette galerie n'existe pas ou n'est plus disponible."}</p>
      </div>
    </div>
  );
}

function ConfirmScreen({ count }) {
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
      <div style={{textAlign:'center',maxWidth:'460px'}} className="fade-in">
        <div style={{width:'80px',height:'80px',borderRadius:'50%',background:'linear-gradient(135deg,var(--gold),var(--gold-light))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 28px',fontSize:'36px',boxShadow:'0 0 40px rgba(201,150,60,0.35)'}}>✓</div>
        <h1 style={{fontSize:'30px',fontWeight:700,marginBottom:'14px'}} className="gradient-text">Sélection confirmée !</h1>
        <div className="gold-line" style={{width:'60px',marginBottom:'20px'}}/>
        <p style={{color:'var(--muted)',lineHeight:1.8,fontSize:'15px'}}>
          Votre sélection de{' '}
          <strong style={{color:'var(--gold-light)'}}>{count} photo{count !== 1 ? 's' : ''}</strong>{' '}
          a bien été enregistrée. Votre photographe en sera informé.
        </p>
      </div>
    </div>
  );
}

function GalleryApp() {
  const [gallery, setGallery] = useState(null);
  const [photos, setPhotos] = useState([]);
  const [selected, setSelected] = useState(new Set());
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [toast, setToast] = useState('');
  const [lightbox, setLightbox] = useState(null);
  const [confirmed, setConfirmed] = useState(false);
  const [saving, setSaving] = useState(false);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

  const downloadPhoto = async (url, filename) => {
    try {
      const res = await fetch(url);
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename || 'photo.jpg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
    } catch(_) {
      window.open(url, '_blank');
    }
  };

  const toggleAll = async () => {
    const allSelected = photos.length > 0 && photos.every(p => selected.has(p.id));
    const newSelected = allSelected ? false : true;
    const updated = new Set(newSelected ? photos.map(p => p.id) : []);
    setSelected(updated);
    await Promise.all(photos.map(p =>
      fetch('/api/gallery-select', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ token, photo_id: p.id, selected: newSelected })
      }).catch(() => {})
    ));
  };

  const token = window.location.pathname.split('/gallery/')[1]?.split('?')[0]?.split('/')[0] || '';

  useEffect(() => {
    if (!token) { setError('Lien de galerie invalide.'); setLoading(false); return; }
    if (!SB_URL || !SB_KEY) { setError("Cette galerie n'est pas encore configurée."); setLoading(false); return; }

    const sb = window.supabase.createClient(SB_URL, SB_KEY);
    (async () => {
      const { data, error: gErr } = await sb
        .from('galleries')
        .select('*, gallery_photos(*)')
        .eq('token', token)
        .eq('ready', true)
        .single();

      if (gErr || !data) {
        setError("Cette galerie n'existe pas ou n'est pas encore disponible.");
        setLoading(false);
        return;
      }

      setGallery(data);
      const sorted = (data.gallery_photos || []).sort((a, b) => (a.created_at||'').localeCompare(b.created_at||''));
      setPhotos(sorted);
      setSelected(new Set(sorted.filter(p => p.selected).map(p => p.id)));
      setLoading(false);
    })();
  }, [token]);

  const togglePhoto = async (photo) => {
    const nowSelected = !selected.has(photo.id);
    setSelected(prev => { const n = new Set(prev); nowSelected ? n.add(photo.id) : n.delete(photo.id); return n; });
    try {
      const res = await fetch('/api/gallery-select', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ token, photo_id: photo.id, selected: nowSelected })
      });
      if (!res.ok) showToast("Erreur d'enregistrement");
    } catch (_) { showToast('Erreur de connexion'); }
  };

  const openLightbox = (photo) => setLightbox(photo);
  const prevPhoto = () => { const i = photos.findIndex(p => p.id === lightbox?.id); if (i > 0) setLightbox(photos[i-1]); };
  const nextPhoto = () => { const i = photos.findIndex(p => p.id === lightbox?.id); if (i < photos.length-1) setLightbox(photos[i+1]); };

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') setLightbox(null);
      if (e.key === 'ArrowLeft') prevPhoto();
      if (e.key === 'ArrowRight') nextPhoto();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [lightbox, photos]);

  const confirmSelection = async () => {
    setSaving(true);
    await new Promise(r => setTimeout(r, 400));
    setSaving(false);
    setConfirmed(true);
  };

  if (loading) return <LoadingScreen />;
  if (error) return <ErrorScreen message={error} />;
  if (confirmed) return <ConfirmScreen count={selected.size} />;

  const selCount = selected.size;
  const lbIndex = photos.findIndex(p => p.id === lightbox?.id);

  return (
    <div style={{minHeight:'100vh',paddingBottom:'80px'}}>

      {/* Toast */}
      {toast && (
        <div style={{position:'fixed',top:'20px',right:'20px',zIndex:70,background:'linear-gradient(135deg,var(--gold),var(--gold-light))',color:'#08080f',padding:'12px 20px',borderRadius:'12px',fontWeight:600,fontSize:'14px',boxShadow:'0 4px 24px rgba(201,150,60,0.45)'}}>
          {toast}
        </div>
      )}

      {/* Lightbox */}
      {lightbox && (
        <div className="lightbox" onClick={() => setLightbox(null)}>
          <img src={lightbox.full_url} alt={lightbox.name} onClick={e => e.stopPropagation()}/>
          <button className="lightbox-close" onClick={() => setLightbox(null)}>×</button>

          {lbIndex > 0 && (
            <button className="lightbox-nav" style={{left:'16px'}} onClick={e => { e.stopPropagation(); prevPhoto(); }}>‹</button>
          )}
          {lbIndex < photos.length - 1 && (
            <button className="lightbox-nav" style={{right:'16px'}} onClick={e => { e.stopPropagation(); nextPhoto(); }}>›</button>
          )}

          <div style={{position:'absolute',bottom:'20px',left:'50%',transform:'translateX(-50%)',display:'flex',gap:'12px',alignItems:'center'}}>
            <span style={{color:'var(--muted)',fontSize:'13px'}}>{lbIndex+1} / {photos.length}</span>
            <button onClick={e => { e.stopPropagation(); downloadPhoto(lightbox.full_url, lightbox.name); }}
              style={{background:'rgba(201,150,60,0.15)',border:'1px solid rgba(201,150,60,0.35)',color:'var(--gold-light)',padding:'8px 20px',borderRadius:'10px',cursor:'pointer',fontSize:'13px',fontWeight:600,backdropFilter:'blur(8px)'}}>
              ↓ Télécharger
            </button>
          </div>
        </div>
      )}

      {/* Nav */}
      <header className="nav-blur sticky top-0 z-30">
        <div style={{maxWidth:'1280px',margin:'0 auto',padding:'14px 24px',display:'flex',alignItems:'center',gap:'14px'}}>
          <div className="aperture" style={{width:'38px',height:'38px',borderRadius:'11px'}}>
            <span style={{position:'relative',zIndex:1,color:'#08080f',fontWeight:700,fontSize:'13px',fontFamily:'Playfair Display,serif'}}>PI</span>
          </div>
          <div>
            <div style={{fontSize:'13px',fontWeight:600,letterSpacing:'.02em'}}>PhotoImmo Pro</div>
            <div style={{fontSize:'11px',color:'var(--muted)'}}>Galerie privée</div>
          </div>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'12px'}}>
            {selCount > 0 && (
              <div style={{display:'flex',alignItems:'center',gap:'6px',background:'rgba(201,150,60,0.12)',border:'1px solid rgba(201,150,60,0.25)',borderRadius:'999px',padding:'4px 12px',fontSize:'13px',color:'var(--gold-light)',fontWeight:500}}>
                <span>✓</span><span>{selCount} sélectionnée{selCount>1?'s':''}</span>
              </div>
            )}
            {photos.length > 0 && (
              <button onClick={toggleAll}
                style={{fontSize:'12px',color:'var(--muted)',background:'transparent',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'8px',padding:'4px 10px',cursor:'pointer',transition:'border-color .15s,color .15s',whiteSpace:'nowrap'}}
                onMouseOver={e=>{e.currentTarget.style.color='var(--gold-light)';e.currentTarget.style.borderColor='rgba(201,150,60,0.3)'}}
                onMouseOut={e=>{e.currentTarget.style.color='var(--muted)';e.currentTarget.style.borderColor='rgba(255,255,255,0.08)'}}>
                {photos.every(p => selected.has(p.id)) ? 'Tout désélectionner' : 'Tout sélectionner'}
              </button>
            )}
            <div style={{fontSize:'12px',color:'var(--muted)'}}>{photos.length} photo{photos.length!==1?'s':''}</div>
          </div>
        </div>
      </header>

      {/* Hero */}
      <div className="hero-section anim-1">
        <h1 style={{fontSize:'clamp(26px,4vw,42px)',fontWeight:700,marginBottom:'10px',lineHeight:1.2}} className="gradient-text">
          {gallery.property_address || 'Vos photos sont prêtes'}
        </h1>
        <div className="gold-line anim-2" style={{width:'48px',marginBottom:'16px'}}/>
        <p style={{color:'var(--muted)',fontSize:'15px',lineHeight:1.7,maxWidth:'500px',margin:'0 auto'}} className="anim-3">
          Sélectionnez les photos que vous souhaitez conserver.<br/>
          Votre sélection est enregistrée automatiquement.
        </p>
      </div>

      {/* Grid */}
      <div style={{maxWidth:'1280px',margin:'0 auto',padding:'8px 20px 100px'}}>
        {photos.length === 0 ? (
          <div style={{textAlign:'center',padding:'80px 0',color:'var(--muted)'}}>
            <div style={{fontSize:'48px',marginBottom:'16px'}}>📷</div>
            <p style={{fontSize:'15px'}}>Aucune photo dans cette galerie.</p>
          </div>
        ) : (
          <div className="photo-grid">
            {photos.map((p, i) => (
              <div key={p.id}
                className={`photo-card${selected.has(p.id) ? ' selected' : ''}`}
                style={{animation:`fadeIn .4s ${Math.min(i*0.04, 0.6)}s both`}}
                onClick={() => togglePhoto(p)}>
                <img src={p.thumb_url || p.full_url} alt={p.name} loading="lazy"/>
                <div className="photo-overlay"/>
                <div className="photo-check">✓</div>
                <div className="photo-num">#{i+1}</div>
                <div className="photo-actions" onClick={e => e.stopPropagation()}>
                  <button className="photo-action-btn" title="Agrandir" onClick={() => openLightbox(p)}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                      <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                    </svg>
                  </button>
                  <button className="photo-action-btn" title="Télécharger" onClick={() => downloadPhoto(p.full_url, p.name)}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                      <polyline points="7 10 12 15 17 10"/>
                      <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                  </button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Sticky bottom bar */}
      <div className="sticky-bar">
        <div style={{maxWidth:'1280px',margin:'0 auto',padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'16px'}}>
          <div>
            <div style={{fontSize:'14px',fontWeight:500}}>
              {selCount === 0
                ? <span style={{color:'var(--muted)'}}>Aucune photo sélectionnée</span>
                : <span style={{color:'var(--gold-light)'}}>{selCount} photo{selCount!==1?'s':''} sélectionnée{selCount!==1?'s':''}</span>}
            </div>
            <div style={{fontSize:'12px',color:'var(--muted)',marginTop:'2px'}}>Cliquez sur les photos pour les sélectionner</div>
          </div>
          <button onClick={confirmSelection} disabled={selCount === 0 || saving}
            className="btn-gold"
            style={{padding:'12px 28px',borderRadius:'12px',fontSize:'14px',flexShrink:0,letterSpacing:'.02em'}}>
            {saving ? '…' : `Confirmer${selCount > 0 ? ` (${selCount})` : ''}`}
          </button>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<GalleryApp/>);
</script>
</body>
</html>
