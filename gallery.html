<!DOCTYPE html>
<html lang="fr" style="background:#ffffff;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <meta name="color-scheme" content="light"/>
  <meta name="supported-color-schemes" content="light"/>
  <title>Galerie Photos — PhotoImmo Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/api/init"></script>
  <style>
    html, body {
      color-scheme: only light !important;
      forced-color-adjust: none !important;
      background-color: #ffffff !important;
    }
    :root {
      color-scheme: only light;
      --gold:     #c9963c;
      --gold-lt:  #e8b96e;
      --bg:       #ffffff;
      --surface:  #f8f7f5;
      --border:   #ebe9e4;
      --text:     #1c1c28;
      --muted:    #8a8a9a;
      --shadow-sm: 0 1px 6px rgba(0,0,0,0.07), 0 3px 12px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; margin: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    h1,h2,h3 { font-family: 'Playfair Display', Georgia, serif; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #d4d0c8; border-radius: 3px; }

    /* Nav */
    .nav {
      position: sticky; top: 0; z-index: 30;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    /* Logo */
    .logo-box {
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(201,150,60,0.25);
    }

    /* Gradient text */
    .gold-text {
      background: linear-gradient(135deg, #b8820a 0%, var(--gold) 50%, var(--gold-lt) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Gold line divider */
    .gold-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* Photo grid */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    @media (max-width: 480px) {
      .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }

    .photo-card {
      position: relative; overflow: hidden; border-radius: 10px;
      aspect-ratio: 4/3; background: var(--surface);
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: var(--shadow-sm);
      transition: transform .22s cubic-bezier(.2,.8,.2,1), box-shadow .22s, border-color .18s;
    }
    .photo-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }
    .photo-card.selected {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px rgba(201,150,60,0.3), var(--shadow-md);
    }

    .photo-card img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .3s cubic-bezier(.2,.8,.2,1);
    }
    .photo-card:hover img { transform: scale(1.03); }

    /* Selection check */
    .photo-check {
      position: absolute; top: 10px; right: 10px;
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      color: #fff; font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.5);
      transition: opacity .18s, transform .22s cubic-bezier(.2,.8,.2,1);
      box-shadow: 0 2px 10px rgba(201,150,60,0.45);
      pointer-events: none;
    }
    .photo-card.selected .photo-check { opacity: 1; transform: scale(1); }

    /* Unselected circle hint */
    .photo-circle {
      position: absolute; top: 10px; right: 10px;
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity .18s;
      pointer-events: none;
    }
    .photo-card:hover .photo-circle { opacity: 1; }
    .photo-card.selected .photo-circle { opacity: 0; }

    /* Actions overlay */
    .photo-actions {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 28px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 100%);
      display: flex; justify-content: flex-end; gap: 6px;
      opacity: 0; transition: opacity .18s;
    }
    .photo-card:hover .photo-actions { opacity: 1; }
    @media (hover: none) { .photo-actions { opacity: 1; } }

    .act-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer;
      transition: background .15s;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }
    .act-btn:hover { background: #fff; }

    /* Sticky bottom bar */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      z-index: 40;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.07);
    }

    /* Gold CTA button */
    .btn-gold {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 50%, var(--gold) 100%);
      background-size: 200% 100%;
      color: #fff; font-weight: 700; border: none; cursor: pointer;
      transition: background-position .35s, box-shadow .25s, transform .15s;
      box-shadow: 0 4px 20px rgba(201,150,60,0.35);
      letter-spacing: .02em;
    }
    .btn-gold:hover:not(:disabled) {
      background-position: 100% 0;
      box-shadow: 0 6px 28px rgba(201,150,60,0.5);
      transform: translateY(-1px);
    }
    .btn-gold:active:not(:disabled) { transform: translateY(0); }
    .btn-gold:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(15,15,20,0.96);
      z-index: 60; display: flex; align-items: center; justify-content: center;
      animation: fadeIn .18s ease;
    }
    .lightbox img {
      max-width: calc(100vw - 100px); max-height: 90vh;
      object-fit: contain; border-radius: 6px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }
    .lb-close {
      position: absolute; top: 16px; right: 20px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 18px; width: 38px; height: 38px;
      border-radius: 50%; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background .15s;
    }
    .lb-close:hover { background: rgba(255,255,255,0.2); }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 22px; width: 46px; height: 46px;
      border-radius: 50%; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background .15s;
    }
    .lb-nav:hover { background: rgba(201,150,60,0.3); border-color: rgba(201,150,60,0.5); }

    /* Toast */
    .toast {
      position: fixed; top: 16px; right: 16px; z-index: 70;
      background: var(--text); color: #fff;
      padding: 10px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      animation: fadeIn .2s ease;
    }

    /* Select-all button */
    .btn-outline {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-weight: 500;
      padding: 5px 12px; border-radius: 8px; cursor: pointer;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    .anim-1 { animation: fadeUp .6s .05s both; }
    .anim-2 { animation: fadeUp .6s .12s both; }
    .anim-3 { animation: fadeUp .6s .20s both; }
    .anim-grid { animation: fadeUp .5s .28s both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const SB_URL = (typeof __SUPABASE_URL__ !== 'undefined' ? __SUPABASE_URL__ : '').replace(/\/+$/, '').split('/rest')[0].split('/auth')[0];
const SB_KEY = typeof __SUPABASE_KEY__ !== 'undefined' ? __SUPABASE_KEY__ : '';

function Spinner() {
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#fff'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:'48px',height:'48px',borderRadius:'14px',background:'linear-gradient(135deg,#c9963c,#e8b96e)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',boxShadow:'0 4px 20px rgba(201,150,60,0.3)'}}>
          <span style={{fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:'15px',color:'#fff'}}>PI</span>
        </div>
        <div style={{width:'32px',height:'2px',background:'linear-gradient(90deg,#c9963c,#e8b96e)',margin:'0 auto 14px',borderRadius:'1px'}}/>
        <p style={{color:'#8a8a9a',fontSize:'13px',letterSpacing:'.04em'}}>Chargement…</p>
      </div>
    </div>
  );
}

function ErrorScreen({ message }) {
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px',background:'#fff'}}>
      <div style={{textAlign:'center',maxWidth:'400px'}} className="anim-1">
        <div style={{fontSize:'48px',marginBottom:'16px'}}>📷</div>
        <h1 style={{fontSize:'26px',fontWeight:700,color:'#1c1c28',marginBottom:'10px',fontFamily:'Playfair Display,serif'}}>Galerie introuvable</h1>
        <div className="gold-line" style={{width:'40px',margin:'0 auto 14px'}}/>
        <p style={{color:'#8a8a9a',lineHeight:1.7,fontSize:'14px'}}>{message || "Cette galerie n'existe pas ou n'est plus disponible."}</p>
      </div>
    </div>
  );
}

function ConfirmScreen({ count }) {
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px',background:'#fff'}}>
      <div style={{textAlign:'center',maxWidth:'420px'}} className="anim-1">
        <div style={{width:'72px',height:'72px',borderRadius:'50%',background:'linear-gradient(135deg,#c9963c,#e8b96e)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 24px',fontSize:'30px',boxShadow:'0 8px 30px rgba(201,150,60,0.35)'}}>✓</div>
        <h1 style={{fontSize:'26px',fontWeight:700,color:'#1c1c28',marginBottom:'10px',fontFamily:'Playfair Display,serif'}}>Sélection confirmée !</h1>
        <div className="gold-line" style={{width:'40px',margin:'0 auto 16px'}}/>
        <p style={{color:'#8a8a9a',lineHeight:1.75,fontSize:'14px'}}>
          Votre sélection de{' '}
          <strong style={{color:'#c9963c'}}>{count} photo{count !== 1 ? 's' : ''}</strong>{' '}
          a bien été enregistrée. Votre photographe en sera informé.
        </p>
      </div>
    </div>
  );
}

function GalleryApp() {
  const [gallery, setGallery] = useState(null);
  const [photos, setPhotos] = useState([]);
  const [selected, setSelected] = useState(new Set());
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [toast, setToast] = useState('');
  const [lightbox, setLightbox] = useState(null);
  const [confirmed, setConfirmed] = useState(false);
  const [saving, setSaving] = useState(false);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

  const token = window.location.pathname.split('/gallery/')[1]?.split('?')[0]?.split('/')[0] || '';

  const downloadPhoto = async (url, filename) => {
    try {
      const res = await fetch(url);
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl; a.download = filename || 'photo.jpg';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
    } catch(_) { window.open(url, '_blank'); }
  };

  const toggleAll = async () => {
    const allSel = photos.length > 0 && photos.every(p => selected.has(p.id));
    const nowSel = !allSel;
    setSelected(new Set(nowSel ? photos.map(p => p.id) : []));
    await Promise.all(photos.map(p =>
      fetch('/api/gallery-select', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ token, photo_id: p.id, selected: nowSel })
      }).catch(() => {})
    ));
  };

  useEffect(() => {
    if (!token) { setError('Lien de galerie invalide.'); setLoading(false); return; }
    if (!SB_URL || !SB_KEY) { setError("Cette galerie n'est pas encore configurée."); setLoading(false); return; }
    const sb = window.supabase.createClient(SB_URL, SB_KEY);
    (async () => {
      const { data, error: gErr } = await sb
        .from('galleries')
        .select('*, gallery_photos(*)')
        .eq('token', token)
        .eq('ready', true)
        .single();
      if (gErr || !data) { setError("Cette galerie n'existe pas ou n'est pas encore disponible."); setLoading(false); return; }
      setGallery(data);
      const sorted = (data.gallery_photos || []).sort((a,b) => (a.created_at||'').localeCompare(b.created_at||''));
      setPhotos(sorted);
      setSelected(new Set(sorted.filter(p => p.selected).map(p => p.id)));
      setLoading(false);
    })();
  }, [token]);

  const togglePhoto = async (photo) => {
    const nowSel = !selected.has(photo.id);
    setSelected(prev => { const n = new Set(prev); nowSel ? n.add(photo.id) : n.delete(photo.id); return n; });
    try {
      const res = await fetch('/api/gallery-select', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ token, photo_id: photo.id, selected: nowSel })
      });
      if (!res.ok) showToast("Erreur d'enregistrement");
    } catch(_) { showToast('Erreur de connexion'); }
  };

  const prevPhoto = () => { const i = photos.findIndex(p => p.id === lightbox?.id); if (i > 0) setLightbox(photos[i-1]); };
  const nextPhoto = () => { const i = photos.findIndex(p => p.id === lightbox?.id); if (i < photos.length-1) setLightbox(photos[i+1]); };

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') setLightbox(null);
      if (e.key === 'ArrowLeft') prevPhoto();
      if (e.key === 'ArrowRight') nextPhoto();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [lightbox, photos]);

  const confirmSelection = async () => {
    setSaving(true);
    await new Promise(r => setTimeout(r, 400));
    setSaving(false);
    setConfirmed(true);
  };

  if (loading) return <Spinner />;
  if (error) return <ErrorScreen message={error} />;
  if (confirmed) return <ConfirmScreen count={selected.size} />;

  const selCount = selected.size;
  const allSel = photos.length > 0 && photos.every(p => selected.has(p.id));
  const lbIndex = photos.findIndex(p => p.id === lightbox?.id);

  return (
    <div style={{minHeight:'100vh', background:'#fff', paddingBottom:'76px'}}>

      {/* Toast */}
      {toast && <div className="toast">{toast}</div>}

      {/* Lightbox */}
      {lightbox && (
        <div className="lightbox" onClick={() => setLightbox(null)}>
          <img src={lightbox.full_url} alt={lightbox.name} onClick={e => e.stopPropagation()}/>
          <button className="lb-close" onClick={() => setLightbox(null)}>×</button>
          {lbIndex > 0 && <button className="lb-nav" style={{left:'14px'}} onClick={e=>{e.stopPropagation();prevPhoto();}}>‹</button>}
          {lbIndex < photos.length-1 && <button className="lb-nav" style={{right:'14px'}} onClick={e=>{e.stopPropagation();nextPhoto();}}>›</button>}
          <div style={{position:'absolute',bottom:'18px',left:'50%',transform:'translateX(-50%)',display:'flex',alignItems:'center',gap:'14px'}}>
            <span style={{color:'rgba(255,255,255,0.5)',fontSize:'12px'}}>{lbIndex+1} / {photos.length}</span>
            <button onClick={e=>{e.stopPropagation();downloadPhoto(lightbox.full_url,lightbox.name);}}
              style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.25)',color:'#fff',padding:'7px 18px',borderRadius:'8px',cursor:'pointer',fontSize:'12px',fontWeight:600,backdropFilter:'blur(8px)'}}>
              ↓ Télécharger
            </button>
          </div>
        </div>
      )}

      {/* Nav */}
      <header className="nav">
        <div style={{maxWidth:'1200px',margin:'0 auto',padding:'13px 20px',display:'flex',alignItems:'center',gap:'12px'}}>
          <div className="logo-box" style={{width:'36px',height:'36px',borderRadius:'10px',flexShrink:0}}>
            <span style={{fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:'12px',color:'#fff',position:'relative',zIndex:1}}>PI</span>
          </div>
          <div>
            <div style={{fontSize:'13px',fontWeight:600,color:'#1c1c28',letterSpacing:'.01em'}}>PhotoImmo Pro</div>
            <div style={{fontSize:'10px',color:'#8a8a9a',marginTop:'1px'}}>Galerie privée</div>
          </div>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'10px'}}>
            {selCount > 0 && (
              <div style={{display:'flex',alignItems:'center',gap:'5px',background:'rgba(201,150,60,0.08)',border:'1px solid rgba(201,150,60,0.25)',borderRadius:'999px',padding:'4px 11px',fontSize:'12px',color:'#c9963c',fontWeight:600}}>
                ✓ {selCount} sélectionnée{selCount>1?'s':''}
              </div>
            )}
            {photos.length > 0 && (
              <button className="btn-outline" onClick={toggleAll}>
                {allSel ? 'Tout désélect.' : 'Tout sélect.'}
              </button>
            )}
            <span style={{fontSize:'11px',color:'#8a8a9a',whiteSpace:'nowrap'}}>{photos.length} photo{photos.length!==1?'s':''}</span>
          </div>
        </div>
      </header>

      {/* Hero */}
      <div style={{maxWidth:'1200px',margin:'0 auto',padding:'36px 20px 24px',textAlign:'center'}} className="anim-1">
        {gallery.property_address && (
          <p style={{fontSize:'11px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--gold)',marginBottom:'10px'}}>
            Galerie immobilière
          </p>
        )}
        <h1 style={{fontSize:'clamp(22px,4vw,38px)',fontWeight:700,color:'#1c1c28',marginBottom:'10px',lineHeight:1.2,textWrap:'balance'}}>
          {gallery.property_address || 'Vos photos sont prêtes'}
        </h1>
        <div className="gold-line anim-2" style={{width:'44px',margin:'0 auto 14px'}}/>
        <p style={{color:'#8a8a9a',fontSize:'14px',lineHeight:1.7,maxWidth:'460px',margin:'0 auto'}} className="anim-3">
          Cliquez sur les photos pour les sélectionner.<br/>
          Votre sélection est enregistrée automatiquement.
        </p>
      </div>

      {/* Grid */}
      <div style={{maxWidth:'1200px',margin:'0 auto',padding:'4px 20px 20px'}} className="anim-grid">
        {photos.length === 0 ? (
          <div style={{textAlign:'center',padding:'80px 0',color:'#8a8a9a'}}>
            <div style={{fontSize:'44px',marginBottom:'14px'}}>📷</div>
            <p style={{fontSize:'14px'}}>Aucune photo dans cette galerie.</p>
          </div>
        ) : (
          <div className="photo-grid">
            {photos.map((p, i) => (
              <div key={p.id}
                className={`photo-card${selected.has(p.id) ? ' selected' : ''}`}
                style={{animationDelay:`${Math.min(i*0.04,0.5)}s`,animation:`fadeIn .4s ${Math.min(i*0.04,0.5)}s both`}}
                onClick={() => togglePhoto(p)}>
                <img src={p.thumb_url || p.full_url} alt={p.name} loading="lazy"/>
                <div className="photo-circle"/>
                <div className="photo-check">✓</div>
                <div className="photo-actions" onClick={e => e.stopPropagation()}>
                  <button className="act-btn" title="Agrandir" onClick={() => setLightbox(p)}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#1c1c28" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                      <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                    </svg>
                  </button>
                  <button className="act-btn" title="Télécharger" onClick={() => downloadPhoto(p.full_url, p.name)}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#1c1c28" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                      <polyline points="7 10 12 15 17 10"/>
                      <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                  </button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Bottom bar */}
      <div className="bottom-bar">
        <div style={{maxWidth:'1200px',margin:'0 auto',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'16px'}}>
          <div>
            <div style={{fontSize:'13px',fontWeight:500,color: selCount > 0 ? '#c9963c' : '#8a8a9a'}}>
              {selCount === 0 ? 'Aucune photo sélectionnée' : `${selCount} photo${selCount!==1?'s':''} sélectionnée${selCount!==1?'s':''}`}
            </div>
            <div style={{fontSize:'11px',color:'#8a8a9a',marginTop:'2px'}}>Cliquez sur les photos pour les sélectionner</div>
          </div>
          <button onClick={confirmSelection} disabled={selCount === 0 || saving}
            className="btn-gold"
            style={{padding:'11px 24px',borderRadius:'10px',fontSize:'13px',flexShrink:0}}>
            {saving ? '…' : `Confirmer${selCount > 0 ? ` (${selCount})` : ''}`}
          </button>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<GalleryApp/>);
</script>
</body>
</html>
