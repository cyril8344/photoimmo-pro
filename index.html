<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <title>PhotoImmo Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{accent:'#f59e0b'}}}}</script>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/api/init"></script>
  <style>
    body{background:#0f1117;color:#e5e7eb;font-family:'Inter',system-ui,sans-serif;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:#1a1d27;}
    ::-webkit-scrollbar-thumb{background:#374151;border-radius:3px;}
    .fade-in{animation:fadeIn .2s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    .sidebar-link{transition:all .15s;}
    input,select,textarea{background:#1a1d27!important;border-color:#374151!important;color:#e5e7eb!important;}
    input::placeholder,textarea::placeholder{color:#6b7280!important;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SB_URL  = typeof __SUPABASE_URL__  !== 'undefined' ? __SUPABASE_URL__  : '';
const SB_KEY  = typeof __SUPABASE_KEY__  !== 'undefined' ? __SUPABASE_KEY__  : '';
const sb = SB_URL && SB_KEY ? window.supabase.createClient(SB_URL, SB_KEY) : null;

const TVA = 0.20;
const PACKS = {
  essentiel: { surface:'50-100', photos:20, visite:'non', drone:'non', retouche:'standard', label:'Pack Essentiel' },
  confort:   { surface:'100-200', photos:30, visite:'oui', drone:'non', retouche:'standard', label:'Pack Confort' },
  premium:   { surface:'>200', photos:50, visite:'oui', drone:'oui', retouche:'premium', label:'Pack Premium' },
};
const TARIFS = {
  surface: {'<50':200,'50-100':300,'100-200':450,'>200':600},
  photos:  {10:0,20:80,30:150,50:280},
  visite:  {non:0,oui:350},
  drone:   {non:0,oui:250},
  retouche:{standard:0,premium:120},
};
const PROPERTY_TYPES=['Appartement','Maison','Villa','Commerce','Bureau','Terrain','Autre'];
const MISSION_STATUSES=['Prospect','Devis envoyé','Accepté','Shooting','Retouche','Livraison','Facturé','Payé'];
const QUOTE_STATUSES=['En attente','Envoyé','Accepté','Refusé'];
const STATUS_COLORS={
  'Prospect':'bg-gray-500/20 text-gray-400',
  'Devis envoyé':'bg-blue-500/20 text-blue-400',
  'Accepté':'bg-green-500/20 text-green-400',
  'Shooting':'bg-orange-500/20 text-orange-400',
  'Retouche':'bg-purple-500/20 text-purple-400',
  'Livraison':'bg-cyan-500/20 text-cyan-400',
  'Facturé':'bg-yellow-500/20 text-yellow-400',
  'Payé':'bg-emerald-500/20 text-emerald-400',
  'À confirmer':'bg-yellow-500/20 text-yellow-400',
  'Confirmé':'bg-blue-500/20 text-blue-400',
  'Réalisé':'bg-green-500/20 text-green-400',
  'Livré':'bg-purple-500/20 text-purple-400',
  'En attente':'bg-gray-500/20 text-gray-400',
  'Envoyé':'bg-blue-500/20 text-blue-400',
  'Refusé':'bg-red-500/20 text-red-400',
};

// ─── LOCAL STORAGE STORE ──────────────────────────────────────────────────────
const store = {
  get:(k,d=[])=>{ try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;} },
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
};
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const today=()=>new Date().toISOString().split('T')[0];
const fmt=(d)=>d?new Date(d).toLocaleDateString('fr-FR'):'—';
const fmtMoney=(n)=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);

// ─── SEED DEMO DATA ──────────────────────────────────────────────────────────
function seedDemo(){
  if(store.get('pii_seeded',false))return;
  const clients=[
    {id:uid(),name:'Martin Dupont',email:'martin@agence-immo.fr',phone:'06 12 34 56 78',agent:'Sophie Bernard',agent_email:'sophie@immo.fr',created_at:today()},
    {id:uid(),name:'Agence Prestige',email:'contact@prestige-immo.fr',phone:'01 23 45 67 89',agent:'Julien Morel',agent_email:'julien@prestige.fr',created_at:today()},
    {id:uid(),name:'Claire Fontaine',email:'claire@fonctions.fr',phone:'07 98 76 54 32',agent:'',agent_email:'',created_at:today()},
  ];
  const missionDate=new Date();missionDate.setDate(missionDate.getDate()+3);
  const missions=[
    {id:uid(),client_id:clients[0].id,address:'12 rue des Lilas, 75015 Paris',type:'Appartement',date:missionDate.toISOString().split('T')[0],status:'Confirmé',notes:'3 pièces, lumineux',created_at:today()},
    {id:uid(),client_id:clients[1].id,address:'45 avenue Foch, 69006 Lyon',type:'Villa',date:today(),status:'Réalisé',notes:'Maison avec piscine',created_at:today()},
    {id:uid(),client_id:clients[2].id,address:'8 bd Haussmann, 75009 Paris',type:'Commerce',date:today(),status:'Livré',notes:'',created_at:today()},
  ];
  const quotes=[
    {id:uid(),client_id:clients[0].id,mission_id:missions[0].id,surface:'50-100',photos:20,visite:'oui',drone:'non',retouche:'standard',ht:730,ttc:876,status:'Envoyé',num:'DEV-001',created_at:today()},
    {id:uid(),client_id:clients[1].id,mission_id:missions[1].id,surface:'>200',photos:50,visite:'oui',drone:'oui',retouche:'premium',ht:1430,ttc:1716,status:'Accepté',num:'DEV-002',created_at:today()},
  ];
  store.set('pii_clients',clients);
  store.set('pii_missions',missions);
  store.set('pii_quotes',quotes);
  store.set('pii_galleries',[]);
  store.set('pii_seeded',true);
}

// ─── UI PRIMITIVES ────────────────────────────────────────────────────────────
const Badge=({s})=><span className={`text-xs px-2 py-0.5 rounded-full font-medium ${STATUS_COLORS[s]||'bg-gray-700 text-gray-300'}`}>{s}</span>;
const Btn=({children,onClick,variant='primary',size='md',disabled,className=''})=>{
  const base='rounded-lg font-medium transition-all focus:outline-none disabled:opacity-40 disabled:cursor-not-allowed';
  const variants={primary:'bg-amber-500 hover:bg-amber-400 text-black',secondary:'bg-gray-700 hover:bg-gray-600 text-gray-100',danger:'bg-red-600 hover:bg-red-500 text-white',ghost:'hover:bg-gray-800 text-gray-300'};
  const sizes={sm:'text-xs px-3 py-1.5',md:'text-sm px-4 py-2',lg:'text-base px-6 py-2.5'};
  return <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>{children}</button>;
};
const Input=({label,value,onChange,type='text',placeholder='',required,className=''})=>(
  <div className={className}>
    {label&&<label className="block text-xs text-gray-400 mb-1">{label}{required&&<span className="text-amber-500 ml-0.5">*</span>}</label>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      className="w-full rounded-lg border text-sm px-3 py-2 focus:outline-none focus:border-amber-500"/>
  </div>
);
const Select=({label,value,onChange,options,className=''})=>(
  <div className={className}>
    {label&&<label className="block text-xs text-gray-400 mb-1">{label}</label>}
    <select value={value} onChange={e=>onChange(e.target.value)} className="w-full rounded-lg border text-sm px-3 py-2 focus:outline-none focus:border-amber-500">
      {options.map(o=><option key={o.value??o} value={o.value??o}>{o.label??o}</option>)}
    </select>
  </div>
);
const Card=({children,className=''})=><div className={`bg-gray-900 border border-gray-800 rounded-xl p-5 ${className}`}>{children}</div>;
const Modal=({title,onClose,children,size='md'})=>(
  <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="absolute inset-0 bg-black/60 backdrop-blur-sm"/>
    <div className={`relative bg-gray-900 border border-gray-700 rounded-2xl w-full ${size==='lg'?'max-w-3xl':size==='xl'?'max-w-5xl':'max-w-lg'} max-h-[90vh] overflow-y-auto fade-in`}>
      <div className="flex items-center justify-between p-5 border-b border-gray-800">
        <h2 className="font-semibold text-lg">{title}</h2>
        <button onClick={onClose} className="text-gray-500 hover:text-white text-xl w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-800">✕</button>
      </div>
      <div className="p-5">{children}</div>
    </div>
  </div>
);
const StatCard=({label,value,sub,icon})=>(
  <Card className="flex items-center gap-4">
    <div className="text-3xl">{icon}</div>
    <div>
      <div className="text-2xl font-bold text-amber-400">{value}</div>
      <div className="text-sm text-gray-400">{label}</div>
      {sub&&<div className="text-xs text-gray-500">{sub}</div>}
    </div>
  </Card>
);

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({clients,missions,quotes}){
  const now=new Date();
  const month=now.getMonth();const year=now.getFullYear();

  // KPIs
  const invoices=store.get('pii_invoices',[]);
  const monthMissions=missions.filter(m=>{const d=new Date(m.date);return d.getMonth()===month&&d.getFullYear()===year;});
  const doneMissions=monthMissions.filter(m=>['Livraison','Facturé','Payé'].includes(m.status));
  const ca=quotes.filter(q=>q.status==='Accepté').reduce((s,q)=>s+q.ttc,0);
  const pendingQuotes=quotes.filter(q=>q.status==='En attente'||q.status==='Envoyé');
  const totalQuoted=quotes.filter(q=>q.status!=='Refusé').length;
  const accepted=quotes.filter(q=>q.status==='Accepté').length;
  const convRate=totalQuoted>0?Math.round(accepted/totalQuoted*100):0;

  // Prochaine mission
  const upcoming=missions.filter(m=>new Date(m.date)>=now).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const nextMission=upcoming[0];

  // Alertes
  const unpaidInvoices=invoices.filter(i=>(i.status==='En attente'||i.status==='Envoyée')&&i.due_date&&new Date(i.due_date)<now);
  const staleQuotes=quotes.filter(q=>(q.status==='En attente'||q.status==='Envoyé')&&q.created_at&&(now-new Date(q.created_at))>48*3600000);
  const quotesWithoutInvoice=quotes.filter(q=>q.status==='Accepté'&&!invoices.find(i=>i.quote_id===q.id));

  const getClient=id=>clients.find(c=>c.id===id);

  // Pipeline kanban simplifié
  const PIPELINE_STATUSES=['Prospect','Devis envoyé','Accepté','Shooting','Retouche','Livraison'];
  const pipelineGroups=PIPELINE_STATUSES.map(s=>({status:s,items:missions.filter(m=>m.status===s)}));

  // CA 6 derniers mois
  const monthLabels=[];const monthCA=[];
  for(let i=5;i>=0;i--){
    const d=new Date(year,month-i,1);
    const mn=d.getMonth();const yr=d.getFullYear();
    monthLabels.push(d.toLocaleDateString('fr-FR',{month:'short'}));
    const mCA=quotes.filter(q=>{
      if(q.status!=='Accepté')return false;
      const qd=new Date(q.created_at);return qd.getMonth()===mn&&qd.getFullYear()===yr;
    }).reduce((s,q)=>s+q.ttc,0);
    monthCA.push(mCA);
  }
  const maxCA=Math.max(...monthCA,1);

  // Top agences (par nombre de devis acceptés)
  const agencyStats={};
  quotes.filter(q=>q.status==='Accepté').forEach(q=>{
    const cl=getClient(q.client_id);if(!cl)return;
    const key=cl.agent||cl.name;
    agencyStats[key]=(agencyStats[key]||0)+q.ttc;
  });
  const topAgencies=Object.entries(agencyStats).sort((a,b)=>b[1]-a[1]).slice(0,5);

  return(
    <div className="fade-in space-y-6">
      {/* Header */}
      <div className="flex items-start justify-between">
        <div>
          <h1 className="text-2xl font-bold">Tableau de bord</h1>
          <p className="text-gray-500 text-sm mt-1">{now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
        </div>
        {nextMission&&(
          <div className="bg-amber-500/10 border border-amber-500/20 rounded-xl px-4 py-2 text-right">
            <div className="text-xs text-amber-400">Prochaine mission</div>
            <div className="text-sm font-medium text-white truncate max-w-48">{nextMission.address}</div>
            <div className="text-xs text-amber-400">{fmt(nextMission.date)}</div>
          </div>
        )}
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <Card className="flex items-center gap-3">
          <div className="text-2xl">💰</div>
          <div><div className="text-xl font-bold text-amber-400">{fmtMoney(ca)}</div><div className="text-xs text-gray-400">CA (devis acceptés)</div></div>
        </Card>
        <Card className="flex items-center gap-3">
          <div className="text-2xl">📅</div>
          <div><div className="text-xl font-bold text-amber-400">{doneMissions.length}</div><div className="text-xs text-gray-400">Missions réalisées ce mois</div></div>
        </Card>
        <Card className="flex items-center gap-3">
          <div className="text-2xl">📄</div>
          <div><div className="text-xl font-bold text-amber-400">{pendingQuotes.length}</div><div className="text-xs text-gray-400">Devis en attente</div></div>
        </Card>
        <Card className="flex items-center gap-3">
          <div className="text-2xl">🎯</div>
          <div><div className="text-xl font-bold text-amber-400">{convRate}%</div><div className="text-xs text-gray-400">Taux de conversion</div></div>
        </Card>
      </div>

      {/* Alertes */}
      {(unpaidInvoices.length>0||staleQuotes.length>0||quotesWithoutInvoice.length>0)&&(
        <Card className="border-red-500/20 bg-red-500/5">
          <h3 className="font-semibold text-red-400 mb-3">⚠ Actions requises</h3>
          <div className="space-y-2">
            {unpaidInvoices.map(i=>(
              <div key={i.id} className="flex items-center justify-between text-sm">
                <span className="text-gray-300">Facture {i.num} en retard — {fmtMoney(i.ttc)}</span>
                <span className="text-red-400 text-xs">Relancer</span>
              </div>
            ))}
            {staleQuotes.map(q=>(
              <div key={q.id} className="flex items-center justify-between text-sm">
                <span className="text-gray-300">Devis {q.num} sans réponse depuis +48h</span>
                <span className="text-amber-400 text-xs">Relancer</span>
              </div>
            ))}
            {quotesWithoutInvoice.slice(0,3).map(q=>(
              <div key={q.id} className="flex items-center justify-between text-sm">
                <span className="text-gray-300">Devis {q.num} accepté — facture manquante</span>
                <span className="text-blue-400 text-xs">Créer facture</span>
              </div>
            ))}
          </div>
        </Card>
      )}

      <div className="grid lg:grid-cols-2 gap-6">
        {/* Pipeline */}
        <Card className="lg:col-span-2">
          <h3 className="font-semibold mb-4">🔄 Pipeline missions</h3>
          <div className="flex gap-3 overflow-x-auto pb-2">
            {pipelineGroups.map(({status,items})=>(
              <div key={status} className="min-w-36 shrink-0">
                <div className="text-xs text-gray-500 mb-2 font-medium">{status} <span className="text-gray-600">({items.length})</span></div>
                <div className="space-y-2">
                  {items.slice(0,4).map(m=>(
                    <div key={m.id} className="bg-gray-800 rounded-lg p-2 text-xs">
                      <div className="text-gray-300 truncate">{m.address.split(',')[0]}</div>
                      <div className="text-gray-600">{fmt(m.date)}</div>
                    </div>
                  ))}
                  {items.length===0&&<div className="bg-gray-800/50 rounded-lg p-3 text-xs text-gray-600 text-center border border-dashed border-gray-700">Vide</div>}
                </div>
              </div>
            ))}
          </div>
        </Card>

        {/* CA 6 mois */}
        <Card>
          <h3 className="font-semibold mb-4">📈 CA 6 derniers mois</h3>
          <div className="flex items-end gap-2 h-32">
            {monthLabels.map((label,i)=>(
              <div key={label} className="flex-1 flex flex-col items-center gap-1">
                <div className="w-full bg-amber-500/80 rounded-t-md transition-all" style={{height:`${Math.max(4,(monthCA[i]/maxCA)*100)}%`}}/>
                <div className="text-xs text-gray-500">{label}</div>
              </div>
            ))}
          </div>
          <div className="flex justify-between text-xs text-gray-600 mt-2">
            <span>0 €</span><span>{fmtMoney(maxCA)}</span>
          </div>
        </Card>

        {/* Top agences */}
        <Card>
          <h3 className="font-semibold mb-4">🏆 Top agences / clients</h3>
          {topAgencies.length===0?<p className="text-gray-500 text-sm">Pas encore de données</p>:(
            <div className="space-y-3">
              {topAgencies.map(([name,total],i)=>(
                <div key={name} className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <span className="text-amber-400 font-bold text-sm w-4">{i+1}</span>
                    <span className="text-sm truncate max-w-32">{name}</span>
                  </div>
                  <span className="text-sm font-medium text-amber-400">{fmtMoney(total)}</span>
                </div>
              ))}
            </div>
          )}
        </Card>

        {/* Prochaines missions */}
        <Card>
          <h3 className="font-semibold mb-4">📅 Prochaines missions</h3>
          {upcoming.length===0?<p className="text-gray-500 text-sm">Aucune mission à venir</p>:(
            <div className="space-y-3">
              {upcoming.slice(0,5).map(m=>(
                <div key={m.id} className="flex items-center justify-between py-2 border-b border-gray-800 last:border-0">
                  <div>
                    <div className="text-sm font-medium truncate max-w-40">{m.address}</div>
                    <div className="text-xs text-gray-500">{getClient(m.client_id)?.name} · {m.type}</div>
                  </div>
                  <div className="text-right shrink-0">
                    <div className="text-xs text-amber-400 font-medium">{fmt(m.date)}</div>
                    <span className={`text-xs px-1.5 py-0.5 rounded-full font-medium ${STATUS_COLORS[m.status]||'bg-gray-700 text-gray-300'}`}>{m.status}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>

        {/* Missions par statut */}
        <Card>
          <h3 className="font-semibold mb-4">📊 Missions par statut</h3>
          {MISSION_STATUSES.map(s=>{
            const count=missions.filter(m=>m.status===s).length;
            const pct=missions.length?Math.round(count/missions.length*100):0;
            return(
              <div key={s} className="mb-2">
                <div className="flex justify-between text-xs mb-1"><span className="text-gray-400">{s}</span><span>{count}</span></div>
                <div className="h-1.5 bg-gray-800 rounded-full"><div className="h-full bg-amber-500 rounded-full transition-all" style={{width:`${pct}%`}}/></div>
              </div>
            );
          })}
        </Card>
      </div>
    </div>
  );
}

// ─── CLIENTS ─────────────────────────────────────────────────────────────────
function ClientsPage({clients,setClients,missions,quotes,setPage,setSelected}){
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({name:'',email:'',phone:'',agent:'',agent_email:''});
  const filtered=clients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.email.toLowerCase().includes(search.toLowerCase()));

  const save=()=>{
    if(!form.name||form.name.trim().length<2)return;
    if(form.email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)){alert('Email invalide');return;}
    if(modal==='new'){
      const c={...form,id:uid(),created_at:today()};
      const updated=[...clients,c];setClients(updated);store.set('pii_clients',updated);
    } else {
      const updated=clients.map(c=>c.id===modal?{...c,...form}:c);setClients(updated);store.set('pii_clients',updated);
    }
    setModal(null);
  };
  const del=(id)=>{
    if(!confirm('Supprimer ce client ?'))return;
    const updated=clients.filter(c=>c.id!==id);setClients(updated);store.set('pii_clients',updated);
  };
  const openEdit=(c)=>{setForm({name:c.name,email:c.email,phone:c.phone,agent:c.agent,agent_email:c.agent_email});setModal(c.id);};
  const openNew=()=>{setForm({name:'',email:'',phone:'',agent:'',agent_email:''});setModal('new');};

  return(
    <div className="fade-in space-y-5">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold">Clients</h1>
        <Btn onClick={openNew}>+ Nouveau client</Btn>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher un client…"
        className="w-full max-w-sm rounded-lg border border-gray-700 bg-gray-900 text-sm px-3 py-2 focus:outline-none focus:border-amber-500"/>
      <div className="grid gap-3">
        {filtered.length===0&&<p className="text-gray-500 text-sm">Aucun client trouvé</p>}
        {filtered.map(c=>{
          const cm=missions.filter(m=>m.client_id===c.id).length;
          const cq=quotes.filter(q=>q.client_id===c.id).length;
          return(
            <Card key={c.id} className="flex items-center justify-between hover:border-gray-700 transition-colors">
              <div className="flex items-center gap-4">
                <div className="w-10 h-10 rounded-full bg-amber-500/20 flex items-center justify-center text-amber-400 font-bold text-sm">{c.name[0]}</div>
                <div>
                  <div className="font-medium">{c.name}</div>

// ─── DEVIS ────────────────────────────────────────────────────────────────────
function calcDevis(form){
  const ht=(TARIFS.surface[form.surface]||0)+(TARIFS.photos[+form.photos]||0)+(TARIFS.visite[form.visite]||0)+(TARIFS.drone[form.drone]||0)+(TARIFS.retouche[form.retouche]||0);
  return {ht, tva:Math.round(ht*TVA*100)/100, ttc:Math.round(ht*(1+TVA)*100)/100};
}

function exportPDF(q,client,mission){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const amber=[245,158,11];
  const gray=[55,65,81];

  doc.setFillColor(...amber);doc.rect(0,0,210,35,'F');
  doc.setTextColor(0,0,0);doc.setFontSize(22);doc.setFont('helvetica','bold');
  doc.text('DEVIS PHOTOGRAPHIE IMMOBILIÈRE',105,18,{align:'center'});
  doc.setFontSize(11);doc.setFont('helvetica','normal');
  doc.text(`N° ${q.num} · ${fmt(q.created_at)}`,105,27,{align:'center'});

  doc.setTextColor(...gray);doc.setFontSize(10);
  doc.text('CLIENT',14,48);doc.setFont('helvetica','bold');doc.setTextColor(0,0,0);
  doc.text(client?.name||'—',14,55);doc.setFont('helvetica','normal');doc.setTextColor(...gray);
  doc.text(client?.email||'',14,61);doc.text(client?.phone||'',14,67);

  if(mission){
    doc.setFont('helvetica','bold');doc.setTextColor(...gray);doc.text('BIEN',130,48);
    doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
    doc.text(mission.address||'',130,55,{maxWidth:65});
    doc.text(mission.type||'',130,61);doc.text(fmt(mission.date),130,67);
  }

  doc.setDrawColor(...amber);doc.setLineWidth(0.5);doc.line(14,75,196,75);

  const rows=[
    ['Forfait de base (surface '+q.surface+'m²)',TARIFS.surface[q.surface]],
    ['Photos ('+q.photos+' prises de vue)',TARIFS.photos[+q.photos]],
    ['Visite virtuelle 360°',TARIFS.visite[q.visite]],
    ['Prise de vue drone',TARIFS.drone[q.drone]],
    ['Retouches '+q.retouche,TARIFS.retouche[q.retouche]],
  ].filter(r=>r[1]>0);

  let y=85;
  doc.setFontSize(9);doc.setTextColor(...gray);
  doc.text('PRESTATION',14,y);doc.text('MONTANT HT',175,y,{align:'right'});
  y+=5;doc.setDrawColor(200,200,200);doc.line(14,y,196,y);y+=6;

  doc.setTextColor(0,0,0);
  rows.forEach(([label,val])=>{
    doc.text(label,14,y);doc.text(fmtMoney(val),175,y,{align:'right'});y+=8;
  });

  doc.line(14,y,196,y);y+=6;
  doc.setFont('helvetica','bold');
  doc.text('Total HT',130,y);doc.text(fmtMoney(q.ht),175,y,{align:'right'});y+=7;
  doc.setFont('helvetica','normal');doc.setTextColor(...gray);
  doc.text('TVA 20%',130,y);doc.text(fmtMoney(q.tva),175,y,{align:'right'});y+=7;
  doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...amber);
  doc.text('TOTAL TTC',130,y);doc.text(fmtMoney(q.ttc),175,y,{align:'right'});y+=12;

  doc.setFontSize(8);doc.setTextColor(150,150,150);doc.setFont('helvetica','normal');
  doc.text('Devis valable 30 jours. Acompte de 30% à la commande.',14,y);
  doc.text(`Généré le ${fmt(today())} par PhotoImmo Pro`,196,y,{align:'right'});

  doc.save(`devis-${q.num}.pdf`);
}

  doc.setTextColor(...gray);

  legal.forEach(line => { doc.text(line, 14, y); y += 5; });

  doc.save('facture-' + inv.num + '.pdf');
}

async function sendInvoiceEmail(inv, client) {
  try {
    const res = await fetch('/api/notify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        type: 'invoice_sent',
        to: client.email,
        data: {
          client_name: client.name,
          num: inv.num,
          ttc: fmtMoney(inv.ttc),
          due_date: fmt(inv.due_date),
          pdf_base64: null
        }
      })
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || 'Erreur envoi');
    return {success: true};
  } catch(err) {
    return {success: false, error: err.message};
  }
}

// ─── LIVRAISONS ───────────────────────────────────────────────────────────────
function DeliveryPage({missions,clients,galleries,setGalleries}){
  const [modal,setModal]=useState(null);
  const [viewGallery,setViewGallery]=useState(null);
  const [photos,setPhotos]=useState([]);
  const getClient=id=>clients.find(c=>c.id===id);
  const done=missions.filter(m=>m.status==='Réalisé'||m.status==='Livré');

  const getGallery=mId=>galleries.find(g=>g.mission_id===mId);

  const createGallery=(mId)=>{
    const token=uid();
    const g={id:uid(),mission_id:mId,token,photos:[],ready:false,created_at:today()};
    const u=[...galleries,g];setGalleries(u);store.set('pii_galleries',u);
  };
  const toggleReady=(gId)=>{
    const u=galleries.map(g=>g.id===gId?{...g,ready:!g.ready}:g);setGalleries(u);store.set('pii_galleries',u);
  };
  const openGallery=(g)=>{setViewGallery(g);setPhotos(g.photos||[]);};

  const handleUpload=(e)=>{
    const files=Array.from(e.target.files);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        const p={id:uid(),name:file.name,url:ev.target.result,selected:false};
        setPhotos(prev=>{
          const u=[...prev,p];
          const gu=galleries.map(g=>g.id===viewGallery.id?{...g,photos:u}:g);
          store.set('pii_galleries',gu);setGalleries(gu);
          return u;
        });
      };
      reader.readAsDataURL(file);
    });
  };

  const toggleSelect=(pid)=>{
    setPhotos(prev=>{
      const u=prev.map(p=>p.id===pid?{...p,selected:!p.selected}:p);
      const gu=galleries.map(g=>g.id===viewGallery.id?{...g,photos:u}:g);
      store.set('pii_galleries',gu);setGalleries(gu);return u;
    });
  };

  const copyLink=(token)=>{
    navigator.clipboard.writeText(`${location.origin}/gallery/${token}`);
    alert('Lien copié !');
  };

  return(
    <div className="fade-in space-y-5">
      <h1 className="text-2xl font-bold">Livraisons</h1>
      <div className="space-y-3">
        {done.length===0&&<p className="text-gray-500 text-sm">Aucune mission réalisée</p>}
        {done.map(m=>{
          const cl=getClient(m.client_id);
          const g=getGallery(m.id);
          return(
            <Card key={m.id} className="hover:border-gray-700 transition-colors">
              <div className="flex items-center justify-between gap-4">
                <div>
                  <div className="flex items-center gap-2 mb-1"><Badge s={m.status}/><span className="text-xs text-gray-500">{m.type}</span></div>
                  <div className="font-medium">{m.address}</div>
                  <div className="text-sm text-gray-400">{cl?.name}</div>
                  <div className="text-xs text-gray-500">{fmt(m.date)}</div>
                </div>
                <div className="flex flex-col gap-2 items-end">
                  {!g?(
                    <Btn size="sm" onClick={()=>createGallery(m.id)}>🖼️ Créer galerie</Btn>
                  ):(
                    <>
                      <div className="flex items-center gap-2">
                        <span className={`text-xs px-2 py-1 rounded-full ${g.ready?'bg-green-500/20 text-green-400':'bg-gray-700 text-gray-400'}`}>
                          {g.ready?'✓ Publiée':'Brouillon'}
                        </span>
                        <span className="text-xs text-gray-500">{g.photos?.length||0} photos</span>
                      </div>
                      <div className="flex gap-1">
                        <Btn size="sm" variant="ghost" onClick={()=>openGallery(g)}>✏️ Gérer</Btn>
                        <Btn size="sm" variant="ghost" onClick={()=>copyLink(g.token)}>🔗 Lien</Btn>
                        <Btn size="sm" variant={g.ready?'secondary':'primary'} onClick={()=>toggleReady(g.id)}>
                          {g.ready?'Dépublier':'Publier'}
                        </Btn>
                      </div>
                    </>
                  )}
                </div>
              </div>
            </Card>
          );
        })}
      </div>

      {viewGallery&&(
        <Modal title={`Galerie – ${missions.find(m=>m.id===viewGallery.mission_id)?.address||''}`} onClose={()=>setViewGallery(null)} size="xl">
          <div className="space-y-4">
            <div className="flex items-center gap-3">
              <label className="cursor-pointer">
                <input type="file" multiple accept="image/*" className="hidden" onChange={handleUpload}/>
                <span className="bg-amber-500 hover:bg-amber-400 text-black text-sm font-medium px-4 py-2 rounded-lg transition-all">+ Ajouter des photos</span>
              </label>
              <span className="text-xs text-gray-500">{photos.length} photo{photos.length!==1?'s':''} · {photos.filter(p=>p.selected).length} sélectionnée{photos.filter(p=>p.selected).length!==1?'s':''}</span>
            </div>
            {photos.length===0?(
              <div className="text-center py-16 text-gray-600">
                <div className="text-5xl mb-3">🖼️</div>
                <p>Aucune photo encore. Cliquez pour en ajouter.</p>
              </div>
            ):(
              <div className="grid grid-cols-3 md:grid-cols-4 gap-3 max-h-96 overflow-y-auto">
                {photos.map(p=>(
                  <div key={p.id} className={`relative group cursor-pointer rounded-lg overflow-hidden border-2 transition-all ${p.selected?'border-amber-500':'border-transparent'}`} onClick={()=>toggleSelect(p.id)}>
                    <img src={p.url} alt={p.name} className="w-full h-24 object-cover"/>
                    <div className={`absolute inset-0 flex items-center justify-center transition-all ${p.selected?'bg-amber-500/30':'bg-black/0 group-hover:bg-black/30'}`}>
                      {p.selected&&<span className="text-2xl">⭐</span>}
                    </div>
                    <div className="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/70 p-1">
                      <p className="text-xs text-white truncate">{p.name}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
            <p className="text-xs text-gray-500">Cliquez sur une photo pour la marquer comme favorite (⭐). Le client pourra sélectionner ses photos depuis le lien de livraison.</p>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── FACTURES ─────────────────────────────────────────────────────────────────
function InvoicesPage({quotes,clients,missions}){
  const [invoices,setInvoices]=useState(()=>store.get('pii_invoices',[]));
  const [filter,setFilter]=useState('Tous');

  const getClient=id=>clients.find(c=>c.id===id);
  const getMission=id=>missions.find(m=>m.id===id);

  const createFromQuote=(q)=>{
    if(invoices.find(i=>i.quote_id===q.id)){alert('Une facture existe déjà pour ce devis.');return;}
    const num=`FAC-${String(invoices.length+1).padStart(3,'0')}`;
    const dueDate=new Date();dueDate.setDate(dueDate.getDate()+30);
    const inv={
      id:uid(),quote_id:q.id,client_id:q.client_id,mission_id:q.mission_id,
      num,ht:q.ht,tva:q.tva||Math.round(q.ht*0.20*100)/100,ttc:q.ttc,
      status:'En attente',due_date:dueDate.toISOString().split('T')[0],
      reminders_sent:0,created_at:today()
    };
    const u=[...invoices,inv];setInvoices(u);store.set('pii_invoices',u);
  };

  const setStatus=(id,status)=>{
    const u=invoices.map(i=>i.id===id?{...i,status,paid_date:status==='Payée'?today():i.paid_date}:i);
    setInvoices(u);store.set('pii_invoices',u);
  };

  const del=(id)=>{if(!confirm('Supprimer cette facture ?'))return;const u=invoices.filter(i=>i.id!==id);setInvoices(u);store.set('pii_invoices',u);};

  const INVOICE_STATUSES=['En attente','Envoyée','Payée','Annulée'];
  const INV_COLORS={'En attente':'bg-gray-500/20 text-gray-400','Envoyée':'bg-blue-500/20 text-blue-400','Payée':'bg-green-500/20 text-green-400','Annulée':'bg-red-500/20 text-red-400'};

  const filtered=filter==='Tous'?invoices:invoices.filter(i=>i.status===filter);
  const unpaid=invoices.filter(i=>i.status==='En attente'||i.status==='Envoyée');
  const totalUnpaid=unpaid.reduce((s,i)=>s+i.ttc,0);

  // Devis acceptés sans facture
  const quotesWithoutInvoice=quotes.filter(q=>q.status==='Accepté'&&!invoices.find(i=>i.quote_id===q.id));

  return(
    <div className="fade-in space-y-5">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold">Factures</h1>
        {unpaid.length>0&&<div className="text-sm text-red-400 font-medium">{fmtMoney(totalUnpaid)} impayé{unpaid.length>1?'s':''}</div>}
      </div>

      {quotesWithoutInvoice.length>0&&(
        <Card className="border-amber-500/30 bg-amber-500/5">
          <div className="text-sm font-medium text-amber-400 mb-3">⚡ Devis acceptés sans facture</div>
          <div className="space-y-2">
            {quotesWithoutInvoice.map(q=>{
              const cl=getClient(q.client_id);
              return(
                <div key={q.id} className="flex items-center justify-between">
                  <span className="text-sm">{q.num} — {cl?.name} — {fmtMoney(q.ttc)}</span>
                  <Btn size="sm" onClick={()=>createFromQuote(q)}>Créer facture</Btn>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      <div className="flex gap-2 flex-wrap">
        {['Tous',...INVOICE_STATUSES].map(s=>(
          <button key={s} onClick={()=>setFilter(s)} className={`text-sm px-3 py-1.5 rounded-lg transition-all ${filter===s?'bg-amber-500 text-black':'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>{s}</button>
        ))}
      </div>

      <div className="space-y-3">
        {filtered.length===0&&<p className="text-gray-500 text-sm">Aucune facture</p>}
        {filtered.map(inv=>{
          const cl=getClient(inv.client_id);
          const overdue=inv.status!=='Payée'&&inv.status!=='Annulée'&&inv.due_date&&new Date(inv.due_date)<new Date();
          return(
            <Card key={inv.id} className={`hover:border-gray-700 transition-colors ${overdue?'border-red-500/30':''}`}>
              <div className="flex items-center justify-between gap-4">
                <div>
                  <div className="flex items-center gap-2 mb-1">
                    <span className="font-mono text-sm font-bold text-amber-400">{inv.num}</span>
                    <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${INV_COLORS[inv.status]||'bg-gray-700 text-gray-300'}`}>{inv.status}</span>
                    {overdue&&<span className="text-xs text-red-400 font-medium">⚠ En retard</span>}
                  </div>
                  <div className="font-medium">{cl?.name||'—'}</div>
                  <div className="text-xs text-gray-500">Échéance : {fmt(inv.due_date)}</div>
                </div>
                <div className="text-right">
                  <div className="text-lg font-bold text-amber-400">{fmtMoney(inv.ttc)}</div>
                  <div className="flex gap-1 mt-2 justify-end">
                    <select value={inv.status} onChange={e=>setStatus(inv.id,e.target.value)}
                      className="text-xs rounded px-2 py-1 bg-gray-800 border border-gray-700 text-gray-300 focus:outline-none">
                      {INVOICE_STATUSES.map(s=><option key={s}>{s}</option>)}
                    </select>
                    <Btn size="sm" variant="ghost" onClick={()=>exportInvoicePDF(inv,cl,getMission(inv.mission_id),quotes.find(q=>q.id===inv.quote_id))}>📄 PDF</Btn>
                    {cl?.email && (
                      <Btn size="sm" variant="ghost" onClick={async()=>{
                        const r = await sendInvoiceEmail(inv, cl);
                        alert(r.success ? 'Email envoyé !' : 'Erreur : ' + r.error);
                      }}>📧 Email</Btn>
                    )}
                    {inv.status !== 'Payée' && (
                      <Btn size="sm" variant="secondary" onClick={()=>setStatus(inv.id, 'Payée')}>✓ Payée</Btn>
                    )}
                    <Btn size="sm" variant="ghost" onClick={()=>del(inv.id)}>🗑️</Btn>
                  </div>
                </div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ─── ACCOUNTING ───────────────────────────────────────────────────────────────
function AccountingPage({quotes, clients, missions}) {
  const [invoices, setInvoices] = useState(() => store.get('pii_invoices', []));
  const [viewMode, setViewMode] = useState('monthly'); // 'monthly' | 'annual'
  const now = new Date();
  const [selMonth, setSelMonth] = useState(now.getMonth());
  const [selYear, setSelYear] = useState(now.getFullYear());
  const [filterStatus, setFilterStatus] = useState('Tous');

  const getClient = id => clients.find(c => c.id === id);

  // Filter invoices
  const filteredInvoices = invoices.filter(inv => {
    const d = new Date(inv.created_at);
    const matchPeriod = viewMode === 'annual'
      ? d.getFullYear() === selYear
      : d.getMonth() === selMonth && d.getFullYear() === selYear;
    const matchStatus = filterStatus === 'Tous' || inv.status === filterStatus;
    return matchPeriod && matchStatus;
  });

  // KPIs
  const totalHT = filteredInvoices.reduce((s, i) => s + (i.ht || 0), 0);
  const totalTVA = filteredInvoices.reduce((s, i) => s + (i.tva || Math.round((i.ht || 0) * 0.20 * 100) / 100), 0);
  const totalTTC = filteredInvoices.reduce((s, i) => s + (i.ttc || 0), 0);
  const unpaidInvs = invoices.filter(i => i.status !== 'Payée' && i.status !== 'Annulée');
  const totalUnpaid = unpaidInvs.reduce((s, i) => s + (i.ttc || 0), 0);

  // 12 months rolling chart data
  const chartMonths = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const mn = d.getMonth();
    const yr = d.getFullYear();
    const label = d.toLocaleDateString('fr-FR', {month: 'short'});
    const ca = invoices
      .filter(inv => { const id = new Date(inv.created_at); return id.getMonth() === mn && id.getFullYear() === yr; })
      .reduce((s, inv) => s + (inv.ttc || 0), 0);
    chartMonths.push({label, ca, month: mn, year: yr});
  }
  const maxCA = Math.max(...chartMonths.map(m => m.ca), 1);

  // CSV export
  const exportCSV = () => {
    const header = 'Numéro,Client,Date,HT,TVA,TTC,Statut,Echéance,Date paiement\n';
    const rows = filteredInvoices.map(inv => {
      const cl = getClient(inv.client_id);
      const tva = inv.tva || Math.round((inv.ht || 0) * 0.20 * 100) / 100;
      return [
        inv.num, cl?.name || '', inv.created_at,
        (inv.ht || 0).toFixed(2), tva.toFixed(2), (inv.ttc || 0).toFixed(2),
        inv.status, inv.due_date || '', inv.paid_date || ''
      ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
    }).join('\n');
    const blob = new Blob(['﻿' + header + rows], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    const period = viewMode === 'annual' ? selYear : `${selYear}-${String(selMonth+1).padStart(2,'0')}`;
    a.download = `comptabilite-${period}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  // PDF export
  const exportPDFBilan = () => {
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF();
    const amber = [245, 158, 11];
    const gray = [107, 114, 128];
    const period = viewMode === 'annual' ? String(selYear) : new Date(selYear, selMonth).toLocaleDateString('fr-FR', {month:'long',year:'numeric'});

    doc.setFillColor(...amber);
    doc.rect(0, 0, 210, 35, 'F');
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text('BILAN COMPTABLE', 105, 16, {align: 'center'});
    doc.setFontSize(12);
    doc.setFont('helvetica', 'normal');
    doc.text(period, 105, 26, {align: 'center'});

    let y = 50;
    doc.setTextColor(...gray);
    doc.setFontSize(10);
    doc.text('Total HT : ' + fmtMoney(totalHT), 14, y); y += 8;
    doc.text('Total TVA : ' + fmtMoney(totalTVA), 14, y); y += 8;
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...amber);
    doc.text('Total TTC : ' + fmtMoney(totalTTC), 14, y); y += 8;
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...gray);
    doc.text('Factures : ' + filteredInvoices.length, 14, y); y += 8;
    doc.text('Impayés : ' + fmtMoney(totalUnpaid), 14, y); y += 14;

    // Table
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(8);
    doc.text('N°', 14, y);
    doc.text('Client', 35, y);
    doc.text('Date', 90, y);
    doc.text('HT', 120, y, {align: 'right'});
    doc.text('TTC', 148, y, {align: 'right'});
    doc.text('Statut', 165, y);
    y += 5;
    doc.setDrawColor(...amber);
    doc.line(14, y, 196, y); y += 5;

    doc.setFont('helvetica', 'normal');
    filteredInvoices.forEach(inv => {
      const cl = getClient(inv.client_id);
      doc.text(inv.num || '', 14, y);
      doc.text((cl?.name || '').substring(0, 25), 35, y);
      doc.text(inv.created_at || '', 90, y);
      doc.text(fmtMoney(inv.ht || 0), 120, y, {align: 'right'});
      doc.text(fmtMoney(inv.ttc || 0), 148, y, {align: 'right'});
      doc.text(inv.status || '', 165, y);
      y += 7;
      if (y > 270) { doc.addPage(); y = 20; }
    });

    doc.save('bilan-' + period.replace(/\s/g, '-') + '.pdf');
  };

  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const years = [now.getFullYear(), now.getFullYear()-1, now.getFullYear()-2];
  const INVOICE_STATUSES = ['En attente', 'Envoyée', 'Payée', 'Annulée'];
  const INV_COLORS = {'En attente':'bg-gray-500/20 text-gray-400','Envoyée':'bg-blue-500/20 text-blue-400','Payée':'bg-green-500/20 text-green-400','Annulée':'bg-red-500/20 text-red-400'};

  return (
    <div className="fade-in space-y-6">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <h1 className="text-2xl font-bold">Comptabilité</h1>
        <div className="flex gap-2">
          <Btn variant="secondary" size="sm" onClick={exportCSV}>📥 CSV</Btn>
          <Btn variant="secondary" size="sm" onClick={exportPDFBilan}>📄 PDF Bilan</Btn>
        </div>
      </div>

      {/* Filters */}
      <Card>
        <div className="flex flex-wrap gap-4 items-end">
          <div>
            <div className="text-xs text-gray-400 mb-1">Période</div>
            <div className="flex rounded-lg overflow-hidden border border-gray-700">
              <button onClick={()=>setViewMode('monthly')} className={`px-3 py-1.5 text-sm ${viewMode==='monthly'?'bg-amber-500 text-black':'bg-gray-800 text-gray-400'}`}>Mensuel</button>
              <button onClick={()=>setViewMode('annual')} className={`px-3 py-1.5 text-sm ${viewMode==='annual'?'bg-amber-500 text-black':'bg-gray-800 text-gray-400'}`}>Annuel</button>
            </div>
          </div>
          {viewMode === 'monthly' && (
            <Select label="Mois" value={String(selMonth)} onChange={v=>setSelMonth(+v)} className="w-36"
              options={MONTHS.map((m,i)=>({value:String(i),label:m}))}/>
          )}
          <Select label="Année" value={String(selYear)} onChange={v=>setSelYear(+v)} className="w-28"
            options={years.map(y=>({value:String(y),label:String(y)}))}/>
          <Select label="Statut" value={filterStatus} onChange={setFilterStatus} className="w-36"
            options={['Tous',...INVOICE_STATUSES].map(s=>({value:s,label:s}))}/>
        </div>
      </Card>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <Card>
          <div className="text-xs text-gray-400 mb-1">Total HT</div>
          <div className="text-xl font-bold text-amber-400">{fmtMoney(totalHT)}</div>
        </Card>
        <Card>
          <div className="text-xs text-gray-400 mb-1">TVA collectée</div>
          <div className="text-xl font-bold text-amber-400">{fmtMoney(totalTVA)}</div>
        </Card>
        <Card>
          <div className="text-xs text-gray-400 mb-1">Total TTC</div>
          <div className="text-xl font-bold text-amber-400">{fmtMoney(totalTTC)}</div>
        </Card>
        <Card>
          <div className="text-xs text-gray-400 mb-1">Impayés</div>
          <div className="text-xl font-bold text-red-400">{fmtMoney(totalUnpaid)}</div>
          <div className="text-xs text-gray-500">{unpaidInvs.length} facture{unpaidInvs.length!==1?'s':''}</div>
        </Card>
      </div>

      {/* Chart 12 months */}
      <Card>
        <h3 className="font-semibold mb-4">📈 CA TTC — 12 derniers mois</h3>
        <div className="flex items-end gap-1.5 h-40 overflow-x-auto pb-2">
          {chartMonths.map((m, i) => (
            <div key={i} className="flex-1 min-w-8 flex flex-col items-center gap-1">
              <div className="text-xs text-gray-500 font-mono">{m.ca > 0 ? fmtMoney(m.ca).replace(/\s€/,'') : ''}</div>
              <div className="w-full flex flex-col justify-end" style={{height:'80px'}}>
                <div className="w-full bg-amber-500/80 rounded-t-sm transition-all" style={{height:`${Math.max(2,(m.ca/maxCA)*100)}%`}}/>
              </div>
              <div className="text-xs text-gray-500 truncate w-full text-center">{m.label}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* Invoices table */}
      <Card>
        <h3 className="font-semibold mb-4">Tableau des factures ({filteredInvoices.length})</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-sm min-w-[600px]">
            <thead>
              <tr className="border-b border-gray-700 text-xs text-gray-400">
                <th className="text-left pb-2 font-medium">N° Facture</th>
                <th className="text-left pb-2 font-medium">Client</th>
                <th className="text-left pb-2 font-medium">Date</th>
                <th className="text-right pb-2 font-medium">HT</th>
                <th className="text-right pb-2 font-medium">TVA</th>
                <th className="text-right pb-2 font-medium">TTC</th>
                <th className="text-left pb-2 font-medium">Statut</th>
                <th className="text-left pb-2 font-medium">Échéance</th>
              </tr>
            </thead>
            <tbody>
              {filteredInvoices.length === 0 && (
                <tr><td colSpan="8" className="text-gray-500 py-6 text-center">Aucune facture sur cette période</td></tr>
              )}
              {filteredInvoices.map(inv => {
                const cl = getClient(inv.client_id);
                const tva = inv.tva || Math.round((inv.ht || 0) * 0.20 * 100) / 100;
                const overdue = inv.status !== 'Payée' && inv.status !== 'Annulée' && inv.due_date && new Date(inv.due_date) < new Date();
                return (
                  <tr key={inv.id} className={`border-b border-gray-800 ${overdue ? 'bg-red-500/5' : ''}`}>
                    <td className="py-2.5 font-mono text-amber-400 font-bold">{inv.num}</td>
                    <td className="py-2.5 text-gray-300">{cl?.name || '—'}</td>
                    <td className="py-2.5 text-gray-400">{fmt(inv.created_at)}</td>
                    <td className="py-2.5 text-right">{fmtMoney(inv.ht || 0)}</td>
                    <td className="py-2.5 text-right text-gray-400">{fmtMoney(tva)}</td>
                    <td className="py-2.5 text-right font-bold">{fmtMoney(inv.ttc || 0)}</td>
                    <td className="py-2.5"><span className={`text-xs px-2 py-0.5 rounded-full ${INV_COLORS[inv.status]||'bg-gray-700 text-gray-300'}`}>{inv.status}</span>{overdue&&<span className="text-red-400 text-xs ml-1">⚠</span>}</td>
                    <td className="py-2.5 text-gray-400">{fmt(inv.due_date)}</td>
                  </tr>
                );
              })}
            </tbody>
            {filteredInvoices.length > 0 && (
              <tfoot>
                <tr className="border-t border-amber-500/30 font-bold">
                  <td colSpan="3" className="pt-3 text-gray-400">Total période</td>
                  <td className="pt-3 text-right">{fmtMoney(totalHT)}</td>
                  <td className="pt-3 text-right text-gray-400">{fmtMoney(totalTVA)}</td>
                  <td className="pt-3 text-right text-amber-400">{fmtMoney(totalTTC)}</td>
                  <td colSpan="2" className="pt-3"/>
                </tr>
              </tfoot>
            )}
          </table>
        </div>
      </Card>

      {/* Unpaid invoices */}
      {unpaidInvs.length > 0 && (
        <Card className="border-red-500/20">
          <h3 className="font-semibold text-red-400 mb-4">⚠ Impayés ({unpaidInvs.length})</h3>
          <div className="space-y-2">
            {unpaidInvs.map(inv => {
              const cl = getClient(inv.client_id);
              const overdueDays = inv.due_date ? Math.floor((new Date() - new Date(inv.due_date)) / 86400000) : 0;
              return (
                <div key={inv.id} className="flex items-center justify-between py-2 border-b border-gray-800 last:border-0">
                  <div>
                    <span className="font-mono text-amber-400 text-sm">{inv.num}</span>
                    <span className="text-gray-300 text-sm ml-2">{cl?.name || '—'}</span>
                    {overdueDays > 0 && <span className="text-red-400 text-xs ml-2">+{overdueDays}j de retard</span>}
                  </div>
                  <div className="text-right">
                    <div className="font-bold text-red-400">{fmtMoney(inv.ttc)}</div>
                    <div className="text-xs text-gray-500">Éch. {fmt(inv.due_date)}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      )}
    </div>
  );
}

// ─── ADMIN ────────────────────────────────────────────────────────────────────
function AdminPage({user}) {
  // In demo mode, user.role is checked from localStorage profile
  const profile = store.get('pii_profile', {});
  const isAdmin = profile.role === 'admin' || (user && user.email === 'admin@photoimmo.pro');

  const [inviteModal, setInviteModal] = useState(false);
  const [inviteEmail, setInviteEmail] = useState('');
  const [toast, setToast] = useState('');

  // Demo users
  const demoUsers = [
    {id:'u1', email:'alice@agence.fr', status:'trialing', created_at:'2026-05-01'},
    {id:'u2', email:'marc@photos.fr', status:'active', created_at:'2026-04-15'},
    {id:'u3', email:'claire@immo.fr', status:'trialing', created_at:'2026-06-01'},
  ];

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(''), 3000); };

  const handleInvite = async () => {
    if (!inviteEmail) return;
    try {
      const res = await fetch('/api/invite', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: inviteEmail})
      });
      const r = await res.json();
      if (r.success) { showToast('Invitation envoyée à ' + inviteEmail); setInviteModal(false); setInviteEmail(''); }
      else showToast('Erreur : ' + (r.error || 'inconnue'));
    } catch(err) {
      showToast('Mode démo — invitation simulée pour ' + inviteEmail);
      setInviteModal(false); setInviteEmail('');
    }
  };

  const handleAction = async (action, userId) => {
    try {
      const res = await fetch('/api/admin', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action, user_id: userId})
      });
      const r = await res.json();
      showToast(r.success ? 'Action effectuée' : 'Mode démo — action simulée');
    } catch {
      showToast('Mode démo — action simulée');
    }
  };

  if (!isAdmin) {
    return (
      <div className="fade-in flex flex-col items-center justify-center py-32 text-center">
        <div className="text-6xl mb-4">🔒</div>
        <h2 className="text-xl font-bold text-gray-300">Accès refusé</h2>
        <p className="text-gray-500 mt-2">Cette section est réservée aux administrateurs.</p>
        <p className="text-xs text-gray-600 mt-2">Pour activer le rôle admin, définissez role: 'admin' dans votre profil.</p>
      </div>
    );
  }

  return (
    <div className="fade-in space-y-6">
      {toast && (
        <div className="fixed top-4 right-4 z-50 bg-amber-500 text-black px-4 py-2 rounded-lg text-sm font-medium shadow-lg">
          {toast}
        </div>
      )}
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold">⚙️ Panel Admin</h1>
        <Btn onClick={()=>setInviteModal(true)}>+ Inviter un utilisateur</Btn>
      </div>

      <Card>
        <h3 className="font-semibold mb-4">Utilisateurs</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-sm min-w-[500px]">
            <thead>
              <tr className="border-b border-gray-700 text-xs text-gray-400">
                <th className="text-left pb-2 font-medium">Email</th>
                <th className="text-left pb-2 font-medium">Abonnement</th>
                <th className="text-left pb-2 font-medium">Inscription</th>
                <th className="text-right pb-2 font-medium">Actions</th>
              </tr>
            </thead>
            <tbody>
              {demoUsers.map(u => (
                <tr key={u.id} className="border-b border-gray-800">
                  <td className="py-3 text-gray-300">{u.email}</td>
                  <td className="py-3">
                    <span className={`text-xs px-2 py-0.5 rounded-full ${u.status==='active'?'bg-green-500/20 text-green-400':'bg-gray-500/20 text-gray-400'}`}>{u.status}</span>
                  </td>
                  <td className="py-3 text-gray-500">{fmt(u.created_at)}</td>
                  <td className="py-3 text-right">
                    <div className="flex gap-1 justify-end">
                      <Btn size="sm" variant="ghost" onClick={()=>handleAction('reset_password', u.id)}>🔑 MDP</Btn>
                      <Btn size="sm" variant="danger" onClick={()=>handleAction('suspend', u.id)}>⛔ Suspendre</Btn>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>

      {inviteModal && (
        <Modal title="Inviter un utilisateur" onClose={()=>setInviteModal(false)}>
          <div className="space-y-3">
            <Input label="Email" type="email" value={inviteEmail} onChange={setInviteEmail} placeholder="user@example.fr"/>
            <div className="flex justify-end gap-2 pt-2">
              <Btn variant="secondary" onClick={()=>setInviteModal(false)}>Annuler</Btn>
              <Btn onClick={handleInvite}>Envoyer l'invitation</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

          {photos.map(p => (
            <div key={p.id} className="relative group rounded-lg overflow-hidden border border-gray-700">
              <img src={p.url} alt={p.caption} className="w-full h-32 object-cover" onError={e=>e.target.src='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="80" viewBox="0 0 100 80"><rect fill="%23374151" width="100" height="80"/><text fill="%236b7280" x="50" y="40" text-anchor="middle" dy=".3em" font-family="sans-serif">Image</text></svg>'}/>
              <div className="p-2 bg-gray-800">
                <div className="text-xs text-amber-400">{p.category}</div>
                <div className="text-xs text-gray-400 truncate">{p.caption}</div>
              </div>
              <button onClick={()=>deletePhoto(p.id)} className="absolute top-1 right-1 bg-red-500/80 text-white rounded-full w-5 h-5 text-xs opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
            </div>
          ))}
        </div>
      </Card>

      {/* Testimonials */}
      <Card>
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-semibold">Témoignages ({testimonials.length})</h3>
          <Btn size="sm" onClick={()=>setTestimonialModal(true)}>+ Ajouter</Btn>
        </div>
        {testimonials.length === 0 && <p className="text-gray-500 text-sm">Aucun témoignage.</p>}
        <div className="space-y-3">
          {testimonials.map(t => (
            <div key={t.id} className="flex items-start justify-between p-3 bg-gray-800 rounded-lg">
              <div>
                <div className="flex items-center gap-2 mb-1">
                  <span className="font-medium text-sm">{t.client_name}</span>
                  <span className="text-amber-400 text-xs">{'★'.repeat(t.rating)}{'☆'.repeat(5-t.rating)}</span>
                </div>
                <div className="text-sm text-gray-400">{t.comment}</div>
                <div className="text-xs text-gray-600 mt-1">{fmt(t.date)}</div>
              </div>
              <button onClick={()=>deleteTestimonial(t.id)} className="text-gray-600 hover:text-red-400 text-sm ml-2">✕</button>
            </div>
          ))}
        </div>
      </Card>

      {photoModal && (
        <Modal title="Ajouter une photo" onClose={()=>setPhotoModal(false)}>
          <div className="space-y-3">
            <Input label="URL de la photo" value={photoForm.url} onChange={v=>setPhotoForm(f=>({...f,url:v}))} placeholder="https://..."/>
            <Select label="Catégorie" value={photoForm.category} onChange={v=>setPhotoForm(f=>({...f,category:v}))} options={PHOTO_CATEGORIES}/>
            <Input label="Légende" value={photoForm.caption} onChange={v=>setPhotoForm(f=>({...f,caption:v}))} placeholder="Description de la photo"/>
            <div className="flex justify-end gap-2 pt-2">
              <Btn variant="secondary" onClick={()=>setPhotoModal(false)}>Annuler</Btn>
              <Btn onClick={addPhoto}>Ajouter</Btn>
            </div>
          </div>
        </Modal>
      )}

      {testimonialModal && (
        <Modal title="Ajouter un témoignage" onClose={()=>setTestimonialModal(false)}>
          <div className="space-y-3">
            <Input label="Nom du client" value={testimonialForm.client_name} onChange={v=>setTestimonialForm(f=>({...f,client_name:v}))} required/>
            <div>
              <div className="text-xs text-gray-400 mb-1">Note</div>
              <div className="flex gap-2">
                {[1,2,3,4,5].map(n=>(
                  <button key={n} onClick={()=>setTestimonialForm(f=>({...f,rating:n}))}
                    className={`text-2xl ${n<=testimonialForm.rating?'text-amber-400':'text-gray-600'}`}>★</button>
                ))}
              </div>
            </div>
            <div>
              <label className="block text-xs text-gray-400 mb-1">Commentaire</label>
              <textarea value={testimonialForm.comment} onChange={e=>setTestimonialForm(f=>({...f,comment:e.target.value}))} rows={3}
                className="w-full rounded-lg border border-gray-700 bg-gray-800 text-sm px-3 py-2 focus:outline-none focus:border-amber-500 resize-none"/>
            </div>
            <Input label="Date" type="date" value={testimonialForm.date} onChange={v=>setTestimonialForm(f=>({...f,date:v}))}/>
            <div className="flex justify-end gap-2 pt-2">
              <Btn variant="secondary" onClick={()=>setTestimonialModal(false)}>Annuler</Btn>
              <Btn onClick={addTestimonial}>Enregistrer</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',icon:'📊',label:'Dashboard'},
  {id:'clients',icon:'👥',label:'Clients'},
  {id:'missions',icon:'📅',label:'Missions'},
  {id:'quotes',icon:'📄',label:'Devis'},
  {id:'delivery',icon:'🖼️',label:'Livraisons'},
  {id:'agencies',icon:'🏢',label:'Agences'},
  {id:'invoices',icon:'🧾',label:'Factures'},
  {id:'accounting',icon:'📊',label:'Comptabilité'},
  {id:'portfolio',icon:'🌐',label:'Mon Portfolio'},
  {id:'admin',icon:'⚙️',label:'Admin',adminOnly:true},
];
function Sidebar({page,setPage,sideOpen,setSideOpen}){
  return(
    <>
      {sideOpen&&<div className="fixed inset-0 bg-black/50 z-20 lg:hidden" onClick={()=>setSideOpen(false)}/>}
      <aside className={`fixed top-0 left-0 h-full w-56 bg-gray-950 border-r border-gray-800 z-30 flex flex-col transition-transform ${sideOpen?'translate-x-0':'-translate-x-full'} lg:translate-x-0`}>
        <div className="p-5 border-b border-gray-800">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center text-black font-bold text-sm">PI</div>
            <div><div className="font-bold text-sm">PhotoImmo</div><div className="text-xs text-gray-500">Pro</div></div>
          </div>
        </div>
        <nav className="flex-1 p-3 space-y-1">
          {NAV.filter(n=>{
            if(n.adminOnly){const p=store.get('pii_profile',{});return p.role==='admin';}
            return true;
          }).map(n=>(
            <button key={n.id} onClick={()=>{setPage(n.id);setSideOpen(false);}}
              className={`sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm ${page===n.id?'bg-amber-500/15 text-amber-400 font-medium':'text-gray-400 hover:bg-gray-800 hover:text-gray-200'}`}>
              <span>{n.icon}</span><span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div className="p-4 border-t border-gray-800 text-xs text-gray-600">PhotoImmo Pro v1.0</div>
      </aside>
    </>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [tab,setTab]=useState('login');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [msg,setMsg]=useState({text:'',type:'error'});
  const [loading,setLoading]=useState(false);

  const submit=async(e)=>{
    e.preventDefault();setMsg({text:'',type:'error'});setLoading(true);
    if(sb){
      if(tab==='signup'){
        const{data,error:err}=await sb.auth.signUp({email,password});
        if(err){setMsg({text:err.message,type:'error'});setLoading(false);}
        else{
          if(data.user){
            await sb.from('subscriptions').insert({user_id:data.user.id,status:'trialing'}).select();
          }
          setMsg({text:'Vérifiez votre email pour confirmer votre compte.',type:'success'});
          setLoading(false);
        }
      } else {
        const{data,error:err}=await sb.auth.signInWithPassword({email,password});
        if(err){setMsg({text:err.message,type:'error'});setLoading(false);}
        else{onLogin(data.user);}
      }
    } else {
      // Demo mode: accept any credentials
      setTimeout(()=>{onLogin({email,id:'demo-user'});},600);
    }
  };

  return(
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-amber-500 rounded-2xl flex items-center justify-center text-black font-bold text-2xl mx-auto mb-4">PI</div>
          <h1 className="text-2xl font-bold">PhotoImmo Pro</h1>
          <p className="text-gray-500 text-sm mt-1">Gestion photographe immobilier</p>
        </div>
        <Card>
          <div className="flex bg-gray-800 rounded-lg p-1 mb-4">
            <button onClick={()=>setTab('login')} className={`flex-1 text-sm py-1.5 rounded-md transition-all ${tab==='login'?'bg-gray-700 text-white font-medium':'text-gray-400'}`}>Connexion</button>
            <button onClick={()=>setTab('signup')} className={`flex-1 text-sm py-1.5 rounded-md transition-all ${tab==='signup'?'bg-gray-700 text-white font-medium':'text-gray-400'}`}>Créer un compte</button>
          </div>
          <form onSubmit={submit} className="space-y-4">
            <Input label="Email" type="email" value={email} onChange={setEmail} placeholder="photo@studio.fr" required/>
            <Input label="Mot de passe" type="password" value={password} onChange={setPassword} placeholder="••••••••" required/>
            {msg.text&&<p className={`text-sm ${msg.type==='success'?'text-green-400':'text-red-400'}`}>{msg.text}</p>}
            <Btn className="w-full justify-center" disabled={loading}>
              {loading?'Chargement…':tab==='signup'?'Créer mon compte — 14 jours gratuits':'Se connecter'}
            </Btn>
            {!sb&&<p className="text-xs text-center text-gray-600">Mode démo — entrez n'importe quel email/mot de passe</p>}
            {tab==='signup'&&<p className="text-xs text-center text-gray-600">Sans carte bancaire · Annulation à tout moment</p>}
          </form>
        </Card>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(false);
  const [user,setUser]=useState(null);
  const [subscription,setSubscription]=useState(sb?null:{status:'trialing',trial_ends_at:new Date(Date.now()+14*86400000).toISOString()});
  const [page,setPage]=useState('dashboard');
  const [sideOpen,setSideOpen]=useState(false);
  const [clients,setClients]=useState(()=>store.get('pii_clients',[]));
  const [missions,setMissions]=useState(()=>store.get('pii_missions',[]));
  const [quotes,setQuotes]=useState(()=>store.get('pii_quotes',[]));
  const [galleries,setGalleries]=useState(()=>store.get('pii_galleries',[]));

  useEffect(()=>{seedDemo();
    setClients(store.get('pii_clients',[]));
    setMissions(store.get('pii_missions',[]));
    setQuotes(store.get('pii_quotes',[]));
    setGalleries(store.get('pii_galleries',[]));
  },[]);

  const loadProfile=async(userId)=>{
    const{data}=await sb.from('user_profiles').select('*').eq('user_id',userId).single();
    if(data){store.set('pii_profile',data);}
  };

  const loadSubscription=async(userId)=>{
    const{data}=await sb.from('subscriptions').select('*').eq('user_id',userId).single();
    if(!data){
      const{data:newSub}=await sb.from('subscriptions').insert({user_id:userId,status:'trialing'}).select().single();
      setSubscription(newSub||{status:'trialing'});
    } else {
      setSubscription(data);
    }
  };

  useEffect(()=>{
    if(!sb)return;
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){setUser(session.user);setAuthed(true);await loadProfile(session.user.id);await loadSubscription(session.user.id);}
    });
    const{data:{subscription:authSub}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(session){setUser(session.user);setAuthed(true);if(event==='SIGNED_IN'){await loadProfile(session.user.id);await loadSubscription(session.user.id);}}
      else{setUser(null);setAuthed(false);setSubscription(null);}
    });
    return()=>authSub.unsubscribe();
  },[]);

  const isActive=()=>{
    if(!subscription)return false;
    if(!sb)return true; // demo mode: always allow access
    if(subscription.status==='active')return true;
    if(subscription.status==='trialing'){
      return !subscription.trial_ends_at||new Date(subscription.trial_ends_at)>new Date();
    }
    return false;
  };

  const trialDaysLeft=()=>{
    if(!subscription||subscription.status!=='trialing'||!subscription.trial_ends_at)return null;
    return Math.max(0,Math.ceil((new Date(subscription.trial_ends_at)-new Date())/86400000));
  };

  const manageSubscription=async()=>{
    if(!sb||!user)return;
    try{
      const res=await fetch('/api/stripe',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'portal',user_id:user.id})});
      const{url,error}=await res.json();
      if(url)window.location.href=url;
      else alert('Aucun abonnement actif trouvé.');
    }catch{alert('Erreur lors de l\'ouverture du portail.');}
  };

  // NOTE: loadSubscription is defined above (as const) so it is in scope here.
  // The onLogin callback is only invoked after the component has fully rendered,
  // so loadSubscription is accessible via closure at call time.
  if(!authed)return <Login onLogin={(u)=>{setAuthed(true);if(u&&sb){setUser(u);loadSubscription(u.id);}}}/>;
  if(sb&&subscription===null)return(
    <div className="min-h-screen flex items-center justify-center">
      <div className="text-gray-500 text-sm animate-pulse">Chargement…</div>
    </div>
  );
  if(sb&&!isActive())return <UpgradeModal user={user}/>;

  const days=trialDaysLeft();

  const renderPage=()=>{
    switch(page){
      case'dashboard': return <Dashboard clients={clients} missions={missions} quotes={quotes}/>;
      case'clients':   return <ClientsPage clients={clients} setClients={setClients} missions={missions} quotes={quotes}/>;
      case'missions':  return <MissionsPage missions={missions} setMissions={setMissions} clients={clients}/>;
      case'quotes':    return <QuotesPage quotes={quotes} setQuotes={setQuotes} clients={clients} missions={missions}/>;
      case'delivery':  return <DeliveryPage missions={missions} clients={clients} galleries={galleries} setGalleries={setGalleries}/>;
      case'agencies':    return <AgenciesPage clients={clients} missions={missions} quotes={quotes}/>;
      case'invoices':    return <InvoicesPage quotes={quotes} clients={clients} missions={missions}/>;
      case'accounting':  return <AccountingPage quotes={quotes} clients={clients} missions={missions}/>;
      case'portfolio':   return <PortfolioPage user={user}/>;
      case'admin':       return <AdminPage user={user}/>;
      default:           return null;
    }
  };

  return(
    <div className="min-h-screen">
      <Sidebar page={page} setPage={setPage} sideOpen={sideOpen} setSideOpen={setSideOpen}/>
      <div className="lg:ml-56">
        {days!==null&&<TrialBanner daysLeft={days} user={user}/>}
        <header className="sticky top-0 z-10 bg-gray-950/80 backdrop-blur border-b border-gray-800 px-4 py-3 flex items-center gap-3">
          <button onClick={()=>setSideOpen(true)} className="lg:hidden text-gray-400 hover:text-white p-1">☰</button>
          <span className="text-sm text-gray-400">{NAV.find(n=>n.id===page)?.icon} {NAV.find(n=>n.id===page)?.label}</span>
          {sb&&(
            <div className="ml-auto flex items-center gap-3">
              {subscription?.status==='active'&&(
                <button onClick={manageSubscription} className="text-xs text-gray-600 hover:text-gray-400">Abonnement</button>
              )}
              <span className="text-xs text-gray-700 hidden sm:block">{user?.email}</span>
              <button onClick={()=>{sb.auth.signOut();setAuthed(false);}} className="text-xs text-gray-600 hover:text-gray-400">Déconnexion</button>
            </div>
          )}
        </header>
        <main className="p-4 lg:p-8 max-w-5xl mx-auto">{renderPage()}</main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
