function AdminPage({user}) {
  // In demo mode, user.role is checked from localStorage profile
  const profile = store.get('pii_profile', {});
  const isAdmin = profile.role === 'admin' || (user && (user.email === 'admin@photoimmo.pro' || user.email === 'cyrilleduc2000@gmail.com'));

  const [inviteModal, setInviteModal] = useState(false);
  const [inviteEmail, setInviteEmail] = useState('');
  const [toast, setToast] = useState('');

  // Demo users
  const demoUsers = [
    {id:'u1', email:'alice@agence.fr', status:'trialing', created_at:'2026-05-01'},
    {id:'u2', email:'marc@photos.fr', status:'active', created_at:'2026-04-15'},
    {id:'u3', email:'claire@immo.fr', status:'trialing', created_at:'2026-06-01'},
  ];

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(''), 3000); };

  const handleInvite = async () => {
    if (!inviteEmail) return;
    try {
      const {data:{session}} = await sb.auth.getSession();
      const token = session?.access_token || '';
      const res = await fetch('/api/invite', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
        body: JSON.stringify({email: inviteEmail})
      });
      const r = await res.json();
      if (r.success) { showToast('Invitation envoyée à ' + inviteEmail); setInviteModal(false); setInviteEmail(''); }
      else showToast('Erreur : ' + (r.error || 'inconnue'));
    } catch(err) {
      showToast('Mode démo — invitation simulée pour ' + inviteEmail);
      setInviteModal(false); setInviteEmail('');
    }
  };

  const handleAction = async (action, userId) => {
    try {
      const res = await fetch('/api/admin', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action, user_id: userId})
      });
      const r = await res.json();
      showToast(r.success ? 'Action effectuée' : 'Mode démo — action simulée');
    } catch {
      showToast('Mode démo — action simulée');
    }
  };

  if (!isAdmin) {
    return (
      <div className="fade-in flex flex-col items-center justify-center py-32 text-center">
        <div className="text-6xl mb-4">🔒</div>
        <h2 className="text-xl font-bold text-gray-300">Accès refusé</h2>
        <p className="text-gray-500 mt-2">Cette section est réservée aux administrateurs.</p>
        <p className="text-xs text-gray-600 mt-2">Pour activer le rôle admin, définissez role: 'admin' dans votre profil.</p>
      </div>
    );
  }

  return (
    <div className="fade-in space-y-6">
      {toast && (
        <div className="fixed top-4 right-4 z-50 bg-amber-500 text-black px-4 py-2 rounded-lg text-sm font-medium shadow-lg">
          {toast}
        </div>
      )}
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold">⚙️ Panel Admin</h1>
        <Btn onClick={()=>setInviteModal(true)}>+ Inviter un utilisateur</Btn>
      </div>

      <Card>
        <h3 className="font-semibold mb-4">Utilisateurs</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-sm min-w-[500px]">
            <thead>
              <tr className="border-b border-gray-700 text-xs text-gray-400">
                <th className="text-left pb-2 font-medium">Email</th>
                <th className="text-left pb-2 font-medium">Abonnement</th>
                <th className="text-left pb-2 font-medium">Inscription</th>
                <th className="text-right pb-2 font-medium">Actions</th>
              </tr>
            </thead>
            <tbody>
              {demoUsers.map(u => (
                <tr key={u.id} className="border-b border-gray-800">
                  <td className="py-3 text-gray-300">{u.email}</td>
                  <td className="py-3">
                    <span className={`text-xs px-2 py-0.5 rounded-full ${u.status==='active'?'bg-green-500/20 text-green-400':'bg-gray-500/20 text-gray-400'}`}>{u.status}</span>
                  </td>
                  <td className="py-3 text-gray-500">{fmt(u.created_at)}</td>
                  <td className="py-3 text-right">
                    <div className="flex gap-1 justify-end">
                      <Btn size="sm" variant="ghost" onClick={()=>handleAction('reset_password', u.id)}>🔑 MDP</Btn>
                      <Btn size="sm" variant="danger" onClick={()=>handleAction('suspend', u.id)}>⛔ Suspendre</Btn>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>

      {inviteModal && (
        <Modal title="Inviter un utilisateur" onClose={()=>setInviteModal(false)}>
          <div className="space-y-3">
            <Input label="Email" type="email" value={inviteEmail} onChange={setInviteEmail} placeholder="user@example.fr"/>
            <div className="flex justify-end gap-2 pt-2">
              <Btn variant="secondary" onClick={()=>setInviteModal(false)}>Annuler</Btn>
              <Btn onClick={handleInvite}>Envoyer l'invitation</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── PORTFOLIO ────────────────────────────────────────────────────────────────
function PortfolioPage({user}) {
  const [profile, setProfile] = useState(() => store.get('pii_profile', {}));
  const [photos, setPhotos] = useState(() => store.get('pii_portfolio_photos', []));
  const [testimonials, setTestimonials] = useState(() => store.get('pii_testimonials', []));
  const [photoModal, setPhotoModal] = useState(false);
  const [testimonialModal, setTestimonialModal] = useState(false);
  const [photoForm, setPhotoForm] = useState({url:'', category:'Appartements', caption:''});
  const [testimonialForm, setTestimonialForm] = useState({client_name:'', rating:5, comment:'', date:today()});
  const [toast, setToast] = useState('');
  const syncTimer = useRef(null);

  const PHOTO_CATEGORIES = ['Appartements','Maisons','Villas','Commerces','Drone','Visite virtuelle'];
  const SOCIAL_NETWORKS = [
    {key:'instagram', label:'Instagram', placeholder:'https://instagram.com/votre-compte'},
    {key:'facebook', label:'Facebook', placeholder:'https://facebook.com/votre-page'},
    {key:'linkedin', label:'LinkedIn', placeholder:'https://linkedin.com/in/votre-profil'},
    {key:'tiktok', label:'TikTok', placeholder:'https://tiktok.com/@votre-compte'},
    {key:'website', label:'Site web', placeholder:'https://votre-site.fr'},
  ];

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(''), 3000); };

  // Le profil/les photos/les témoignages affichés sur la page publique viennent de Supabase :
  // on charge depuis la base (et on crée la ligne user_profiles si elle n'existe pas encore).
  useEffect(() => {
    if (!sb || !user) return;
    (async () => {
      let { data: profileData } = await sb.from('user_profiles').select('*').eq('user_id', user.id).single();
      if (!profileData) {
        const { data: created } = await sb.from('user_profiles').insert({user_id: user.id}).select().single();
        profileData = created;
      }
      if (profileData) { setProfile(profileData); store.set('pii_profile', profileData); }

      const { data: photosData } = await sb.from('portfolio_photos').select('*').eq('user_id', user.id).order('display_order', {ascending: true});
      if (photosData) { setPhotos(photosData); store.set('pii_portfolio_photos', photosData); }

      const { data: testimonialsData } = await sb.from('testimonials').select('*').eq('user_id', user.id).order('date', {ascending: false});
      if (testimonialsData) { setTestimonials(testimonialsData); store.set('pii_testimonials', testimonialsData); }
    })();
  }, [user]);

  const saveProfile = (p) => {
    const updated = {...profile, ...p};
    setProfile(updated);
    store.set('pii_profile', updated);
    if (sb && user) {
      clearTimeout(syncTimer.current);
      syncTimer.current = setTimeout(() => {
        sb.from('user_profiles').upsert({...updated, user_id: user.id}, {onConflict: 'user_id'})
          .then(({error}) => { if (error) showToast('Erreur de sauvegarde'); });
      }, 600);
    }
  };

  const saveSocial = (key, value) => {
    saveProfile({social_links: {...(profile.social_links||{}), [key]: value}});
  };

  const addPhoto = async () => {
    if (!photoForm.url) return;
    if (sb && user) {
      const { data, error } = await sb.from('portfolio_photos')
        .insert({user_id: user.id, url: photoForm.url, category: photoForm.category, caption: photoForm.caption, display_order: photos.length})
        .select().single();
      if (error || !data) { showToast('Erreur lors de l\'ajout'); return; }
      const u = [...photos, data];
      setPhotos(u);
      store.set('pii_portfolio_photos', u);
    } else {
      const p = {...photoForm, id: uid(), created_at: today()};
      const u = [...photos, p];
      setPhotos(u);
      store.set('pii_portfolio_photos', u);
    }
    setPhotoModal(false);
    setPhotoForm({url:'', category:'Appartements', caption:''});
  };

  const deletePhoto = async id => {
    if (sb && user) await sb.from('portfolio_photos').delete().eq('id', id);
    const u = photos.filter(p => p.id !== id);
    setPhotos(u);
    store.set('pii_portfolio_photos', u);
  };

  const addTestimonial = async () => {
    if (!testimonialForm.client_name) return;
    if (sb && user) {
      const { data, error } = await sb.from('testimonials')
        .insert({user_id: user.id, client_name: testimonialForm.client_name, rating: testimonialForm.rating, comment: testimonialForm.comment, date: testimonialForm.date})
        .select().single();
      if (error || !data) { showToast('Erreur lors de l\'ajout'); return; }
      const u = [...testimonials, data];
      setTestimonials(u);
      store.set('pii_testimonials', u);
    } else {
      const t = {...testimonialForm, id: uid()};
      const u = [...testimonials, t];
      setTestimonials(u);
      store.set('pii_testimonials', u);
    }
    setTestimonialModal(false);
    setTestimonialForm({client_name:'', rating:5, comment:'', date:today()});
  };

  const deleteTestimonial = async id => {
    if (sb && user) await sb.from('testimonials').delete().eq('id', id);
    const u = testimonials.filter(t => t.id !== id);
    setTestimonials(u);
    store.set('pii_testimonials', u);
  };

  const slugify = v => v.toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g,'-').replace(/^-|-$/g,'');

  const publicUrl = profile.portfolio_slug ? `/portfolio/${profile.portfolio_slug}` : null;

  return (
    <div className="fade-in space-y-6">
      {toast && (
        <div className="fixed top-4 right-4 z-50 bg-amber-500 text-black px-4 py-2 rounded-lg text-sm font-medium shadow-lg">{toast}</div>
      )}
      <h1 className="text-2xl font-bold">🌐 Mon Portfolio</h1>

      {/* Settings */}
      <Card>
        <h3 className="font-semibold mb-4">Paramètres du profil</h3>
        <div className="grid md:grid-cols-2 gap-4">
          <Input label="Nom de l'entreprise" value={profile.company_name||''} onChange={v=>saveProfile({company_name:v})}/>
          <Input label="SIRET" value={profile.siret||''} onChange={v=>saveProfile({siret:v})} placeholder="123 456 789 00012"/>
          <Input label="Adresse" value={profile.address||''} onChange={v=>saveProfile({address:v})}/>
          <Input label="Téléphone" value={profile.phone||''} onChange={v=>saveProfile({phone:v})}/>
          <Input label="Préfixe facture (ex: NF, FAC)" value={profile.invoice_prefix||''} onChange={v=>saveProfile({invoice_prefix:v})} placeholder="FAC"/>
          <div>
            <label className="block text-xs text-gray-400 mb-1">Slug URL</label>
            <input value={profile.portfolio_slug||''} onChange={e=>saveProfile({portfolio_slug:slugify(e.target.value)})}
              placeholder="mon-studio-photo" className="w-full rounded-lg border text-sm px-3 py-2 focus:outline-none focus:border-amber-500"/>
            {profile.portfolio_slug && <div className="text-xs text-gray-500 mt-1">/portfolio/{profile.portfolio_slug}</div>}
          </div>
          <div>
            <label className="block text-xs text-gray-400 mb-1">Bio</label>
            <textarea value={profile.bio||''} onChange={e=>saveProfile({bio:e.target.value})} rows={3}
              className="w-full rounded-lg border border-gray-700 bg-gray-800 text-sm px-3 py-2 focus:outline-none focus:border-amber-500 resize-none" placeholder="Votre présentation..."/>
          </div>
          <Input label="Zone géographique" value={profile.zone||''} onChange={v=>saveProfile({zone:v})} placeholder="Paris et Île-de-France"/>
        </div>
        <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between mt-4 pt-4 border-t border-gray-800 gap-3">
          <div className="flex items-center gap-3">
            <button onClick={()=>saveProfile({portfolio_enabled:!profile.portfolio_enabled})}
              className={`relative w-11 h-6 rounded-full transition-colors ${profile.portfolio_enabled?'bg-amber-500':'bg-gray-700'}`}>
              <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-transform ${profile.portfolio_enabled?'translate-x-6':'translate-x-1'}`}/>
            </button>
            <span className="text-sm text-gray-300">Page publique {profile.portfolio_enabled?<span className="text-amber-400 font-medium">active</span>:<span className="text-gray-500">inactive</span>}</span>
          </div>
          {publicUrl ? (
            <Btn variant="secondary" size="sm" onClick={()=>window.open(publicUrl,'_blank')}>
              {profile.portfolio_enabled?'🔗 Voir ma page':'👁 Prévisualiser'}
            </Btn>
          ) : (
            <span className="text-xs text-gray-500">Entrez un slug URL pour prévisualiser</span>
          )}
        </div>
      </Card>

      {/* Mes Tarifs */}
      <Card>
        <h3 className="font-semibold mb-1">💰 Mes Tarifs</h3>
        <p className="text-xs text-gray-500 mb-4">Ces tarifs s'appliquent automatiquement à tous vos nouveaux devis. Laissez vide pour utiliser les tarifs par défaut.</p>
        {(()=>{
          const ct=(profile.custom_tarifs||{});
          const saveTarif=(path,val)=>{
            const prev=profile.custom_tarifs||{};
            let next;
            if(Array.isArray(path)){
              const [cat,key]=path;
              next={...prev,[cat]:{...(prev[cat]||{}),[key]:val===''?undefined:Number(val)||0}};
            } else {
              next={...prev,[path]:val===''?undefined:Number(val)||0};
            }
            saveProfile({custom_tarifs:next});
          };
          const def=TARIFS;
          const c=ct;
          return (
            <div className="space-y-5">
              <div>
                <div className="text-xs font-semibold text-amber-400 mb-2">Surface du bien (€ HT)</div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                  {['<50','50-100','100-200','>200'].map(k=>(
                    <div key={k}>
                      <label className="block text-xs text-gray-500 mb-1">{k} m²</label>
                      <input type="number" placeholder={def.surface[k]} value={(c.surface||{})[k]!=null?(c.surface||{})[k]:''}
                        onChange={e=>saveTarif(['surface',k],e.target.value)}
                        className="w-full rounded-lg border border-gray-700 bg-gray-800 text-sm px-3 py-2 focus:outline-none focus:border-amber-500"/>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div className="text-xs font-semibold text-amber-400 mb-2">Supplément photos (€ HT)</div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                  {[10,20,30,50].map(k=>(
                    <div key={k}>
                      <label className="block text-xs text-gray-500 mb-1">{k} photos</label>
                      <input type="number" placeholder={def.photos[k]} value={(c.photos||{})[k]!=null?(c.photos||{})[k]:''}
                        onChange={e=>saveTarif(['photos',String(k)],e.target.value)}
                        className="w-full rounded-lg border border-gray-700 bg-gray-800 text-sm px-3 py-2 focus:outline-none focus:border-amber-500"/>
                    </div>
                  ))}
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                  <label className="block text-xs text-gray-500 mb-1">Visite virtuelle 360° (€ HT)</label>
                  <input type="number" placeholder={def.visite.oui} value={(c.visite||{}).oui!=null?(c.visite||{}).oui:''}
                    onChange={e=>saveTarif(['visite','oui'],e.target.value)}
                    className="w-full rounded-lg border border-gray-700 bg-gray-800 text-sm px-3 py-2 focus:outline-none focus:border-amber-500"/>
                </div>
                <div>
                  <label className="block text-xs text-gray-500 mb-1">Drone (€ HT)</label>
                  <input type="number" placeholder={def.drone.oui} value={(c.drone||{}).oui!=null?(c.drone||{}).oui:''}
                    onChange={e=>saveTarif(['drone','oui'],e.target.value)}
                    className="w-full rounded-lg border border-gray-700 bg-gray-800 text-sm px-3 py-2 focus:outline-none focus:border-amber-500"/>
                </div>
                <div>
                  <label className="block text-xs text-gray-500 mb-1">Retouche premium (€ HT)</label>
                  <input type="number" placeholder={def.retouche.premium} value={(c.retouche||{}).premium!=null?(c.retouche||{}).premium:''}
                    onChange={e=>saveTarif(['retouche','premium'],e.target.value)}
                    className="w-full rounded-lg border border-gray-700 bg-gray-800 text-sm px-3 py-2 focus:outline-none focus:border-amber-500"/>
                </div>
              </div>
              <div>
                <label className="block text-xs text-gray-500 mb-1">Forfait déplacement par défaut (€ HT, ajouté à chaque devis)</label>
                <input type="number" placeholder="0" value={c.deplacement!=null?c.deplacement:''}
                  onChange={e=>saveTarif('deplacement',e.target.value)}
                  className="w-full md:w-48 rounded-lg border border-gray-700 bg-gray-800 text-sm px-3 py-2 focus:outline-none focus:border-amber-500"/>
              </div>
              <p className="text-xs text-gray-600">Les champs vides utilisent les tarifs par défaut : surface 200–600€, visite 350€, drone 250€, retouche premium 120€.</p>
            </div>
          );
        })()}
      </Card>

      {/* Réseaux sociaux */}
      <Card>
        <h3 className="font-semibold mb-4">Réseaux sociaux</h3>
        <div className="grid md:grid-cols-2 gap-4">
          {SOCIAL_NETWORKS.map(net => (
            <Input key={net.key} label={net.label} value={(profile.social_links||{})[net.key]||''}
              onChange={v=>saveSocial(net.key, v)} placeholder={net.placeholder}/>
          ))}
        </div>
        <p className="text-xs text-gray-500 mt-3">Ces liens apparaîtront sur votre page portfolio publique.</p>
      </Card>

      {/* Portfolio Photos */}
      <Card>
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-semibold">Photos portfolio ({photos.length})</h3>
          <Btn size="sm" onClick={()=>setPhotoModal(true)}>+ Ajouter une photo</Btn>
        </div>
        {photos.length === 0 && <p className="text-gray-500 text-sm">Aucune photo. Ajoutez des photos de vos réalisations.</p>}
        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
          {photos.map(p => (
            <div key={p.id} className="relative group rounded-lg overflow-hidden border border-gray-700">

              <div>

                  <span className="font-medium text-sm">{t.client_name}</span>

                    className={`text-2xl ${n<=testimonialForm.rating?'text-amber-400':'text-gray-600'}`}>★</button>
                ))}
              </div>
            </div>
            <div>
              <label className="block text-xs text-gray-400 mb-1">Commentaire</label>
              <textarea value={testimonialForm.comment} onChange={e=>setTestimonialForm(f=>({...f,comment:e.target.value}))} rows={3}
                className="w-full rounded-lg border border-gray-700 bg-gray-800 text-sm px-3 py-2 focus:outline-none focus:border-amber-500 resize-none"/>
            </div>
            <Input label="Date" type="date" value={testimonialForm.date} onChange={v=>setTestimonialForm(f=>({...f,date:v}))}/>
            <div className="flex justify-end gap-2 pt-2">
              <Btn variant="secondary" onClick={()=>setTestimonialModal(false)}>Annuler</Btn>
              <Btn onClick={addTestimonial}>Enregistrer</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── RESET PASSWORD ───────────────────────────────────────────────────────────
function ResetPasswordPage({onDone}){
  const [password,setPassword]=useState('');
  const [confirm,setConfirm]=useState('');
  const [msg,setMsg]=useState({text:'',type:'error'});
  const [loading,setLoading]=useState(false);

  const submit=async(e)=>{
    e.preventDefault();
    if(password.length<8){setMsg({text:'Le mot de passe doit faire au moins 8 caractères.',type:'error'});return;}
    if(password!==confirm){setMsg({text:'Les mots de passe ne correspondent pas.',type:'error'});return;}
    setLoading(true);
    const{error}=await sb.auth.updateUser({password});
    setLoading(false);
    if(error)setMsg({text:error.message,type:'error'});
    else{setMsg({text:'Mot de passe mis à jour !',type:'success'});setTimeout(()=>onDone(),1500);}
  };

  return(
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'var(--bg)'}}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="aperture w-16 h-16 mx-auto mb-5 flex items-center justify-center" style={{width:'64px',height:'64px',borderRadius:'16px'}}>
            <span style={{fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:'20px',color:'#08080f',position:'relative',zIndex:1}}>PI</span>
          </div>
          <h1 className="font-display text-2xl font-bold mb-1" style={{color:'var(--text)'}}>Nouveau mot de passe</h1>
          <p className="text-sm" style={{color:'var(--muted)'}}>Choisissez un mot de passe sécurisé</p>
        </div>
        <div className="rounded-2xl p-6" style={{background:'var(--surface)',border:'1px solid var(--border)',boxShadow:'0 20px 60px rgba(0,0,0,0.4)'}}>
          <form onSubmit={submit} className="space-y-4">
            <Input label="Nouveau mot de passe" type="password" value={password} onChange={setPassword} placeholder="••••••••" required/>
            <Input label="Confirmer le mot de passe" type="password" value={confirm} onChange={setConfirm} placeholder="••••••••" required/>
            {msg.text&&<p className={`text-sm ${msg.type==='success'?'text-green-400':'text-red-400'}`}>{msg.text}</p>}
            <button type="submit" disabled={loading} className="w-full py-3 rounded-xl font-semibold text-sm btn-gold-primary disabled:opacity-50">
              {loading?'Mise à jour…':'Enregistrer le mot de passe'}
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [tab,setTab]=useState('login');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [msg,setMsg]=useState({text:'',type:'error'});
  const [loading,setLoading]=useState(false);

  const submit=async(e)=>{
    e.preventDefault();setMsg({text:'',type:'error'});setLoading(true);
    if(sb){
      if(tab==='signup'){
        const{data,error:err}=await sb.auth.signUp({email,password});
        if(err){setMsg({text:err.message,type:'error'});setLoading(false);}
        else{
          if(data.user){
            await sb.from('subscriptions').insert({user_id:data.user.id,status:'trialing'}).select();
          }
          setMsg({text:'Vérifiez votre email pour confirmer votre compte.',type:'success'});
          setLoading(false);
        }
      } else {
        const{data,error:err}=await sb.auth.signInWithPassword({email,password});
        if(err){setMsg({text:err.message,type:'error'});setLoading(false);}
        else{onLogin(data.user);}
      }
    } else {
      // Demo mode: accept any credentials
      setTimeout(()=>{onLogin({email,id:'demo-user'});},600);
    }
  };

  const forgotPassword=async()=>{
    if(!email){setMsg({text:'Entrez votre email ci-dessus puis cliquez ici.',type:'error'});return;}
    if(!sb){setMsg({text:'Fonctionnalité non disponible en mode démo.',type:'error'});return;}
    setLoading(true);
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:`${location.origin}/app`});
    setLoading(false);
    if(error)setMsg({text:error.message,type:'error'});
    else setMsg({text:'Email de réinitialisation envoyé ! Vérifiez votre boîte mail.',type:'success'});
  };

  return(
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'var(--bg)'}}>
      <div className="absolute inset-0 pointer-events-none" style={{background:'radial-gradient(ellipse at 50% 30%,rgba(201,150,60,0.06) 0%,transparent 65%)'}}/>
      <div className="w-full max-w-sm relative z-10">
        <div className="text-center mb-8">
          <div className="aperture w-16 h-16 mx-auto mb-5 flex items-center justify-center" style={{width:'64px',height:'64px',borderRadius:'16px',boxShadow:'0 0 40px rgba(201,150,60,0.2)'}}>
            <span style={{fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:'20px',color:'#08080f',position:'relative',zIndex:1}}>PI</span>
          </div>
          <h1 className="font-display text-3xl font-bold mb-1" style={{color:'var(--text)'}}>PhotoImmo Pro</h1>
          <p className="text-sm" style={{color:'var(--muted)'}}>Gestion pour photographes immobiliers</p>
        </div>
        <div className="rounded-2xl p-6" style={{background:'var(--surface)',border:'1px solid var(--border)',boxShadow:'0 20px 60px rgba(0,0,0,0.4)'}}>
          <div className="flex rounded-xl p-1 mb-5" style={{background:'var(--surface2)',border:'1px solid var(--border)'}}>
            <button onClick={()=>setTab('login')} className="flex-1 text-sm py-2 rounded-lg transition-all font-medium" style={tab==='login'?{background:'var(--surface)',color:'var(--text)',border:'1px solid var(--border)'}:{color:'var(--muted)',border:'1px solid transparent'}}>Connexion</button>
            <button onClick={()=>setTab('signup')} className="flex-1 text-sm py-2 rounded-lg transition-all font-medium" style={tab==='signup'?{background:'var(--surface)',color:'var(--text)',border:'1px solid var(--border)'}:{color:'var(--muted)',border:'1px solid transparent'}}>Créer un compte</button>
          </div>
          <form onSubmit={submit} className="space-y-4">
            <Input label="Email" type="email" value={email} onChange={setEmail} placeholder="photo@studio.fr" required/>
            <Input label="Mot de passe" type="password" value={password} onChange={setPassword} placeholder="••••••••" required/>
            {msg.text&&<p className={`text-sm ${msg.type==='success'?'text-green-400':'text-red-400'}`}>{msg.text}</p>}
            <button type="submit" disabled={loading} className="w-full py-3 rounded-xl font-semibold text-sm btn-gold-primary disabled:opacity-50">
              {loading?'Chargement…':tab==='signup'?'Créer mon compte — 14 jours gratuits':'Se connecter →'}
            </button>
            {tab==='login'&&sb&&<button type="button" onClick={forgotPassword} className="text-xs w-full text-center transition-colors hover:opacity-80" style={{color:'var(--gold-light)'}}>Mot de passe oublié ?</button>}
            {!sb&&<p className="text-xs text-center" style={{color:'#3a3a55'}}>Mode démo — entrez n'importe quel email/mot de passe</p>}
            {tab==='signup'&&(
              <p className="text-xs text-center" style={{color:'var(--muted)'}}>
                Sans carte bancaire · Annulation à tout moment<br/>
                <span>En créant un compte, vous acceptez nos </span>
                <a href="/legal" target="_blank" style={{color:'var(--gold-light)'}}>CGV et mentions légales</a>
              </p>
            )}
          </form>
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(false);
  const [user,setUser]=useState(null);
  const [subscription,setSubscription]=useState(sb?null:{status:'trialing',trial_ends_at:new Date(Date.now()+14*86400000).toISOString()});
  const [page,setPage]=useState('dashboard');
  const [resetMode,setResetMode]=useState(false);
  const [sideOpen,setSideOpen]=useState(false);
  const [clients,setClients]=useState(()=>store.get('pii_clients',[]));
  const [missions,setMissions]=useState(()=>store.get('pii_missions',[]));
  const [quotes,setQuotes]=useState(()=>store.get('pii_quotes',[]));
  const [invoices,setInvoices]=useState(()=>store.get('pii_invoices',[]));
  const [agencies,setAgencies]=useState(()=>store.get('pii_agencies',[]));
  const [galleries,setGalleries]=useState(()=>store.get('pii_galleries',[]));
  const [profile,setProfile]=useState(()=>store.get('pii_profile',{}));

  useEffect(()=>{seedDemo();
    setClients(store.get('pii_clients',[]));
    setMissions(store.get('pii_missions',[]));
    setQuotes(store.get('pii_quotes',[]));
    setInvoices(store.get('pii_invoices',[]));
    setAgencies(store.get('pii_agencies',[]));
    setGalleries(store.get('pii_galleries',[]));
  },[]);

  const loadProfile=async(userId)=>{
    const{data}=await sb.from('user_profiles').select('*').eq('user_id',userId).single();
    if(data){store.set('pii_profile',data);setProfile(data);}
  };

  const loadAllData=async(userId)=>{
    if(!sb)return;
    const[{data:cd},{data:md},{data:qd},{data:ind},{data:ad}]=await Promise.all([
      sb.from('clients').select('*').eq('user_id',userId).order('created_at',{ascending:false}),
      sb.from('missions').select('*').eq('user_id',userId).order('date',{ascending:false}),
      sb.from('quotes').select('*').eq('user_id',userId).order('created_at',{ascending:false}),
      sb.from('invoices').select('*').eq('user_id',userId).order('created_at',{ascending:false}),
      sb.from('agencies').select('*').eq('user_id',userId).order('created_at',{ascending:false}),
    ]);
    if(cd){setClients(cd);store.set('pii_clients',cd);}
    if(md){setMissions(md);store.set('pii_missions',md);}
    if(qd){setQuotes(qd);store.set('pii_quotes',qd);}
    if(ind){setInvoices(ind);store.set('pii_invoices',ind);}
    if(ad){setAgencies(ad);store.set('pii_agencies',ad);}
  };

  const loadSubscription=async(userId)=>{
    const{data}=await sb.from('subscriptions').select('*').eq('user_id',userId).single();
    if(!data){
      const{data:newSub}=await sb.from('subscriptions').insert({user_id:userId,status:'trialing'}).select().single();
      setSubscription(newSub||{status:'trialing'});
    } else {
      setSubscription(data);
    }
  };

  useEffect(()=>{
    // Détecte immédiatement le token recovery dans l'URL avant tout chargement async
    if(window.location.hash.includes('type=recovery')){
      setResetMode(true);
    }
    if(!sb)return;
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){setUser(session.user);setAuthed(true);await loadProfile(session.user.id);await loadSubscription(session.user.id);loadAllData(session.user.id);}
    });
    const{data:{subscription:authSub}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(event==='PASSWORD_RECOVERY'){setResetMode(true);return;}
      if(session){setUser(session.user);setAuthed(true);if(event==='SIGNED_IN'&&!window.location.hash.includes('type=recovery')){await loadProfile(session.user.id);await loadSubscription(session.user.id);loadAllData(session.user.id);}}
      else{setUser(null);setAuthed(false);setSubscription(null);}
    });
    return()=>authSub.unsubscribe();
  },[]);

  const updateMissionStatus=async(missionId,newStatus)=>{
    if(!missionId)return;
    const m=missions.find(x=>x.id===missionId);
    if(!m)return;
    const idx=MISSION_STATUSES.indexOf;
    const cur=MISSION_STATUSES.indexOf(m.status);
    const next=MISSION_STATUSES.indexOf(newStatus);
    if(next<=cur)return; // n'avance jamais en arrière
    if(sb&&user)await sb.from('missions').update({status:newStatus}).eq('id',missionId);
    const updated=missions.map(x=>x.id===missionId?{...x,status:newStatus}:x);
    setMissions(updated);store.set('pii_missions',updated);
  };

  const isActive=()=>{
    if(!subscription)return false;
    if(!sb)return true; // demo mode: always allow access
    if(subscription.status==='active')return true;
    if(subscription.status==='trialing'){
      return !subscription.trial_ends_at||new Date(subscription.trial_ends_at)>new Date();
    }
    return false;
  };

  const trialDaysLeft=()=>{
    if(!subscription||subscription.status!=='trialing'||!subscription.trial_ends_at)return null;
    return Math.max(0,Math.ceil((new Date(subscription.trial_ends_at)-new Date())/86400000));
  };

  const manageSubscription=async()=>{
    if(!sb||!user)return;
    try{
      const res=await fetch('/api/stripe',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'portal',user_id:user.id})});
      const{url,error}=await res.json();
      if(url)window.location.href=url;
      else alert('Aucun abonnement actif trouvé.');
    }catch{alert('Erreur lors de l\'ouverture du portail.');}
  };

  // NOTE: loadSubscription is defined above (as const) so it is in scope here.
  // The onLogin callback is only invoked after the component has fully rendered,
  // so loadSubscription is accessible via closure at call time.
  if(resetMode)return <ResetPasswordPage onDone={()=>setResetMode(false)}/>;
  if(!authed)return <Login onLogin={async(u)=>{setAuthed(true);if(u&&sb){setUser(u);await loadProfile(u.id);loadSubscription(u.id);loadAllData(u.id);}}}/>;
  if(sb&&subscription===null)return(
    <div className="min-h-screen flex items-center justify-center">
      <div className="text-gray-500 text-sm animate-pulse">Chargement…</div>
    </div>
  );
  if(sb&&!isActive())return <UpgradeModal user={user}/>;

  const days=trialDaysLeft();

  const renderPage=()=>{
    switch(page){
      case'dashboard': return <Dashboard clients={clients} missions={missions} quotes={quotes} invoices={invoices}/>;
      case'clients':   return <ClientsPage clients={clients} setClients={setClients} missions={missions} quotes={quotes} agencies={agencies} setAgencies={setAgencies} user={user}/>;
      case'missions':  return <MissionsPage missions={missions} setMissions={setMissions} clients={clients} user={user}/>;
      case'quotes':    return <QuotesPage quotes={quotes} setQuotes={setQuotes} clients={clients} missions={missions} user={user} updateMissionStatus={updateMissionStatus}/>;
      case'delivery':  return <DeliveryPage missions={missions} clients={clients} galleries={galleries} setGalleries={setGalleries} user={user} updateMissionStatus={updateMissionStatus}/>;
      case'invoices':    return <InvoicesPage invoices={invoices} setInvoices={setInvoices} quotes={quotes} clients={clients} missions={missions} user={user} updateMissionStatus={updateMissionStatus}/>;
      case'portfolio':   return <PortfolioPage user={user}/>;
      case'admin':       return <AdminPage user={user}/>;
      default:           return null;
    }
  };

  return(
    <div className="min-h-screen">
      <Sidebar page={page} setPage={setPage} sideOpen={sideOpen} setSideOpen={setSideOpen} profile={profile} user={user}/>
      <MobileBottomNav page={page} setPage={setPage} setSideOpen={setSideOpen}/>
      <div className="lg:ml-56">
        {days!==null&&<TrialBanner daysLeft={days} user={user}/>}
        <header className="sticky top-0 z-10 px-4 py-3 flex items-center gap-3" style={{background:'rgba(5,5,8,0.85)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',borderBottom:'1px solid var(--border)'}}>
          <button onClick={()=>setSideOpen(true)} className="lg:hidden flex items-center justify-center rounded-lg" style={{color:'var(--muted)',width:'44px',height:'44px',flexShrink:0}} onMouseEnter={e=>e.target.style.color='var(--text)'} onMouseLeave={e=>e.target.style.color='var(--muted)'}>☰</button>
          <span className="text-sm font-medium" style={{color:'var(--muted)'}}>{NAV.find(n=>n.id===page)?.icon} {NAV.find(n=>n.id===page)?.label}</span>
          {sb&&(
            <div className="ml-auto flex items-center gap-4">
              {subscription?.status==='active'&&(
                <button onClick={manageSubscription} className="text-xs transition-colors" style={{color:'var(--muted)'}} onMouseEnter={e=>e.target.style.color='var(--text)'} onMouseLeave={e=>e.target.style.color='var(--muted)'}>Abonnement</button>
              )}
              <span className="text-xs hidden sm:block" style={{color:'#3a3a55'}}>{user?.email}</span>
              <button onClick={()=>{sb.auth.signOut();setAuthed(false);}} className="text-xs transition-colors px-3 py-1.5 rounded-lg" style={{color:'var(--muted)',border:'1px solid var(--border)'}} onMouseEnter={e=>{e.currentTarget.style.color='var(--text)';e.currentTarget.style.borderColor='rgba(201,150,60,0.3)';}} onMouseLeave={e=>{e.currentTarget.style.color='var(--muted)';e.currentTarget.style.borderColor='var(--border)';}}>Déconnexion</button>
            </div>
          )}
        </header>
        <main className="main-content-mobile lg:!pb-8 p-4 lg:p-8 max-w-5xl mx-auto">{renderPage()}</main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
