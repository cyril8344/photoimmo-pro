    input,select,textarea{background:var(--surface2)!important;border-color:var(--border)!important;color:var(--text)!important;}
    input::placeholder,textarea::placeholder{color:var(--muted)!important;}
    input:focus,select:focus,textarea:focus{border-color:var(--gold)!important;outline:none!important;box-shadow:0 0 0 2px rgba(201,150,60,0.15)!important;}

    .bg-amber-400{background:var(--gold-light)!important;}
    .hover\:bg-amber-400:hover{background:rgba(201,150,60,0.85)!important;}

    .text-amber-500{color:var(--gold)!important;}
    .border-amber-500{border-color:var(--gold)!important;}
    .focus\:border-amber-500:focus{border-color:var(--gold)!important;}
    .bg-amber-500\/10,.bg-amber-500\/15,.bg-amber-500\/20{background:rgba(201,150,60,0.1)!important;}
    .border-amber-500\/20{border-color:rgba(201,150,60,0.2)!important;}
    .ring-amber-500{--tw-ring-color:var(--gold)!important;}

    /* gray → premium dark overrides (warm tones, no blue) */
    .bg-gray-950{background:#070604!important;}
    .bg-gray-900{background:var(--surface)!important;}
    .bg-gray-800{background:var(--surface2)!important;}
    .bg-gray-700{background:#2e2820!important;}

    .hover\:text-gray-200:hover{color:#d8d0c0!important;}
    .bg-gray-800\/50{background:rgba(30,27,23,0.5)!important;}
    .bg-gray-950\/80{background:rgba(10,9,6,0.85)!important;}

    .btn-gold-primary{
      background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);
      background-size:200% 100%;

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SB_URL  = typeof __SUPABASE_URL__  !== 'undefined' ? __SUPABASE_URL__  : '';

const TVA = 0.20;
const PACKS = {

  confort:   { surface:'100-200', photos:30, visite:'oui', drone:'non', retouche:'standard', label:'Pack Confort' },

const TARIFS = {
  surface: {'<50':200,'50-100':300,'100-200':450,'>200':600},
  photos:  {10:0,20:80,30:150,50:280},
  visite:  {non:0,oui:350},
  drone:   {non:0,oui:250},
  retouche:{standard:0,premium:120},
  deplacement:0,
};
function getUserTarifs(){
  const ct=(store.get('pii_profile',{})).custom_tarifs||{};
  return {
    surface:{...TARIFS.surface,...(ct.surface||{})},
    photos:{...TARIFS.photos,...(ct.photos||{})},
    visite:{...TARIFS.visite,...(ct.visite||{})},
    drone:{...TARIFS.drone,...(ct.drone||{})},
    retouche:{...TARIFS.retouche,...(ct.retouche||{})},
    deplacement:ct.deplacement!=null?Number(ct.deplacement):0,
  };
}
const PROPERTY_TYPES=['Appartement','Maison','Villa','Commerce','Bureau','Terrain','Autre'];
const MISSION_STATUSES=['Prospect','Devis envoyé','Accepté','Shooting','Retouche','Réalisé','Livraison','Facturé','Payé'];
const QUOTE_STATUSES=['En attente','Envoyé','Accepté','Refusé'];
const STATUS_COLORS={
  'Prospect':'bg-gray-500/20 text-gray-400',
  'Devis envoyé':'bg-blue-500/20 text-blue-400',
  'Accepté':'bg-green-500/20 text-green-400',
  'Shooting':'bg-orange-500/20 text-orange-400',
  'Retouche':'bg-purple-500/20 text-purple-400',
  'Livraison':'bg-cyan-500/20 text-cyan-400',
  'Facturé':'bg-yellow-500/20 text-yellow-400',
  'Payé':'bg-emerald-500/20 text-emerald-400',
  'À confirmer':'bg-yellow-500/20 text-yellow-400',
  'Confirmé':'bg-blue-500/20 text-blue-400',
  'Réalisé':'bg-green-500/20 text-green-400',
  'Livré':'bg-purple-500/20 text-purple-400',
  'En attente':'bg-gray-500/20 text-gray-400',
  'Envoyé':'bg-blue-500/20 text-blue-400',
  'Refusé':'bg-red-500/20 text-red-400',
};

// ─── LOCAL STORAGE STORE ──────────────────────────────────────────────────────
const store = {
  get:(k,d=[])=>{ try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;} },
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
};
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const today=()=>new Date().toISOString().split('T')[0];
const fmt=(d)=>d?new Date(d).toLocaleDateString('fr-FR'):'—';
const fmtMoney=(n)=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);

// ─── CSV UTILS ────────────────────────────────────────────────────────────────
const csvEscape=v=>`"${(v||'').toString().replace(/"/g,'""')}"`;
const downloadCSV=(filename,headers,rows)=>{
  const csv=[headers,...rows].map(r=>r.map(csvEscape).join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
};
const parseCSV=(text)=>{
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  return lines.map(line=>{
    const cols=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
      else if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    return cols;
  });
};

// ─── SEED DEMO DATA ──────────────────────────────────────────────────────────

// ─── UI PRIMITIVES ────────────────────────────────────────────────────────────
const Badge=({s})=><span className={`text-xs px-2 py-0.5 rounded-full font-medium ${STATUS_COLORS[s]||'bg-gray-700 text-gray-300'}`}>{s}</span>;
const Btn=({children,onClick,variant='primary',size='md',disabled,className=''})=>{
  const base='rounded-xl font-medium transition-all focus:outline-none disabled:opacity-40 disabled:cursor-not-allowed';
  const variants={
    primary:'btn-gold-primary',
    secondary:'btn-secondary-prem',
    danger:'bg-red-900/40 hover:bg-red-900/60 text-red-300 border border-red-800/50',
    ghost:'text-[var(--muted)] hover:bg-[var(--surface2)] hover:text-[var(--text)]',
  };
  const sizes={sm:'text-xs px-3 py-1.5',md:'text-sm px-4 py-2',lg:'text-base px-6 py-3'};
  return <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>{children}</button>;
};
const Input=({label,value,onChange,type='text',placeholder='',required,className=''})=>(
  <div className={className}>
    {label&&<label className="block text-xs mb-1.5" style={{color:'var(--muted)'}}>{label}{required&&<span style={{color:'var(--gold)'}} className="ml-0.5">*</span>}</label>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      className="w-full rounded-xl border text-sm px-3 py-2.5 focus:outline-none"/>
  </div>
);
const Select=({label,value,onChange,options,className=''})=>(
  <div className={className}>
    {label&&<label className="block text-xs mb-1.5" style={{color:'var(--muted)'}}>{label}</label>}
    <select value={value} onChange={e=>onChange(e.target.value)} className="w-full rounded-xl border text-sm px-3 py-2.5 focus:outline-none">
      {options.map(o=><option key={o.value??o} value={o.value??o}>{o.label??o}</option>)}
    </select>
  </div>
);
const Card=({children,className=''})=><div className={`card-prem ${className}`}>{children}</div>;
const Modal=({title,onClose,children,size='md'})=>(
  <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="absolute inset-0 bg-black/70 backdrop-blur-sm"/>
    <div className={`relative rounded-2xl w-full ${size==='lg'?'max-w-3xl':size==='xl'?'max-w-5xl':'max-w-lg'} max-h-[90vh] overflow-y-auto fade-in`} style={{background:'var(--surface)',border:'1px solid var(--border)'}}>
      <div className="flex items-center justify-between p-5" style={{borderBottom:'1px solid var(--border)'}}>
        <h2 className="font-semibold text-lg">{title}</h2>
        <button onClick={onClose} className="w-11 h-11 flex items-center justify-center rounded-lg transition-colors" style={{color:'var(--muted)'}} onMouseEnter={e=>e.target.style.color='var(--text)'} onMouseLeave={e=>e.target.style.color='var(--muted)'}>✕</button>
      </div>
      <div className="p-5">{children}</div>
    </div>
  </div>
);
const StatCard=({label,value,sub,icon})=>(
  <Card className="flex items-center gap-4">
    <div className="text-2xl w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:'rgba(201,150,60,0.1)',border:'1px solid rgba(201,150,60,0.2)'}}>{icon}</div>
    <div>
      <div className="text-xl font-bold" style={{color:'var(--gold-light)'}}>{value}</div>
      <div className="text-sm" style={{color:'var(--muted)'}}>{label}</div>
      {sub&&<div className="text-xs mt-0.5" style={{color:'var(--muted)',opacity:0.7}}>{sub}</div>}
    </div>
  </Card>
);

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({clients,missions,quotes,invoices}){
  const now=new Date();
  const month=now.getMonth();const year=now.getFullYear();
  const monthMissions=missions.filter(m=>{const d=new Date(m.date);return d.getMonth()===month&&d.getFullYear()===year;});
  const doneMissions=monthMissions.filter(m=>['Livraison','Facturé','Payé'].includes(m.status));
  const ca=quotes.filter(q=>q.status==='Accepté').reduce((s,q)=>s+q.ttc,0);
  const pendingQuotes=quotes.filter(q=>q.status==='En attente'||q.status==='Envoyé');
  const totalQuoted=quotes.filter(q=>q.status!=='Refusé').length;
  const accepted=quotes.filter(q=>q.status==='Accepté').length;
  const convRate=totalQuoted>0?Math.round(accepted/totalQuoted*100):0;

  // Prochaine mission
  const upcoming=missions.filter(m=>new Date(m.date)>=now).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const nextMission=upcoming[0];

  // Alertes
  const unpaidInvoices=invoices.filter(i=>(i.status==='En attente'||i.status==='Envoyée')&&i.due_date&&new Date(i.due_date)<now);
  const staleQuotes=quotes.filter(q=>(q.status==='En attente'||q.status==='Envoyé')&&q.created_at&&(now-new Date(q.created_at))>48*3600000);
  const quotesWithoutInvoice=quotes.filter(q=>q.status==='Accepté'&&!invoices.find(i=>i.quote_id===q.id));

  const getClient=id=>clients.find(c=>c.id===id);

  // Pipeline kanban simplifié
  const PIPELINE_STATUSES=['Prospect','Devis envoyé','Accepté','Shooting','Retouche','Livraison'];
  const pipelineGroups=PIPELINE_STATUSES.map(s=>({status:s,items:missions.filter(m=>m.status===s)}));

  // CA 6 derniers mois
  const monthLabels=[];const monthCA=[];
  for(let i=5;i>=0;i--){
    const d=new Date(year,month-i,1);
    const mn=d.getMonth();const yr=d.getFullYear();
    monthLabels.push(d.toLocaleDateString('fr-FR',{month:'short'}));
    const mCA=quotes.filter(q=>{
      if(q.status!=='Accepté')return false;
      const qd=new Date(q.created_at);return qd.getMonth()===mn&&qd.getFullYear()===yr;
    }).reduce((s,q)=>s+q.ttc,0);
    monthCA.push(mCA);
  }
  const maxCA=Math.max(...monthCA,1);

  // Top agences (par nombre de devis acceptés)
  const agencyStats={};
  quotes.filter(q=>q.status==='Accepté').forEach(q=>{
    const cl=getClient(q.client_id);if(!cl)return;
    const key=cl.agent||cl.name;
    agencyStats[key]=(agencyStats[key]||0)+q.ttc;
  });
  const topAgencies=Object.entries(agencyStats).sort((a,b)=>b[1]-a[1]).slice(0,5);

  return(
    <div className="fade-in space-y-6">
      {/* Header */}
      <div className="flex items-start justify-between">
        <div>
          <h1 className="text-2xl font-bold">Tableau de bord</h1>
          <p className="text-gray-500 text-sm mt-1">{now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
        </div>
        {nextMission&&(
          <div className="hidden sm:block bg-amber-500/10 border border-amber-500/20 rounded-xl px-4 py-2 text-right">
            <div className="text-xs text-amber-400">Prochaine mission</div>
            <div className="text-sm font-medium text-white truncate max-w-48">{nextMission.address}</div>
            <div className="text-xs text-amber-400">{fmt(nextMission.date)}</div>
          </div>
        )}
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <Card className="flex items-center gap-3">
          <div className="text-2xl">💰</div>
          <div><div className="text-xl font-bold text-amber-400">{fmtMoney(ca)}</div><div className="text-xs text-gray-400">CA (devis acceptés)</div></div>
        </Card>
        <Card className="flex items-center gap-3">
          <div className="text-2xl">📅</div>
          <div><div className="text-xl font-bold text-amber-400">{doneMissions.length}</div><div className="text-xs text-gray-400">Missions réalisées ce mois</div></div>
        </Card>
        <Card className="flex items-center gap-3">
          <div className="text-2xl">📄</div>
          <div><div className="text-xl font-bold text-amber-400">{pendingQuotes.length}</div><div className="text-xs text-gray-400">Devis en attente</div></div>
        </Card>
        <Card className="flex items-center gap-3">
          <div className="text-2xl">🎯</div>
          <div><div className="text-xl font-bold text-amber-400">{convRate}%</div><div className="text-xs text-gray-400">Taux de conversion</div></div>
        </Card>
      </div>

      {/* Alertes */}
      {(unpaidInvoices.length>0||staleQuotes.length>0||quotesWithoutInvoice.length>0)&&(
        <Card className="border-red-500/20 bg-red-500/5">
          <h3 className="font-semibold text-red-400 mb-3">⚠ Actions requises</h3>
          <div className="space-y-2">
            {unpaidInvoices.map(i=>(
              <div key={i.id} className="flex items-center justify-between text-sm">
                <span className="text-gray-300">Facture {i.num} en retard — {fmtMoney(i.ttc)}</span>
                <span className="text-red-400 text-xs">Relancer</span>
              </div>
            ))}
            {staleQuotes.map(q=>(
              <div key={q.id} className="flex items-center justify-between text-sm">
                <span className="text-gray-300">Devis {q.num} sans réponse depuis +48h</span>
                <span className="text-amber-400 text-xs">Relancer</span>
              </div>
            ))}
            {quotesWithoutInvoice.slice(0,3).map(q=>(
              <div key={q.id} className="flex items-center justify-between text-sm">

// ─── CLIENTS ─────────────────────────────────────────────────────────────────
function ClientsPage({clients,setClients,missions,quotes,agencies,setAgencies,user}){
  const [subTab,setSubTab]=useState('clients');
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({name:'',email:'',phone:'',agent:'',agent_email:''});
  const filtered=clients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||(c.email||'').toLowerCase().includes(search.toLowerCase()));

  const save=async()=>{
    if(!form.name||form.name.trim().length<2)return;
    if(form.email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)){alert('Email invalide');return;}
    if(modal==='new'){
      if(sb&&user){
        const{data,error}=await sb.from('clients').insert({...form,user_id:user.id}).select().single();
        if(error){alert('Erreur : '+error.message);return;}
        const updated=[...clients,data];setClients(updated);store.set('pii_clients',updated);
      } else {
        const updated=[...clients,{...form,id:uid(),created_at:today()}];setClients(updated);store.set('pii_clients',updated);
      }
    } else {
      if(sb&&user)await sb.from('clients').update(form).eq('id',modal);
      const updated=clients.map(c=>c.id===modal?{...c,...form}:c);setClients(updated);store.set('pii_clients',updated);
    }
    setModal(null);
  };
  const del=async(id)=>{
    if(!confirm('Supprimer ce client ?'))return;
    if(sb&&user)await sb.from('clients').delete().eq('id',id);
    const updated=clients.filter(c=>c.id!==id);setClients(updated);store.set('pii_clients',updated);
  };
  const openEdit=(c)=>{setForm({name:c.name,email:c.email||'',phone:c.phone||'',agent:c.agent||'',agent_email:c.agent_email||''});setModal(c.id);};
  const openNew=()=>{setForm({name:'',email:'',phone:'',agent:'',agent_email:''});setModal('new');};

  const exportCSV=()=>{
    downloadCSV('clients.csv',
      ['Nom','Email','Téléphone','Agence','Email agence'],
      clients.map(c=>[c.name,c.email,c.phone,c.agent,c.agent_email])
    );
  };
  const importCSV=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const rows=parseCSV(ev.target.result);
      if(rows.length<2){alert('Fichier vide ou invalide');return;}
      const objs=rows.slice(1).filter(r=>r[0]).map(r=>({name:r[0]||'',email:r[1]||'',phone:r[2]||'',agent:r[3]||'',agent_email:r[4]||''}));
      if(sb&&user){
        const{data}=await sb.from('clients').insert(objs.map(o=>({...o,user_id:user.id}))).select();
        if(data){const u=[...clients,...data];setClients(u);store.set('pii_clients',u);}
      } else {
        const u=[...clients,...objs.map(o=>({...o,id:uid(),created_at:today()}))];setClients(u);store.set('pii_clients',u);
      }
      alert(`${objs.length} client(s) importé(s) !`);
    };
    reader.readAsText(file,'UTF-8');
    e.target.value='';
  };

  if(subTab==='agencies') return(

  return(
    <div className="fade-in space-y-5">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <h1 className="text-2xl font-bold">Clients & Agences</h1>

          <label className="cursor-pointer px-3 py-1.5 text-sm bg-gray-700 hover:bg-gray-600 text-gray-200 rounded-lg">

// ─── DEVIS ────────────────────────────────────────────────────────────────────
function calcDevis(form, tarifs=TARIFS){
  const ht=(tarifs.surface[form.surface]||0)+(tarifs.photos[+form.photos]||0)+(tarifs.visite[form.visite]||0)+(tarifs.drone[form.drone]||0)+(tarifs.retouche[form.retouche]||0)+(Number(form.deplacement)||0);
  return {ht, tva:Math.round(ht*TVA*100)/100, ttc:Math.round(ht*(1+TVA)*100)/100};
}

function exportPDF(q,client,mission,{returnBase64=false}={}){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const dark=[15,17,23];
  const amber=[201,150,60];
  const amberLight=[245,190,100];
  const white=[255,255,255];
  const lightGray=[180,180,190];
  const veryLightGray=[240,240,245];
  const profile=store.get('pii_profile',{});
  const companyName=profile.company_name||'PhotoImmo Pro';
  const initials=companyName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const validUntil=new Date(q.created_at);validUntil.setDate(validUntil.getDate()+30);

  // ── Header sombre
  doc.setFillColor(...dark);doc.rect(0,0,210,50,'F');
  // Bande dorée en bas du header
  doc.setFillColor(...amber);doc.rect(0,48,210,2,'F');

  // Titre DEVIS
  doc.setTextColor(...white);doc.setFontSize(24);doc.setFont('helvetica','bold');
  doc.text('DEVIS',14,22);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(...lightGray);
  doc.text(`N° ${q.num}`,14,31);
  doc.text(`Date : ${fmt(q.created_at)}`,14,38);
  doc.text(`Valable jusqu'au : ${fmt(validUntil.toISOString())}`,14,44);

async function sendQuoteEmail(q, client, mission, acceptUrl) {
  try {
    const dueDate=new Date(q.created_at);dueDate.setDate(dueDate.getDate()+30);
    let pdfBase64=null;
    try{pdfBase64=exportPDF(q,client,mission,{returnBase64:true});}catch(e){}
    const res=await fetch('/api/notify',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'quote_sent',to:client.email,
        data:{
          client_name:client.name,
          num:q.num,
          ttc:fmtMoney(q.ttc),
          expires:fmt(dueDate.toISOString().split('T')[0]),
          address:mission?.address||'',
          accept_url:acceptUrl||null,
          pdf_base64:pdfBase64,
          pdf_filename:`devis-${q.num}.pdf`
        }})});
    const result=await res.json();
    if(!res.ok)throw new Error(result.error||'Erreur envoi');
    return {success:true};
  }catch(err){return {success:false,error:err.message};}
}

function QuotesPage({quotes,setQuotes,clients,missions,user,updateMissionStatus}){
  const [modal,setModal]=useState(null);
  const [userTarifs,setUserTarifs]=useState(getUserTarifs);
  const defaultForm=()=>{const t=getUserTarifs();return{client_id:'',mission_id:'',surface:'50-100',photos:20,visite:'non',drone:'non',retouche:'standard',deplacement:t.deplacement};};
  const [form,setForm]=useState(defaultForm);
  const getClient=id=>clients.find(c=>c.id===id);
  const getMission=id=>missions.find(m=>m.id===id);
  const calc=useMemo(()=>calcDevis(form,userTarifs),[form,userTarifs]);
  const clientMissions=missions.filter(m=>m.client_id===form.client_id);

  const save=async()=>{
    if(!form.client_id)return;
    const num=`DEV-${String(quotes.length+1).padStart(3,'0')}`;
    const payload={...form,...calc,num,status:'En attente'};
    if(sb&&user){
      const{data,error}=await sb.from('quotes').insert({...payload,user_id:user.id}).select().single();
      if(error){alert('Erreur : '+error.message);return;}
      const u=[...quotes,data];setQuotes(u);store.set('pii_quotes',u);
    } else {
      const u=[...quotes,{...payload,id:uid(),created_at:today()}];setQuotes(u);store.set('pii_quotes',u);
    }
    setModal(null);
  };
  const setStatus=async(id,status)=>{
    if(sb&&user)await sb.from('quotes').update({status}).eq('id',id);
    const u=quotes.map(q=>q.id===id?{...q,status}:q);setQuotes(u);store.set('pii_quotes',u);
    if(status==='Accepté'){const q=quotes.find(x=>x.id===id);if(q?.mission_id)updateMissionStatus&&updateMissionStatus(q.mission_id,'Accepté');}
    if(status==='Envoyé'){const q=quotes.find(x=>x.id===id);if(q?.mission_id)updateMissionStatus&&updateMissionStatus(q.mission_id,'Devis envoyé');}
  };
  const del=async(id)=>{if(!confirm('Supprimer ce devis ?'))return;if(sb&&user)await sb.from('quotes').delete().eq('id',id);const u=quotes.filter(q=>q.id!==id);setQuotes(u);store.set('pii_quotes',u);};
  const sorted=[...quotes].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  return(
    <div className="fade-in space-y-5">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold">Devis</h1>
        <Btn onClick={()=>{const t=getUserTarifs();setUserTarifs(t);setForm(defaultForm());setModal('new');}}>+ Nouveau devis</Btn>
      </div>
      <div className="space-y-3">
        {sorted.length===0&&<p className="text-gray-500 text-sm">Aucun devis</p>}
        {sorted.map(q=>{
          const cl=getClient(q.client_id);
          const mi=getMission(q.mission_id);
          return(
            <Card key={q.id} className="hover:border-gray-700 transition-colors">
              {/* Ligne principale : infos + montant */}
              <div className="flex items-start justify-between gap-3 mb-3">
                <div className="min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-1">
                    <span className="font-mono text-sm font-bold text-amber-400">{q.num}</span>
                    <Badge s={q.status}/>
                    <span className="text-xs text-gray-500">{fmt(q.created_at)}</span>
                  </div>
                  <div className="font-medium truncate">{cl?.name||'—'}</div>
                  {mi&&<div className="text-xs text-gray-500 truncate">{mi.address}</div>}
                </div>
                <div className="text-right shrink-0">
                  <div className="text-xl font-bold text-amber-400">{fmtMoney(q.ttc)}</div>
                  <div className="text-xs text-gray-500">HT {fmtMoney(q.ht)}</div>
                </div>
              </div>
              {/* Barre d'actions */}
              <div className="flex items-center gap-2 pt-3 border-t border-gray-800 flex-wrap">
                <select value={q.status} onChange={e=>setStatus(q.id,e.target.value)}
                  className="text-xs rounded-lg px-2 py-1.5 bg-gray-800 border border-gray-700 text-gray-300 focus:outline-none focus:border-amber-500 flex-1 min-w-0">
                  {QUOTE_STATUSES.map(s=><option key={s}>{s}</option>)}
                </select>
                <div className="flex gap-1 shrink-0">
                  <Btn size="sm" variant="ghost" onClick={()=>exportPDF(q,cl,mi)}>📄 PDF</Btn>
                  {cl?.email&&<Btn size="sm" variant="ghost" onClick={async()=>{
                    let token=q.accept_token;
                    if(!token){token=crypto.randomUUID();if(sb&&user){await sb.from('quotes').update({accept_token:token}).eq('id',q.id);}const u=quotes.map(x=>x.id===q.id?{...x,accept_token:token}:x);setQuotes(u);store.set('pii_quotes',u);}
                    const acceptUrl=`${location.origin}/quote/${token}`;
                    const r=await sendQuoteEmail(q,cl,mi,acceptUrl);
                    if(r.success){alert('Devis envoyé par email !');setStatus(q.id,'Envoyé');if(q.mission_id)updateMissionStatus&&updateMissionStatus(q.mission_id,'Devis envoyé');}else alert('Erreur : '+r.error);
                  }}>📧 Email</Btn>}
                  <Btn size="sm" variant="ghost" onClick={()=>del(q.id)}>🗑️</Btn>
                </div>
              </div>
            </Card>
          );
        })}
      </div>

      {modal&&(
        <Modal title="Nouveau devis" onClose={()=>setModal(null)} size="lg">
          <div className="grid lg:grid-cols-2 gap-6">
            <div className="space-y-3">
              <Select label="Client *" value={form.client_id} onChange={v=>setForm(f=>({...f,client_id:v,mission_id:''}))}
                options={[{value:'',label:'Sélectionner…'},...clients.map(c=>({value:c.id,label:c.name}))]}/>
              {form.client_id&&(
                <Select label="Mission liée" value={form.mission_id} onChange={v=>setForm(f=>({...f,mission_id:v}))}
                  options={[{value:'',label:'Aucune'},...clientMissions.map(m=>({value:m.id,label:m.address}))]}/>

// ─── LIVRAISONS ───────────────────────────────────────────────────────────────
function DeliveryPage({missions,clients,galleries,setGalleries,user,updateMissionStatus}){
  const [viewGallery,setViewGallery]=useState(null);
  const [photos,setPhotos]=useState([]);
  const [uploading,setUploading]=useState(false);
  const [loadingPhotos,setLoadingPhotos]=useState(false);
  const [toast,setToast]=useState('');
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),3000);};

  const getClient=id=>clients.find(c=>c.id===id);
  const done=missions.filter(m=>m.status==='Réalisé'||m.status==='Livré');
  const getGallery=mId=>galleries.find(g=>g.mission_id===mId);

  useEffect(()=>{
    if(!sb||!user)return;
    (async()=>{
      const{data}=await sb.from('galleries').select('*, gallery_photos(id)').eq('user_id',user.id).order('created_at',{ascending:false});
      if(data){
        const normalized=data.map(g=>({...g,photos_count:g.gallery_photos?.length||0}));
        setGalleries(normalized);store.set('pii_galleries',normalized);
      }
    })();
  },[user]);

  const createGallery=async(m)=>{
    if(sb&&user){
      const{data,error}=await sb.from('galleries').insert({user_id:user.id,mission_id:m.id,property_address:m.address}).select().single();
      if(error){showToast('Erreur : '+error.message);return;}
      const updated=[...galleries,{...data,photos_count:0}];
      setGalleries(updated);store.set('pii_galleries',updated);
    }else{
      const g={id:uid(),mission_id:m.id,token:uid(),ready:false,photos_count:0,created_at:today(),property_address:m.address};
      const updated=[...galleries,g];setGalleries(updated);store.set('pii_galleries',updated);
    }
  };

  const toggleReady=async(gId)=>{
    const g=galleries.find(x=>x.id===gId);
    const newReady=!g.ready;
    if(sb&&user)await sb.from('galleries').update({ready:newReady}).eq('id',gId);
    const updated=galleries.map(g=>g.id===gId?{...g,ready:newReady}:g);
    setGalleries(updated);store.set('pii_galleries',updated);
    if(viewGallery?.id===gId)setViewGallery(prev=>({...prev,ready:newReady}));
    if(newReady&&g.mission_id)updateMissionStatus&&updateMissionStatus(g.mission_id,'Livraison');
  };

  const openGallery=async(g)=>{
    setViewGallery(g);setPhotos([]);setLoadingPhotos(true);
    if(sb){
      const{data}=await sb.from('gallery_photos').select('*').eq('gallery_id',g.id).order('created_at',{ascending:true});
      setPhotos(data||[]);
    }
    setLoadingPhotos(false);
  };

  const handleUpload=async(e)=>{
    if(!viewGallery)return;
    const files=Array.from(e.target.files);
    e.target.value='';
    if(!files.length)return;
    setUploading(true);let added=0;
    for(const file of files){
      if(sb&&user){
        const ext=file.name.split('.').pop().toLowerCase();
        const path=`${user.id}/${viewGallery.id}/${uid()}.${ext}`;
        const{error:upErr}=await sb.storage.from('gallery-photos').upload(path,file);
        if(upErr){showToast('Erreur upload : '+upErr.message);continue;}
        const{data:{publicUrl}}=sb.storage.from('gallery-photos').getPublicUrl(path);
        const{data:photo,error:dbErr}=await sb.from('gallery_photos').insert({gallery_id:viewGallery.id,name:file.name,full_url:publicUrl,thumb_url:publicUrl,selected:false}).select().single();
        if(dbErr){showToast('Erreur base de données');continue;}
        if(photo){setPhotos(prev=>[...prev,photo]);added++;}
      }else{
        await new Promise(resolve=>{
          const reader=new FileReader();
          reader.onload=ev=>{
            setPhotos(prev=>[...prev,{id:uid(),name:file.name,full_url:ev.target.result,thumb_url:ev.target.result,selected:false}]);
            added++;resolve();
          };
          reader.readAsDataURL(file);
        });
      }
    }
    if(added>0){
      const updated=galleries.map(g=>g.id===viewGallery.id?{...g,photos_count:(g.photos_count||0)+added}:g);
      setGalleries(updated);store.set('pii_galleries',updated);
      showToast(`${added} photo${added>1?'s':''} ajoutée${added>1?'s':''}`);
    }
    setUploading(false);
  };

  const deletePhoto=async(pid,url)=>{
    if(sb&&user){
      if(url&&url.includes('/gallery-photos/')){
        try{
          const pathPart=url.split('/gallery-photos/')[1];
          if(pathPart)await sb.storage.from('gallery-photos').remove([decodeURIComponent(pathPart)]);
        }catch(_){}
      }
      await sb.from('gallery_photos').delete().eq('id',pid);
    }
    setPhotos(prev=>prev.filter(p=>p.id!==pid));
    const updated=galleries.map(g=>g.id===viewGallery.id?{...g,photos_count:Math.max(0,(g.photos_count||1)-1)}:g);
    setGalleries(updated);store.set('pii_galleries',updated);
  };

  const copyLink=(token)=>{
    navigator.clipboard.writeText(`${location.origin}/gallery/${token}`);
    showToast('Lien copié !');
  };

  const currentMission=viewGallery?missions.find(m=>m.id===viewGallery.mission_id):null;
  const selCount=photos.filter(p=>p.selected).length;

  return(
    <div className="fade-in space-y-5">
      {toast&&<div className="fixed top-4 right-4 z-50 bg-amber-500 text-black px-4 py-2 rounded-lg text-sm font-medium shadow-lg">{toast}</div>}
      <h1 className="text-2xl font-bold">Livraisons</h1>
      <div className="space-y-3">
        {done.length===0&&<p className="text-gray-500 text-sm">Aucune mission réalisée — passez une mission en statut "Réalisé" pour créer sa galerie.</p>}
        {done.map(m=>{
          const cl=getClient(m.client_id);
          const g=getGallery(m.id);
          return(
            <Card key={m.id} className="hover:border-gray-700 transition-colors">
              <div className="flex items-center justify-between gap-4 flex-wrap">
                <div>
                  <div className="flex items-center gap-2 mb-1"><Badge s={m.status}/><span className="text-xs text-gray-500">{m.type}</span></div>
                  <div className="font-medium">{m.address}</div>
                  <div className="text-sm text-gray-400">{cl?.name}</div>
                  <div className="text-xs text-gray-500">{fmt(m.date)}</div>
                </div>
                <div className="flex flex-col gap-2 items-end">
                  {!g?(
                    <Btn size="sm" onClick={()=>createGallery(m)}>🖼️ Créer galerie</Btn>
                  ):(
                    <>
                      <div className="flex items-center gap-2">
                        <span className={`text-xs px-2 py-1 rounded-full ${g.ready?'bg-green-500/20 text-green-400':'bg-gray-700 text-gray-400'}`}>
                          {g.ready?'✓ Publiée':'Brouillon'}
                        </span>
                        <span className="text-xs text-gray-500">{g.photos_count||0} photo{(g.photos_count||0)!==1?'s':''}</span>
                      </div>
                      <div className="flex gap-1 flex-wrap justify-end">
                        <Btn size="sm" variant="ghost" onClick={()=>openGallery(g)}>✏️ Gérer</Btn>
                        <Btn size="sm" variant="ghost" onClick={()=>copyLink(g.token)}>🔗 Lien</Btn>
                        {g.ready&&cl?.email&&(
                          <Btn size="sm" variant="ghost" onClick={async()=>{const r=await sendGalleryEmail(g,cl,m.address);showToast(r.success?'Email envoyé à '+cl.email:'Erreur : '+r.error);}}>📧</Btn>
                        )}
                        <Btn size="sm" variant={g.ready?'secondary':'primary'} onClick={()=>toggleReady(g.id)}>
                          {g.ready?'Dépublier':'Publier'}
                        </Btn>
                      </div>
                    </>
                  )}
                </div>
              </div>
            </Card>
          );
        })}
      </div>

      {viewGallery&&(
        <Modal title={`Galerie — ${currentMission?.address||''}`} onClose={()=>setViewGallery(null)} size="xl">
          <div className="space-y-4">
            <div className="flex items-center justify-between gap-3 flex-wrap">
              <label className={`cursor-pointer ${uploading?'opacity-50 pointer-events-none':''}`}>
                <input type="file" multiple accept="image/*" className="hidden" onChange={handleUpload} disabled={uploading}/>
                <span className="bg-amber-500 hover:bg-amber-400 text-black text-sm font-medium px-4 py-2 rounded-lg transition-all inline-block">
                  {uploading?'⏳ Upload en cours…':'+ Ajouter des photos'}
                </span>
              </label>
              <span className="text-xs text-gray-500">{photos.length} photo{photos.length!==1?'s':''} · {selCount} sélectionnée{selCount!==1?'s':''} par le client</span>
            </div>

            {loadingPhotos?(
              <div className="text-center py-12 text-gray-600">Chargement…</div>
            ):photos.length===0?(
              <div className="text-center py-16 text-gray-600">
                <div className="text-5xl mb-3">🖼️</div>
                <p>Aucune photo encore. Cliquez pour en ajouter.</p>
              </div>
            ):(
              <div className="grid grid-cols-3 md:grid-cols-4 gap-3 max-h-96 overflow-y-auto">
                {photos.map(p=>(
                  <div key={p.id} className="relative group rounded-lg overflow-hidden border border-gray-700">
                    <img src={p.thumb_url||p.full_url} alt={p.name} className="w-full h-24 object-cover"/>
                    {p.selected&&<div className="absolute top-1 left-1 bg-amber-500 rounded-full w-5 h-5 flex items-center justify-center text-xs text-black font-bold">✓</div>}
                    <button onClick={()=>deletePhoto(p.id,p.full_url)}
                      className="absolute top-1 right-1 bg-red-600/80 hover:bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-all">×</button>
                    <div className="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/70 p-1">
                      <p className="text-xs text-white truncate">{p.name}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}

            <p className="text-xs text-gray-500">Les photos avec ✓ ont été sélectionnées par votre client depuis son lien de livraison.</p>
            <div className="flex items-center gap-2 pt-2 border-t border-gray-800 flex-wrap">
              <Btn size="sm" variant="ghost" onClick={()=>copyLink(viewGallery.token)}>🔗 Copier le lien client</Btn>
              {!viewGallery.ready&&(
                <Btn size="sm" onClick={()=>toggleReady(viewGallery.id)}>Publier la galerie</Btn>
              )}
              {viewGallery.ready&&(
                <span className="text-xs text-green-400 ml-auto">✓ Galerie publiée — le lien est actif</span>
              )}
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── AGENCES ──────────────────────────────────────────────────────────────────
function AgenciesPage({agencies,setAgencies,clients,missions,quotes,user,hideTitle}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({name:'',contacts:'',notes:''});

  const save=async()=>{
    if(!form.name)return;
    if(modal==='new'){
      if(sb&&user){
        const{data,error}=await sb.from('agencies').insert({...form,user_id:user.id}).select().single();
        if(error){alert('Erreur : '+error.message);return;}
        const u=[...agencies,data];setAgencies(u);store.set('pii_agencies',u);
      } else {
        const u=[...agencies,{...form,id:uid(),created_at:today()}];setAgencies(u);store.set('pii_agencies',u);
      }
    } else {
      if(sb&&user)await sb.from('agencies').update(form).eq('id',modal);
      const u=agencies.map(a=>a.id===modal?{...a,...form}:a);setAgencies(u);store.set('pii_agencies',u);
    }
    setModal(null);
  };
  const del=async(id)=>{if(!confirm('Supprimer cette agence ?'))return;if(sb&&user)await sb.from('agencies').delete().eq('id',id);const u=agencies.filter(a=>a.id!==id);setAgencies(u);store.set('pii_agencies',u);};
  const openEdit=(a)=>{setForm({name:a.name,contacts:a.contacts||'',notes:a.notes||''});setModal(a.id);};

  return(
    <div className={hideTitle?'space-y-5':'fade-in space-y-5'}>
      {!hideTitle&&<div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold">Agences</h1>
        <Btn onClick={()=>{setForm({name:'',contacts:'',notes:''});setModal('new');}}>+ Nouvelle agence</Btn>
      </div>}
      {hideTitle&&<div className="flex justify-end">
        <Btn onClick={()=>{setForm({name:'',contacts:'',notes:''});setModal('new');}}>+ Nouvelle agence</Btn>
      </div>}
      <div className="grid gap-3">
        {agencies.length===0&&<p className="text-gray-500 text-sm">Aucune agence. Ajoutez vos partenaires immobiliers.</p>}
        {agencies.map(a=>(
          <Card key={a.id} className="hover:border-gray-700 transition-colors">
            <div className="flex items-center justify-between gap-4">
              <div className="min-w-0 flex-1">
                <div className="font-medium text-lg truncate">{a.name}</div>
                {a.contacts&&<div className="text-sm text-gray-400 mt-1 truncate">{a.contacts}</div>}
                {a.notes&&<div className="text-xs text-gray-500 mt-1 italic truncate">{a.notes}</div>}
              </div>
              <div className="flex gap-1 flex-shrink-0">
                <Btn size="sm" variant="ghost" onClick={()=>openEdit(a)}>✏️</Btn>
                <Btn size="sm" variant="ghost" onClick={()=>del(a.id)}>🗑️</Btn>
              </div>
            </div>
          </Card>
        ))}
      </div>
      {modal&&(
        <Modal title={modal==='new'?'Nouvelle agence':'Modifier l\'agence'} onClose={()=>setModal(null)}>
          <div className="space-y-3">
            <Input label="Nom de l'agence" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} required/>
            <div>
              <label className="block text-xs text-gray-400 mb-1">Contacts (un par ligne)</label>
              <textarea value={form.contacts} onChange={e=>setForm(f=>({...f,contacts:e.target.value}))} rows={3}
                className="w-full rounded-lg border border-gray-700 bg-gray-800 text-sm px-3 py-2 focus:outline-none focus:border-amber-500 resize-none"/>
            </div>
            <div>
              <label className="block text-xs text-gray-400 mb-1">Notes / tarifs préférentiels</label>
              <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2}
                className="w-full rounded-lg border border-gray-700 bg-gray-800 text-sm px-3 py-2 focus:outline-none focus:border-amber-500 resize-none"/>
            </div>
            <div className="flex justify-end gap-2 pt-2">
              <Btn variant="secondary" onClick={()=>setModal(null)}>Annuler</Btn>
              <Btn onClick={save}>Enregistrer</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── FACTURES ─────────────────────────────────────────────────────────────────
function InvoicesPage({invoices,setInvoices,quotes,clients,missions,user,updateMissionStatus}){
  const [subTab,setSubTab]=useState('invoices');
  const [filter,setFilter]=useState('Tous');

  const getClient=id=>clients.find(c=>c.id===id);
  const getMission=id=>missions.find(m=>m.id===id);

  const createFromQuote=async(q)=>{
    if(invoices.find(i=>i.quote_id===q.id)){alert('Une facture existe déjà pour ce devis.');return;}
    const num=`FAC-${String(invoices.length+1).padStart(3,'0')}`;
    const dueDate=new Date();dueDate.setDate(dueDate.getDate()+30);
    const payload={quote_id:q.id,client_id:q.client_id,mission_id:q.mission_id,
      num,ht:q.ht,tva:q.tva||Math.round(q.ht*0.20*100)/100,ttc:q.ttc,
      status:'En attente',due_date:dueDate.toISOString().split('T')[0],reminders_sent:0};
    if(sb&&user){
      const{data,error}=await sb.from('invoices').insert({...payload,user_id:user.id}).select().single();
      if(error){alert('Erreur : '+error.message);return;}
      const u=[...invoices,data];setInvoices(u);store.set('pii_invoices',u);
      if(q.mission_id)updateMissionStatus&&updateMissionStatus(q.mission_id,'Facturé');
    } else {
      const u=[...invoices,{...payload,id:uid(),created_at:today()}];setInvoices(u);store.set('pii_invoices',u);
      if(q.mission_id)updateMissionStatus&&updateMissionStatus(q.mission_id,'Facturé');
    }
  };

  const setStatus=async(id,status)=>{
    const updates={status,paid_date:status==='Payée'?today():undefined};
    if(sb&&user)await sb.from('invoices').update(updates).eq('id',id);
    const u=invoices.map(i=>i.id===id?{...i,...updates}:i);setInvoices(u);store.set('pii_invoices',u);
    if(status==='Payée'){const inv=invoices.find(x=>x.id===id);if(inv?.mission_id)updateMissionStatus&&updateMissionStatus(inv.mission_id,'Payé');}
  };

  const del=async(id)=>{if(!confirm('Supprimer cette facture ?'))return;if(sb&&user)await sb.from('invoices').delete().eq('id',id);const u=invoices.filter(i=>i.id!==id);setInvoices(u);store.set('pii_invoices',u);};

  const INVOICE_STATUSES=['En attente','Envoyée','Payée','Annulée'];
  const INV_COLORS={'En attente':'bg-gray-500/20 text-gray-400','Envoyée':'bg-blue-500/20 text-blue-400','Payée':'bg-green-500/20 text-green-400','Annulée':'bg-red-500/20 text-red-400'};

  const filtered=filter==='Tous'?invoices:invoices.filter(i=>i.status===filter);
  const unpaid=invoices.filter(i=>i.status==='En attente'||i.status==='Envoyée');
  const totalUnpaid=unpaid.reduce((s,i)=>s+i.ttc,0);

  // Devis acceptés sans facture
  const quotesWithoutInvoice=quotes.filter(q=>q.status==='Accepté'&&!invoices.find(i=>i.quote_id===q.id));

  if(subTab==='accounting') return(
    <div className="fade-in space-y-5">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold">Factures & Comptabilité</h1>
      </div>
      <div className="flex rounded-xl p-1" style={{background:'var(--surface2)',border:'1px solid var(--border)',width:'fit-content'}}>
        <button onClick={()=>setSubTab('invoices')} className="text-sm px-4 py-1.5 rounded-lg transition-all font-medium" style={{color:'var(--muted)',border:'1px solid transparent'}}>🧾 Factures</button>
        <button className="text-sm px-4 py-1.5 rounded-lg transition-all font-medium" style={{background:'var(--surface)',color:'var(--text)',border:'1px solid var(--border)'}}>📊 Comptabilité</button>
      </div>
      <AccountingPage invoices={invoices} quotes={quotes} clients={clients} missions={missions}/>
    </div>
  );

  return(
    <div className="fade-in space-y-5">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold">Factures & Comptabilité</h1>
        {unpaid.length>0&&<div className="text-sm text-red-400 font-medium">{fmtMoney(totalUnpaid)} impayé{unpaid.length>1?'s':''}</div>}
      </div>
      <div className="flex rounded-xl p-1" style={{background:'var(--surface2)',border:'1px solid var(--border)',width:'fit-content'}}>
        <button className="text-sm px-4 py-1.5 rounded-lg transition-all font-medium" style={{background:'var(--surface)',color:'var(--text)',border:'1px solid var(--border)'}}>🧾 Factures</button>
        <button onClick={()=>setSubTab('accounting')} className="text-sm px-4 py-1.5 rounded-lg transition-all font-medium" style={{color:'var(--muted)',border:'1px solid transparent'}}>📊 Comptabilité</button>
      </div>

      {quotesWithoutInvoice.length>0&&(
        <Card className="border-amber-500/30 bg-amber-500/5">
          <div className="text-sm font-medium text-amber-400 mb-3">⚡ Devis acceptés sans facture</div>
          <div className="space-y-2">
            {quotesWithoutInvoice.map(q=>{
              const cl=getClient(q.client_id);
              return(
                <div key={q.id} className="flex items-center justify-between">
                  <span className="text-sm">{q.num} — {cl?.name} — {fmtMoney(q.ttc)}</span>
                  <Btn size="sm" onClick={()=>createFromQuote(q)}>Créer facture</Btn>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      <div className="flex gap-2 flex-wrap">
        {['Tous',...INVOICE_STATUSES].map(s=>(
          <button key={s} onClick={()=>setFilter(s)} className={`text-sm px-3 py-1.5 rounded-lg transition-all ${filter===s?'bg-amber-500 text-black':'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>{s}</button>
        ))}
      </div>

      <div className="space-y-3">
        {filtered.length===0&&<p className="text-gray-500 text-sm">Aucune facture</p>}
        {filtered.map(inv=>{
          const cl=getClient(inv.client_id)||getClient(quotes.find(q=>q.id===inv.quote_id)?.client_id);
          const clEmail=cl?.email||cl?.agent_email;
          const overdue=inv.status!=='Payée'&&inv.status!=='Annulée'&&inv.due_date&&new Date(inv.due_date)<new Date();
          return(
            <Card key={inv.id} className={`hover:border-gray-700 transition-colors ${overdue?'border-red-500/30':''}`}>
              <div className="flex items-center justify-between gap-4">
                <div>
                  <div className="flex items-center gap-2 mb-1">
                    <span className="font-mono text-sm font-bold text-amber-400">{inv.num}</span>
                    <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${INV_COLORS[inv.status]||'bg-gray-700 text-gray-300'}`}>{inv.status}</span>
                    {overdue&&<span className="text-xs text-red-400 font-medium">⚠ En retard</span>}
                  </div>
                  <div className="font-medium">{cl?.name||'—'}</div>
                  <div className="text-xs text-gray-500">Échéance : {fmt(inv.due_date)}</div>
                </div>
                <div className="text-right">
                  <div className="text-lg font-bold text-amber-400">{fmtMoney(inv.ttc)}</div>
                  <div className="flex gap-1 mt-2 justify-end flex-wrap">
                    <select value={inv.status} onChange={e=>setStatus(inv.id,e.target.value)}
                      className="text-xs rounded px-2 py-1 bg-gray-800 border border-gray-700 text-gray-300 focus:outline-none">
                      {INVOICE_STATUSES.map(s=><option key={s}>{s}</option>)}
                    </select>
                    <Btn size="sm" variant="ghost" onClick={()=>exportInvoicePDF(inv,cl,getMission(inv.mission_id),quotes.find(q=>q.id===inv.quote_id))}>📄 PDF</Btn>
                    {inv.status!=='Payée'&&inv.status!=='Annulée'&&(
                      <Btn size="sm" variant="ghost" onClick={async()=>{if(!clEmail){alert('Aucun email trouvé pour ce client. Ajoutez-en un dans sa fiche.');return;}const r=await sendInvoiceEmail(inv,{...cl,email:clEmail},getMission(inv.mission_id),quotes.find(q=>q.id===inv.quote_id));if(r.success){if(inv.status==='En attente')await setStatus(inv.id,'Envoyée');alert('Facture envoyée !');}else alert('Erreur : '+r.error);}}>📧 Envoyer</Btn>
                    )}
                    {inv.status!=='Payée'&&inv.status!=='Annulée'&&inv.due_date&&new Date(inv.due_date)<new Date()&&(
                      <Btn size="sm" variant="ghost" onClick={async()=>{if(!clEmail){alert('Aucun email trouvé pour ce client. Ajoutez-en un dans sa fiche.');return;}const r=await sendInvoiceReminder(inv,{...cl,email:clEmail});alert(r.success?'Rappel envoyé !':'Erreur : '+r.error);}}>⚡ Rappel</Btn>
                    )}
                    {inv.status !== 'Payée' && (
                      <Btn size="sm" variant="secondary" onClick={()=>setStatus(inv.id, 'Payée')}>✓ Payée</Btn>
                    )}
                    <Btn size="sm" variant="ghost" onClick={()=>del(inv.id)}>🗑️</Btn>
                  </div>
                </div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ─── ACCOUNTING ───────────────────────────────────────────────────────────────
function AccountingPage({invoices, quotes, clients, missions}) {
  const [viewMode, setViewMode] = useState('monthly'); // 'monthly' | 'annual'
  const now = new Date();
  const [selMonth, setSelMonth] = useState(now.getMonth());
  const [selYear, setSelYear] = useState(now.getFullYear());
  const [filterStatus, setFilterStatus] = useState('Tous');

  const getClient = id => clients.find(c => c.id === id);

  // Filter invoices
  const filteredInvoices = invoices.filter(inv => {
    const d = new Date(inv.created_at);
    const matchPeriod = viewMode === 'annual'
      ? d.getFullYear() === selYear
      : d.getMonth() === selMonth && d.getFullYear() === selYear;
    const matchStatus = filterStatus === 'Tous' || inv.status === filterStatus;
    return matchPeriod && matchStatus;
  });

  // KPIs
  const totalHT = filteredInvoices.reduce((s, i) => s + (i.ht || 0), 0);
  const totalTVA = filteredInvoices.reduce((s, i) => s + (i.tva || Math.round((i.ht || 0) * 0.20 * 100) / 100), 0);
  const totalTTC = filteredInvoices.reduce((s, i) => s + (i.ttc || 0), 0);
  const unpaidInvs = invoices.filter(i => i.status !== 'Payée' && i.status !== 'Annulée');
  const totalUnpaid = unpaidInvs.reduce((s, i) => s + (i.ttc || 0), 0);

  // 12 months rolling chart data
  const chartMonths = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const mn = d.getMonth();
    const yr = d.getFullYear();
    const label = d.toLocaleDateString('fr-FR', {month: 'short'});
    const ca = invoices
      .filter(inv => { const id = new Date(inv.created_at); return id.getMonth() === mn && id.getFullYear() === yr; })
      .reduce((s, inv) => s + (inv.ttc || 0), 0);
    chartMonths.push({label, ca, month: mn, year: yr});
  }
  const maxCA = Math.max(...chartMonths.map(m => m.ca), 1);

  // CSV export
  const exportCSV = () => {
    const header = 'Numéro,Client,Date,HT,TVA,TTC,Statut,Echéance,Date paiement\n';
    const rows = filteredInvoices.map(inv => {
      const cl = getClient(inv.client_id);
      const tva = inv.tva || Math.round((inv.ht || 0) * 0.20 * 100) / 100;
      return [
        inv.num, cl?.name || '', inv.created_at,
        (inv.ht || 0).toFixed(2), tva.toFixed(2), (inv.ttc || 0).toFixed(2),
        inv.status, inv.due_date || '', inv.paid_date || ''
      ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
    }).join('\n');
    const blob = new Blob(['﻿' + header + rows], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    const period = viewMode === 'annual' ? selYear : `${selYear}-${String(selMonth+1).padStart(2,'0')}`;
    a.download = `comptabilite-${period}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  // PDF export
  const exportPDFBilan = () => {
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF();
    const amber = [245, 158, 11];
    const gray = [107, 114, 128];
    const period = viewMode === 'annual' ? String(selYear) : new Date(selYear, selMonth).toLocaleDateString('fr-FR', {month:'long',year:'numeric'});

    doc.setFillColor(...amber);
    doc.rect(0, 0, 210, 35, 'F');
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text('BILAN COMPTABLE', 105, 16, {align: 'center'});
    doc.setFontSize(12);
    doc.setFont('helvetica', 'normal');
    doc.text(period, 105, 26, {align: 'center'});

    let y = 50;
    doc.setTextColor(...gray);
    doc.setFontSize(10);
    doc.text('Total HT : ' + fmtMoney(totalHT), 14, y); y += 8;
    doc.text('Total TVA : ' + fmtMoney(totalTVA), 14, y); y += 8;
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...amber);
    doc.text('Total TTC : ' + fmtMoney(totalTTC), 14, y); y += 8;
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...gray);
    doc.text('Factures : ' + filteredInvoices.length, 14, y); y += 8;
    doc.text('Impayés : ' + fmtMoney(totalUnpaid), 14, y); y += 14;

    // Table
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(8);
    doc.text('N°', 14, y);
    doc.text('Client', 35, y);
    doc.text('Date', 90, y);
    doc.text('HT', 120, y, {align: 'right'});
    doc.text('TTC', 148, y, {align: 'right'});
    doc.text('Statut', 165, y);
    y += 5;
    doc.setDrawColor(...amber);
    doc.line(14, y, 196, y); y += 5;

    doc.setFont('helvetica', 'normal');
    filteredInvoices.forEach(inv => {
      const cl = getClient(inv.client_id);
      doc.text(inv.num || '', 14, y);
      doc.text((cl?.name || '').substring(0, 25), 35, y);
      doc.text(inv.created_at || '', 90, y);
      doc.text(fmtMoney(inv.ht || 0), 120, y, {align: 'right'});
      doc.text(fmtMoney(inv.ttc || 0), 148, y, {align: 'right'});
      doc.text(inv.status || '', 165, y);
      y += 7;
      if (y > 270) { doc.addPage(); y = 20; }
    });

    doc.save('bilan-' + period.replace(/\s/g, '-') + '.pdf');
  };

  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const years = [now.getFullYear(), now.getFullYear()-1, now.getFullYear()-2];
  const INVOICE_STATUSES = ['En attente', 'Envoyée', 'Payée', 'Annulée'];
  const INV_COLORS = {'En attente':'bg-gray-500/20 text-gray-400','Envoyée':'bg-blue-500/20 text-blue-400','Payée':'bg-green-500/20 text-green-400','Annulée':'bg-red-500/20 text-red-400'};

  return (
    <div className="fade-in space-y-6">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <h1 className="text-2xl font-bold">Comptabilité</h1>
        <div className="flex gap-2">
          <Btn variant="secondary" size="sm" onClick={exportCSV}>📥 CSV</Btn>
          <Btn variant="secondary" size="sm" onClick={exportPDFBilan}>📄 PDF Bilan</Btn>
        </div>
      </div>

      {/* Filters */}
      <Card>
        <div className="flex flex-wrap gap-4 items-end">
          <div>
            <div className="text-xs text-gray-400 mb-1">Période</div>
            <div className="flex rounded-lg overflow-hidden border border-gray-700">
              <button onClick={()=>setViewMode('monthly')} className={`px-3 py-1.5 text-sm ${viewMode==='monthly'?'bg-amber-500 text-black':'bg-gray-800 text-gray-400'}`}>Mensuel</button>
              <button onClick={()=>setViewMode('annual')} className={`px-3 py-1.5 text-sm ${viewMode==='annual'?'bg-amber-500 text-black':'bg-gray-800 text-gray-400'}`}>Annuel</button>
            </div>
          </div>
          {viewMode === 'monthly' && (
            <Select label="Mois" value={String(selMonth)} onChange={v=>setSelMonth(+v)} className="w-36"
              options={MONTHS.map((m,i)=>({value:String(i),label:m}))}/>
          )}
          <Select label="Année" value={String(selYear)} onChange={v=>setSelYear(+v)} className="w-28"
            options={years.map(y=>({value:String(y),label:String(y)}))}/>
          <Select label="Statut" value={filterStatus} onChange={setFilterStatus} className="w-36"
            options={['Tous',...INVOICE_STATUSES].map(s=>({value:s,label:s}))}/>
        </div>
      </Card>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <Card>
          <div className="text-xs text-gray-400 mb-1">Total HT</div>
          <div className="text-xl font-bold text-amber-400">{fmtMoney(totalHT)}</div>
        </Card>
        <Card>
          <div className="text-xs text-gray-400 mb-1">TVA collectée</div>
          <div className="text-xl font-bold text-amber-400">{fmtMoney(totalTVA)}</div>
        </Card>
        <Card>
          <div className="text-xs text-gray-400 mb-1">Total TTC</div>
          <div className="text-xl font-bold text-amber-400">{fmtMoney(totalTTC)}</div>
        </Card>
        <Card>
          <div className="text-xs text-gray-400 mb-1">Impayés</div>
          <div className="text-xl font-bold text-red-400">{fmtMoney(totalUnpaid)}</div>
          <div className="text-xs text-gray-500">{unpaidInvs.length} facture{unpaidInvs.length!==1?'s':''}</div>
        </Card>
      </div>

      {/* Chart 12 months */}
      <Card>
        <h3 className="font-semibold mb-4">📈 CA TTC — 12 derniers mois</h3>
        <div className="flex items-end gap-1.5 h-40 overflow-x-auto pb-2">
          {chartMonths.map((m, i) => (
            <div key={i} className="flex-1 min-w-8 flex flex-col items-center gap-1">
              <div className="text-xs text-gray-500 font-mono">{m.ca > 0 ? fmtMoney(m.ca).replace(/\s€/,'') : ''}</div>
              <div className="w-full flex flex-col justify-end" style={{height:'80px'}}>
                <div className="w-full bg-amber-500/80 rounded-t-sm transition-all" style={{height:`${Math.max(2,(m.ca/maxCA)*100)}%`}}/>
              </div>
              <div className="text-xs text-gray-500 truncate w-full text-center">{m.label}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* Invoices table */}
      <Card>
        <h3 className="font-semibold mb-4">Tableau des factures ({filteredInvoices.length})</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-sm min-w-[600px]">
            <thead>
              <tr className="border-b border-gray-700 text-xs text-gray-400">
                <th className="text-left pb-2 font-medium">N° Facture</th>
                <th className="text-left pb-2 font-medium">Client</th>
                <th className="text-left pb-2 font-medium">Date</th>
                <th className="text-right pb-2 font-medium">HT</th>
                <th className="text-right pb-2 font-medium">TVA</th>
                <th className="text-right pb-2 font-medium">TTC</th>
                <th className="text-left pb-2 font-medium">Statut</th>
                <th className="text-left pb-2 font-medium">Échéance</th>
              </tr>
            </thead>
            <tbody>
              {filteredInvoices.length === 0 && (
                <tr><td colSpan="8" className="text-gray-500 py-6 text-center">Aucune facture sur cette période</td></tr>
              )}
              {filteredInvoices.map(inv => {
                const cl = getClient(inv.client_id);
                const tva = inv.tva || Math.round((inv.ht || 0) * 0.20 * 100) / 100;
                const overdue = inv.status !== 'Payée' && inv.status !== 'Annulée' && inv.due_date && new Date(inv.due_date) < new Date();
                return (
                  <tr key={inv.id} className={`border-b border-gray-800 ${overdue ? 'bg-red-500/5' : ''}`}>
                    <td className="py-2.5 font-mono text-amber-400 font-bold">{inv.num}</td>
                    <td className="py-2.5 text-gray-300">{cl?.name || '—'}</td>
                    <td className="py-2.5 text-gray-400">{fmt(inv.created_at)}</td>
                    <td className="py-2.5 text-right">{fmtMoney(inv.ht || 0)}</td>
                    <td className="py-2.5 text-right text-gray-400">{fmtMoney(tva)}</td>
                    <td className="py-2.5 text-right font-bold">{fmtMoney(inv.ttc || 0)}</td>
                    <td className="py-2.5"><span className={`text-xs px-2 py-0.5 rounded-full ${INV_COLORS[inv.status]||'bg-gray-700 text-gray-300'}`}>{inv.status}</span>{overdue&&<span className="text-red-400 text-xs ml-1">⚠</span>}</td>
                    <td className="py-2.5 text-gray-400">{fmt(inv.due_date)}</td>
                  </tr>
                );
              })}
            </tbody>
            {filteredInvoices.length > 0 && (
              <tfoot>
                <tr className="border-t border-amber-500/30 font-bold">
                  <td colSpan="3" className="pt-3 text-gray-400">Total période</td>
                  <td className="pt-3 text-right">{fmtMoney(totalHT)}</td>
                  <td className="pt-3 text-right text-gray-400">{fmtMoney(totalTVA)}</td>
                  <td className="pt-3 text-right text-amber-400">{fmtMoney(totalTTC)}</td>
                  <td colSpan="2" className="pt-3"/>
                </tr>
              </tfoot>
            )}
          </table>
        </div>
      </Card>

      {/* Unpaid invoices */}
      {unpaidInvs.length > 0 && (
        <Card className="border-red-500/20">
          <h3 className="font-semibold text-red-400 mb-4">⚠ Impayés ({unpaidInvs.length})</h3>
          <div className="space-y-2">
            {unpaidInvs.map(inv => {
              const cl = getClient(inv.client_id);
              const overdueDays = inv.due_date ? Math.floor((new Date() - new Date(inv.due_date)) / 86400000) : 0;
              return (
                <div key={inv.id} className="flex items-center justify-between py-2 border-b border-gray-800 last:border-0">
                  <div>
                    <span className="font-mono text-amber-400 text-sm">{inv.num}</span>
                    <span className="text-gray-300 text-sm ml-2">{cl?.name || '—'}</span>
                    {overdueDays > 0 && <span className="text-red-400 text-xs ml-2">+{overdueDays}j de retard</span>}
                  </div>
                  <div className="text-right">
                    <div className="font-bold text-red-400">{fmtMoney(inv.ttc)}</div>
                    <div className="text-xs text-gray-500">Éch. {fmt(inv.due_date)}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      )}
    </div>
  );
}
