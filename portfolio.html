<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <title>Portfolio — PhotoImmo Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{accent:'#c9963c',gold:'#c9963c','gold-light':'#e8b96e'}}}}</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --gold: #c9963c;
      --gold-light: #e8b96e;
      --bg: #08080f;
      --surface: #0f0f1a;
      --surface2: #16162a;
      --border: #1e1e35;
      --text: #f0ede8;
      --muted: #7a7a9a;
    }
    * { box-sizing: border-box; }
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
    h1,h2,h3,.font-display{font-family:'Playfair Display',Georgia,serif;}
    .fade-in{animation:fadeIn .5s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

    .aperture{width:44px;height:44px;position:relative;background:var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;}
    .aperture::before{content:'';position:absolute;width:20px;height:20px;border-radius:50%;border:2px solid rgba(0,0,0,0.7);box-shadow:inset 0 0 0 4px rgba(0,0,0,0.3);}

    .nav-blur{background:rgba(8,8,15,0.75);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid rgba(255,255,255,0.06);}

    .card-premium{background:var(--surface);border:1px solid var(--border);transition:border-color .3s, transform .3s;}
    .card-premium:hover{border-color:rgba(201,150,60,0.3);transform:translateY(-2px);}

    .btn-gold{background:linear-gradient(135deg,#c9963c 0%,#e8b96e 50%,#c9963c 100%);background-size:200% 100%;color:#08080f;font-weight:600;transition:background-position .4s, box-shadow .3s;box-shadow:0 0 30px rgba(201,150,60,0.2);}
    .btn-gold:hover{background-position:100% 0;box-shadow:0 0 45px rgba(201,150,60,0.35);}

    .gradient-text{background:linear-gradient(135deg,#e8b96e 0%,#c9963c 50%,#f0c070 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

    .feature-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,rgba(201,150,60,0.15),rgba(201,150,60,0.05));border:1px solid rgba(201,150,60,0.2);display:flex;align-items:center;justify-content:center;font-size:20px;}

    .testimonial-card{background:var(--surface);border:1px solid var(--border);position:relative;}
    .testimonial-card::before{content:'"';font-family:'Playfair Display',serif;position:absolute;top:8px;left:18px;font-size:56px;color:rgba(201,150,60,0.15);line-height:1;}

    .line-deco{width:48px;height:2px;background:linear-gradient(to right,var(--gold),transparent);}
    .divider{height:1px;background:linear-gradient(to right,transparent,var(--border),transparent);}

    .tab-pill{border:1px solid var(--border);color:var(--muted);background:var(--surface2);}
    .tab-pill.active{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 100%);color:#08080f;border-color:transparent;font-weight:600;}

    input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
    input::placeholder,textarea::placeholder{color:var(--muted);}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,150,60,0.15);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const SB_URL  = typeof __SUPABASE_URL__  !== 'undefined' ? __SUPABASE_URL__  : '';
const SB_KEY  = typeof __SUPABASE_KEY__  !== 'undefined' ? __SUPABASE_KEY__  : '';
const sb = SB_URL && SB_KEY ? window.supabase.createClient(SB_URL, SB_KEY) : null;

const PHOTO_CATEGORIES = ['Appartements','Maisons','Villas','Commerces','Drone','Visite virtuelle'];
const PROPERTY_TYPES = ['Appartement','Maison','Villa','Commerce','Bureau','Terrain','Autre'];

// ─── STARS ────────────────────────────────────────────────────────────────────
const Stars = ({rating}) => (
  <span style={{color:'var(--gold-light)'}}>
    {'★'.repeat(Math.max(0, Math.min(5, rating||0)))}
    <span style={{color:'var(--border)'}}>{'★'.repeat(5 - Math.max(0, Math.min(5, rating||0)))}</span>
  </span>
);

// ─── SOCIAL LINKS ─────────────────────────────────────────────────────────────
const SOCIAL_META = {
  instagram: {label:'Instagram', path:'M2 7a5 5 0 0 1 5-5h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7z M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z M17 6.7a.9.9 0 1 0 0 1.8.9.9 0 0 0 0-1.8z'},
  facebook: {label:'Facebook', path:'M12 2a10 10 0 1 0 1.5 19.9v-7h-2v-2.7h2v-2c0-2 1.2-3.1 3-3.1.9 0 1.7.07 2 .1v2.3h-1.4c-1.1 0-1.3.5-1.3 1.3v1.7h2.6l-.4 2.7h-2.2v7A10 10 0 0 0 12 2z'},
  linkedin: {label:'LinkedIn', path:'M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM10 9h3.8v1.7h.05c.53-1 1.84-2.05 3.78-2.05 4.05 0 4.8 2.6 4.8 6V21h-4v-5.7c0-1.36-.02-3.1-1.9-3.1-1.9 0-2.2 1.48-2.2 3v5.8h-4z'},
  tiktok: {label:'TikTok', path:'M14 3h3a5.5 5.5 0 0 0 5 5v3a8.5 8.5 0 0 1-5-1.6V15a6 6 0 1 1-6-6c.34 0 .67.03 1 .08V12.2a3 3 0 1 0 2 2.83z'},
  website: {label:'Site web', path:'M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM2 12h20M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z'},
};
function SocialLinks({social}) {
  const entries = Object.entries(social || {}).filter(([key, url]) => url && SOCIAL_META[key]);
  if (!entries.length) return null;
  return (
    <div className="flex items-center justify-center gap-3">
      {entries.map(([key, url]) => (
        <a key={key} href={url} target="_blank" rel="noopener noreferrer" title={SOCIAL_META[key].label}
          className="w-10 h-10 rounded-full flex items-center justify-center transition-all"
          style={{background:'var(--surface2)', border:'1px solid var(--border)', color:'var(--gold-light)'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--gold)';e.currentTarget.style.background='rgba(201,150,60,0.1)';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--surface2)';}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            <path d={SOCIAL_META[key].path}/>
          </svg>
        </a>
      ))}
    </div>
  );
}

// ─── CONTACT FORM ─────────────────────────────────────────────────────────────
function ContactForm({slug, photographerName}) {
  const [form, setForm] = useState({name:'',email:'',phone:'',address:'',type:'Appartement',message:''});
  const [status, setStatus] = useState('idle'); // idle | sending | success | error
  const [errMsg, setErrMsg] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    if (!form.name || !form.email) return;
    setStatus('sending');
    try {
      const res = await fetch('/api/contact', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({...form, photographer_slug: slug})
      });
      const r = await res.json();
      if (r.success) { setStatus('success'); setForm({name:'',email:'',phone:'',address:'',type:'Appartement',message:''}); }
      else { setErrMsg(r.error || 'Erreur'); setStatus('error'); }
    } catch(err) {
      setErrMsg(err.message);
      setStatus('error');
    }
  };

  if (status === 'success') {
    return (
      <div className="text-center py-12">
        <div className="text-5xl mb-4">✅</div>
        <h3 className="text-xl font-bold mb-2" style={{color:'var(--text)'}}>Demande envoyée !</h3>
        <p style={{color:'var(--muted)'}}>{photographerName} vous contactera très prochainement.</p>
        <button onClick={()=>setStatus('idle')} className="mt-4 text-sm hover:underline" style={{color:'var(--gold-light)'}}>Envoyer une autre demande</button>
      </div>
    );
  }

  return (
    <form onSubmit={submit} className="space-y-4">
      <div className="grid md:grid-cols-2 gap-4">
        <div>
          <label className="block text-sm mb-1" style={{color:'var(--muted)'}}>Nom complet *</label>
          <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} required
            className="w-full rounded-lg text-sm px-3 py-2.5"/>
        </div>
        <div>
          <label className="block text-sm mb-1" style={{color:'var(--muted)'}}>Email *</label>
          <input type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} required
            className="w-full rounded-lg text-sm px-3 py-2.5"/>
        </div>
        <div>
          <label className="block text-sm mb-1" style={{color:'var(--muted)'}}>Téléphone</label>
          <input value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))}
            className="w-full rounded-lg text-sm px-3 py-2.5"/>
        </div>
        <div>
          <label className="block text-sm mb-1" style={{color:'var(--muted)'}}>Type de bien</label>
          <select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}
            className="w-full rounded-lg text-sm px-3 py-2.5">
            {PROPERTY_TYPES.map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
      </div>
      <div>
        <label className="block text-sm mb-1" style={{color:'var(--muted)'}}>Adresse du bien</label>
        <input value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value}))} placeholder="12 rue des Lilas, 75015 Paris"
          className="w-full rounded-lg text-sm px-3 py-2.5"/>
      </div>
      <div>
        <label className="block text-sm mb-1" style={{color:'var(--muted)'}}>Message</label>
        <textarea value={form.message} onChange={e=>setForm(f=>({...f,message:e.target.value}))} rows={4}
          placeholder="Décrivez votre projet..."
          className="w-full rounded-lg text-sm px-3 py-2.5 resize-none"/>
      </div>
      {status==='error' && <p className="text-sm" style={{color:'#f87171'}}>{errMsg}</p>}
      <button type="submit" disabled={status==='sending'}
        className="btn-gold w-full disabled:opacity-60 py-3 rounded-xl">
        {status==='sending' ? 'Envoi en cours…' : 'Envoyer la demande de devis'}
      </button>
    </form>
  );
}

// ─── PORTFOLIO APP ────────────────────────────────────────────────────────────
function PortfolioApp() {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [profile, setProfile] = useState(null);
  const [photos, setPhotos] = useState([]);
  const [testimonials, setTestimonials] = useState([]);
  const [activePhotoTab, setActivePhotoTab] = useState('Tous');

  // Extract slug from URL: /portfolio/[slug]
  const slug = window.location.pathname.split('/portfolio/')[1]?.split('/')[0] || '';

  useEffect(() => {
    // Update meta tags dynamically
    document.title = profile ? `${profile.company_name || 'Portfolio'} — PhotoImmo Pro` : 'Portfolio — PhotoImmo Pro';
  }, [profile]);

  useEffect(() => {
    if (!slug) {
      setError('Aucun portfolio trouvé pour cette URL.');
      setLoading(false);
      return;
    }

    if (sb) {
      loadFromSupabase();
    } else {
      loadDemoData();
    }
  }, [slug]);

  const loadFromSupabase = async () => {
    try {
      // Load profile
      const { data: profileData, error: profileErr } = await sb
        .from('user_profiles')
        .select('*')
        .eq('portfolio_slug', slug)
        .eq('portfolio_enabled', true)
        .single();

      if (profileErr || !profileData) {
        setError('Portfolio introuvable ou désactivé.');
        setLoading(false);
        return;
      }
      setProfile(profileData);

      // Load photos
      const { data: photosData } = await sb
        .from('portfolio_photos')
        .select('*')
        .eq('user_id', profileData.user_id)
        .order('display_order', {ascending: true});
      setPhotos(photosData || []);

      // Load testimonials
      const { data: testimonialsData } = await sb
        .from('testimonials')
        .select('*')
        .eq('user_id', profileData.user_id)
        .order('date', {ascending: false});
      setTestimonials(testimonialsData || []);

      setLoading(false);
    } catch(err) {
      setError('Erreur lors du chargement du portfolio.');
      setLoading(false);
    }
  };

  const loadDemoData = () => {
    // Try localStorage first (for testing own portfolio)
    const localProfile = JSON.parse(localStorage.getItem('pii_profile') || '{}');
    if (localProfile.portfolio_slug === slug || !slug) {
      setProfile({
        company_name: localProfile.company_name || 'Studio Photo Demo',
        siret: localProfile.siret || '',
        address: localProfile.address || 'Paris, France',
        phone: localProfile.phone || '06 00 00 00 00',
        bio: localProfile.bio || 'Photographe immobilier professionnel spécialisé dans la mise en valeur de biens immobiliers. Passionné par la lumière naturelle et les espaces de vie.',
        zone: localProfile.zone || 'Paris et Île-de-France',
        portfolio_enabled: true,
      });
      setPhotos(JSON.parse(localStorage.getItem('pii_portfolio_photos') || '[]'));
      setTestimonials(JSON.parse(localStorage.getItem('pii_testimonials') || '[]'));
    } else {
      // Generic demo data
      setProfile({
        company_name: 'Studio Lumière Pro',
        siret: '123 456 789 00012',
        address: '12 rue des Arts, 75003 Paris',
        phone: '06 12 34 56 78',
        bio: 'Photographe immobilier professionnel avec 10 ans d\'expérience. Spécialisé dans la mise en valeur de tous types de biens : appartements, maisons, villas et locaux commerciaux.',
        zone: 'Paris et Île-de-France',
        portfolio_enabled: true,
        social_links: {instagram:'https://instagram.com', facebook:'https://facebook.com', linkedin:'https://linkedin.com'},
      });
      setPhotos([
        {id:'p1', url:'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600', category:'Appartements', caption:'Appartement lumineux 3 pièces'},
        {id:'p2', url:'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=600', category:'Maisons', caption:'Maison avec jardin'},
        {id:'p3', url:'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=600', category:'Villas', caption:'Villa avec piscine'},
        {id:'p4', url:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=600', category:'Commerces', caption:'Local commercial centre-ville'},
        {id:'p5', url:'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=600', category:'Appartements', caption:'Studio moderne'},
        {id:'p6', url:'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600', category:'Maisons', caption:'Maison familiale'},
      ]);
      setTestimonials([
        {id:'t1', client_name:'Martin Dupont', rating:5, comment:'Excellent travail, photos magnifiques qui ont grandement aidé à vendre rapidement notre appartement !', date:'2026-05-15'},
        {id:'t2', client_name:'Sophie Bernard', rating:5, comment:'Professionnel et ponctuel. Les photos étaient livrées en 48h, avec des retouches impeccables.', date:'2026-04-20'},
        {id:'t3', client_name:'Agence Prestige', rating:4, comment:'Très bon travail sur nos biens de luxe. Nous faisons régulièrement appel à ses services.', date:'2026-03-10'},
      ]);
    }
    setLoading(false);
  };

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <div className="w-12 h-12 border-4 rounded-full animate-spin mx-auto mb-4" style={{borderColor:'var(--gold-light)',borderTopColor:'transparent'}}/>
          <p style={{color:'var(--muted)'}}>Chargement du portfolio…</p>
        </div>
      </div>
    );
  }

  if (error || !profile) {
    return (
      <div className="min-h-screen flex items-center justify-center p-4">
        <div className="text-center max-w-md">
          <div className="text-6xl mb-4">🔍</div>
          <h1 className="text-2xl font-bold mb-2" style={{color:'var(--text)'}}>Portfolio introuvable</h1>
          <p style={{color:'var(--muted)'}}>{error || 'Ce portfolio n\'existe pas ou a été désactivé.'}</p>
        </div>
      </div>
    );
  }

  const initials = (profile.company_name || 'PI').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const filteredPhotos = activePhotoTab === 'Tous' ? photos : photos.filter(p => p.category === activePhotoTab);
  const photoCategories = ['Tous', ...PHOTO_CATEGORIES.filter(cat => photos.some(p => p.category === cat))];

  const PACKS_PUBLIC = [
    {icon:'🏠', label:'Pack Essentiel', desc:'20 photos • 50-100 m²', price:'À partir de 380 €'},
    {icon:'🏡', label:'Pack Confort', desc:'30 photos + visite virtuelle • 100-200 m²', price:'À partir de 800 €'},
    {icon:'🏰', label:'Pack Premium', desc:'50 photos + visite + drone • >200 m²', price:'À partir de 1 200 €'},
  ];

  return (
    <div className="min-h-screen" style={{background:'var(--bg)'}}>
      {/* HEADER */}
      <header className="nav-blur sticky top-0 z-20">
        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="aperture flex-shrink-0">
              <span style={{fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:'12px',color:'#08080f',position:'relative',zIndex:1}}>{initials}</span>
            </div>
            <div>
              <div className="font-display font-semibold" style={{color:'var(--text)'}}>{profile.company_name}</div>
              {profile.zone && <div className="text-xs" style={{color:'var(--muted)'}}>📍 {profile.zone}</div>}
            </div>
          </div>
          <a href="#contact" className="btn-gold px-5 py-2 rounded-lg text-sm">
            Demander un devis
          </a>
        </div>
      </header>

      <main className="max-w-5xl mx-auto px-4 py-10 space-y-16 fade-in">

        {/* HERO / ABOUT */}
        <section className="text-center py-12 relative">
          <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] pointer-events-none opacity-20" style={{background:'radial-gradient(ellipse,rgba(201,150,60,0.5),transparent 70%)'}}/>
          <div className="aperture w-24 h-24 mx-auto mb-6 relative" style={{width:'96px',height:'96px',borderRadius:'24px'}}>
            <span style={{fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:'32px',color:'#08080f',position:'relative',zIndex:1}}>{initials}</span>
          </div>
          <h1 className="font-display text-4xl font-bold mb-3 gradient-text">{profile.company_name}</h1>
          <div className="line-deco mx-auto mb-4"/>
          {profile.zone && <p className="font-medium mb-4" style={{color:'var(--gold-light)'}}>📍 {profile.zone}</p>}
          {profile.bio && <p className="max-w-2xl mx-auto text-lg leading-relaxed" style={{color:'var(--muted)'}}>{profile.bio}</p>}
          <div className="flex items-center justify-center gap-6 mt-6 text-sm" style={{color:'var(--muted)'}}>
            {profile.phone && <span>📞 {profile.phone}</span>}
            {profile.siret && <span>SIRET : {profile.siret}</span>}
          </div>
          <div className="mt-6">
            <SocialLinks social={profile.social_links}/>
          </div>
        </section>

        <div className="divider"/>

        {/* PORTFOLIO PHOTOS */}
        {photos.length > 0 && (
          <section>
            <h2 className="font-display text-2xl font-bold mb-6 text-center" style={{color:'var(--text)'}}>Mes réalisations</h2>

            {/* Category tabs */}
            {photoCategories.length > 2 && (
              <div className="flex gap-2 flex-wrap justify-center mb-6">
                {photoCategories.map(cat => (
                  <button key={cat} onClick={() => setActivePhotoTab(cat)}
                    className={`tab-pill px-4 py-1.5 rounded-full text-sm transition-all ${activePhotoTab===cat?'active':''}`}>
                    {cat}
                  </button>
                ))}
              </div>
            )}

            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              {filteredPhotos.map(p => (
                <div key={p.id} className="card-premium group relative rounded-xl overflow-hidden aspect-[4/3]">
                  <img src={p.url} alt={p.caption || p.category}
                    className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                    onError={e=>{e.target.src='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300"><rect fill="%2316162a" width="400" height="300"/><text fill="%237a7a9a" x="200" y="150" text-anchor="middle" dy=".3em" font-size="16" font-family="sans-serif">Photo</text></svg>';}}/>
                  {p.caption && (
                    <div className="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/70 to-transparent p-3 opacity-0 group-hover:opacity-100 transition-opacity">
                      <p className="text-sm font-medium" style={{color:'var(--text)'}}>{p.caption}</p>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </section>
        )}

        <div className="divider"/>

        {/* PRESTATIONS */}
        <section>
          <h2 className="font-display text-2xl font-bold mb-6 text-center" style={{color:'var(--text)'}}>Mes prestations</h2>
          <div className="grid md:grid-cols-3 gap-6">
            {PACKS_PUBLIC.map(pack => (
              <div key={pack.label} className="card-premium rounded-2xl p-6 text-center">
                <div className="feature-icon mx-auto mb-3">{pack.icon}</div>
                <h3 className="font-display font-bold text-lg mb-2" style={{color:'var(--text)'}}>{pack.label}</h3>
                <p className="text-sm mb-4" style={{color:'var(--muted)'}}>{pack.desc}</p>
                <div className="font-bold text-lg" style={{color:'var(--gold-light)'}}>{pack.price}</div>
              </div>
            ))}
          </div>
          <p className="text-center text-sm mt-4" style={{color:'var(--muted)'}}>Tarifs sur devis selon la surface et les prestations choisies.</p>
        </section>

        {/* TESTIMONIALS */}
        {testimonials.length > 0 && (
          <section>
            <h2 className="font-display text-2xl font-bold mb-6 text-center" style={{color:'var(--text)'}}>Avis clients</h2>
            <div className="grid md:grid-cols-2 gap-4">
              {testimonials.map(t => (
                <div key={t.id} className="testimonial-card rounded-2xl p-6">
                  <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-2">
                      <div className="w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm" style={{background:'rgba(201,150,60,0.12)',color:'var(--gold-light)'}}>{t.client_name[0]}</div>
                      <div className="font-semibold" style={{color:'var(--text)'}}>{t.client_name}</div>
                    </div>
                    <Stars rating={t.rating}/>
                  </div>
                  <p className="text-sm leading-relaxed" style={{color:'var(--muted)'}}>"{t.comment}"</p>
                  {t.date && <p className="text-xs mt-3" style={{color:'var(--border)'}}>{new Date(t.date).toLocaleDateString('fr-FR', {month:'long',year:'numeric'})}</p>}
                </div>
              ))}
            </div>
          </section>
        )}

        <div className="divider"/>

        {/* CONTACT / DEVIS FORM */}
        <section id="contact" className="card-premium rounded-3xl p-8">
          <div className="text-center mb-8">
            <h2 className="font-display text-2xl font-bold mb-2" style={{color:'var(--text)'}}>Demander un devis gratuit</h2>
            <p style={{color:'var(--muted)'}}>Réponse sous 24 heures</p>
          </div>
          <div className="max-w-xl mx-auto">
            <ContactForm slug={slug} photographerName={profile.company_name}/>
          </div>
        </section>

      </main>

      {/* FOOTER */}
      <footer className="mt-16 py-8" style={{background:'#050508',borderTop:'1px solid var(--border)'}}>
        <div className="max-w-5xl mx-auto px-4 text-center text-sm">
          <div className="font-display font-bold text-lg mb-2" style={{color:'var(--text)'}}>{profile.company_name}</div>
          <div className="flex items-center justify-center gap-4 flex-wrap" style={{color:'var(--muted)'}}>
            {profile.phone && <span>📞 {profile.phone}</span>}
            {profile.address && <span>📍 {profile.address}</span>}
            {profile.siret && <span>SIRET : {profile.siret}</span>}
          </div>
          <div className="mt-4 text-xs" style={{color:'var(--border)'}}>
            Propulsé par <a href="/" className="hover:underline" style={{color:'var(--gold-light)'}}>PhotoImmo Pro</a>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PortfolioApp/>);
</script>
</body>
</html>
